 {"label": "Server \u2013 Controls and manages", "anchor": "h-server-controls-and-manages"}, {"label": "Workers \u2013 Do the processing", "anchor": "h-workers-do-the-processing"}, {"label": "OMR Database \u2013 Stores metadata and logs", "anchor": "h-omr-database-stores-metadata-and-logs"}, {"label": "Archive Store \u2013 Stores the actual archived data", "anchor": "h-archive-store-stores-the-actual-archived-data"}]}, {"id": "compatible-systems-retailers", "label": "Compatible Systems & Retailers", "subs": [{"label": "Information Store \u2192 Archive Store \u2192 Extract Store", "anchor": "h-information-store-archive-store-extract-store"}, {"label": "Information Store (Data Source)", "anchor": "h-information-store-data-source"}, {"label": "Structured Data (Databases via JDBC)", "anchor": "h-structured-data-databases-via-jdbc"}, {"label": "Unstructured / Semi-Structured Data", "anchor": "h-unstructured-semi-structured-data"}, {"label": "Purpose: OAM reads and collects data from these systems for archiving.", "anchor": "h-purpose-oam-reads-and-collects-data-from-these-systems-for-a"}, {"label": "Archive Store (Secure Storage)", "anchor": "h-archive-store-secure-storage"}, {"label": "Purpose: Store archived data securely for long-term retention.", "anchor": "h-purpose-store-archived-data-securely-for-long-term-retention"}, {"label": "Extract Store (Restore Location)", "anchor": "h-extract-store-restore-location"}, {"label": "Purpose: Provide controlled access to archived data without modifying the original archive.", "anchor": "h-purpose-provide-controlled-access-to-archived-data-without-m"}, {"label": "Flow Summary", "anchor": "h-flow-summary"}]}, {"id": "data-archival-tasks", "label": "Data Archival Tasks", "subs": [{"label": "1. Archive", "anchor": "h-1-archive"}, {"label": "2. Explore", "anchor": "h-2-explore"}, {"label": "3. Compress", "anchor": "h-3-compress"}, {"label": "4. Verify", "anchor": "h-4-verify"}, {"label": "5. Index", "anchor": "h-5-index"}, {"label": "6. Extract", "anchor": "h-6-extract"}, {"label": "7. Destroy", "anchor": "h-7-destroy"}, {"label": "8. Query Processing", "anchor": "h-8-query-processing"}, {"label": "9. Trigger", "anchor": "h-9-trigger"}, {"label": "10. Download", "anchor": "h-10-download"}, {"label": "Summary", "anchor": "h-summary"}, {"label": "Ingest \u2192 Process \u2192 Secure \u2192 Index \u2192 Retrieve \u2192 Retain \u2192 Dispose", "anchor": "h-ingest-process-secure-index-retrieve-retain-dispose"}]}]}], "content": {"about-this-document-2": {"badge": "About this document", "title": "About this document", "section": "About this document", "topic": "About this document", "body": "<p>This document outlines the features and functionality of Omni Archive Manager and is designed</p>\n<p>to assist product administrators and end users in their daily operations.</p>\n<h3 class=\"content-h3\" id=\"h-topics-for-administrators\">Topics for Administrators</h3>\n<p>The following topics are intended for system administrators:</p>\n<p>Setting up users and roles</p>\n<p>Configuring domains and projects</p>\n<p>Creating retention policies</p>\n<p>Configuring information stores and archive stores</p>\n<p>Setting up business functions</p>\n<p>Configuring tasks (archive, explore, index, extract, destroy, verify, compress)</p>\n<h3 class=\"content-h3\" id=\"h-topics-for-users-with-read-only-access\">Topics for Users with Read-Only Access</h3>\n<p>The following sections are relevant for users with read-only access:</p>\n<p>Content Browsers</p>\n<p>o File Browser</p>\n<p>o SQL Browser</p>\n<p>Disposition Workflow</p>\n<p>Reports</p>\n<h3 class=\"content-h3\" id=\"h-disclaimer\">Disclaimer</h3>\n<p>Omni Archive Manager was previously known as Orion. Some screenshots and components may</p>\n<p>still reference the name Orion. These labels and images will be updated in future releases to</p>\n<p>reflect the new name, Omni Archive Manager.</p>"}, "introduction": {"badge": "About this document", "title": "Introduction", "section": "About this document", "topic": "Introduction", "body": "<p>Infobelt Omni Archive Manager (OAM) is a comprehensive data archiving and records</p>\n<p>management platform designed to make secure information easy to manage, track, and</p>\n<p>retrieve.</p>\n<p>OAM is a high-performance archiving engine that strengthens information protection, enhances</p>\n<p>data privacy, and improves operational efficiency. It supports the ingestion and management of</p>\n<p>structured, semi-structured, and unstructured data in a format compliant with SEC 17a-3 and</p>\n<p>17a-4 requirements.</p>\n<p>Omni Archive Manager meets key Information Records Management (IRM) requirements,</p>\n<p>including:</p>\n\n<ul class=\"content-ul\"><li>Comprehensive auditing capabilities required by regulators</li><li>Clear differentiation between archives and backups</li><li>Disposition holds (legal, regulatory, and other holds)</li><li>Designated Third Party (D3P) support</li><li>Enterprise-grade security, including encryption of archives at rest</li><li>Disposition framework and workflow based on MoREQ2</li><li>Support for WORM and non-WORM archive storage</li><li>Record owner tracking and delegation</li></ul>\n<h3 class=\"content-h3\" id=\"h-highlights\">Highlights</h3>\n<ul class=\"content-ul\"><li>Enables organizations to generate compressed and encrypted artifacts from both</li></ul>\n<p>structured and unstructured data</p>\n<ul class=\"content-ul\"><li>Provides complete software suite for identifying, archiving, and managing information</li></ul>\n<p>throughout its lifecycle</p>\n<ul class=\"content-ul\"><li>Features a centralized server and distributed workers that are configured and managed</li></ul>\n<p>through a web-based user interface</p>"}, "overview-of-infobelt-omni-archive-manager": {"badge": "About this document", "title": "Overview of Infobelt Omni Archive Manager", "section": "About this document", "topic": "Overview of Infobelt Omni Archive Manager", "body": "<h3 class=\"content-h3\" id=\"h-data-archiving-and-retention-framework\">Data Archiving and Retention Framework</h3>\n<p>Infobelt Omni Archive Manager (OAM) is an enterprise-grade data archiving and records</p>\n<p>management platform engineered to support regulatory compliance, long-term preservation,</p>\n<p>and defensible disposition of digital information.</p>\n<p>OAM provides a policy-driven framework for ingesting, processing, and managing structured,</p>\n<p>semi-structured, and unstructured data across heterogeneous data sources. During ingestion,</p>\n<p>data objects are validated, indexed, compressed, encrypted, and stored in secure archive</p>\n<p>repositories. The platform ensures data integrity through verification mechanisms and supports</p>\n<p>tamper-resistant storage configurations, including WORM-enabled environments.</p>\n<h3 class=\"content-h3\" id=\"h-the-system-architecture-supports\">The system architecture supports:</h3>\n<ul class=\"content-ul\"><li>Data Ingestion Pipelines \u2013 Configurable workflows for acquiring data from databases, file</li></ul>\n<p>systems, application repositories, and other enterprise sources.</p>\n<ul class=\"content-ul\"><li>Indexing and Metadata Management \u2013 Full-text indexing and metadata extraction to</li></ul>\n<p>enable granular search, filtering, and retrieval.</p>\n<ul class=\"content-ul\"><li>Compression and Encryption \u2013 Storage optimization through artifact compression and</li></ul>\n<p>enterprise-grade encryption for data at rest.</p>\n\n<ul class=\"content-ul\"><li>Verification and Audit Controls \u2013 Integrity validation and detailed audit logging to ensure</li></ul>\n<p>regulatory traceability.</p>\n<ul class=\"content-ul\"><li>Search and Query Engine \u2013 Advanced query capabilities for retrieving archived data</li></ul>\n<p>based on metadata, content, and structured attributes.</p>\n<ul class=\"content-ul\"><li>Workflow Automation \u2013 Policy-based lifecycle workflows supporting retention, legal</li></ul>\n<p>holds, review, and disposition.</p>\n<p>By consolidating these capabilities into a unified platform, OAM reduces operational risk and</p>\n<p>provides decision-makers with controlled access to compliance-relevant information.</p>\n<h3 class=\"content-h3\" id=\"h-comprehensive-records-management-platform\">Comprehensive Records Management Platform</h3>\n<p>Omni Archive Manager functions as a centralized records governance system that enforces</p>\n<p>retention policies and lifecycle controls across archived content. The platform is designed to:</p>\n<ul class=\"content-ul\"><li>Differentiate between backup data and legally governed archive records</li><li>Apply retention schedules and disposition policies in alignment with regulatory</li></ul>\n<p>requirements</p>\n<ul class=\"content-ul\"><li>Enforce legal and regulatory holds</li><li>Maintain immutable storage where required</li><li>Track record ownership and stakeholder approvals</li><li>Provide complete auditability of user actions and system events</li></ul>\n<p>The architecture consists of a centralized management server and distributed worker nodes. The</p>\n<p>management server coordinates configuration, policy enforcement, and user access through a</p>\n<p>web-based administrative interface. Worker nodes execute processing tasks such as ingest,</p>\n<p>indexing, verification, extraction, compression, and destruction.</p>\n<p>Through optimized storage mechanisms, compression strategies, and lifecycle-based disposition,</p>\n<p>OAM significantly reduces primary storage dependency and overall infrastructure costs while</p>\n<p>maintaining strict compliance and governance standards.</p>"}, "product-features-of-infobelt-omni-archive-manager": {"badge": "About this document", "title": "Product Features of Infobelt Omni Archive Manager", "section": "About this document", "topic": "Product Features of Infobelt Omni Archive Manager", "body": "<h3 class=\"content-h3\" id=\"h-infobelt-omni-archive-manager-oam-is-an-enterprise-grade-dat\">Infobelt Omni Archive Manager (OAM) is an enterprise-grade data archiving and records</h3>\n<p>management platform engineered to support secure data lifecycle governance, regulatory</p>\n<p>compliance, and operational efficiency across structured, semi-structured, and unstructured</p>\n<p>data sources.</p>\n<h3 class=\"content-h3\" id=\"h-core-archiving-and-processing-capabilities\">Core Archiving and Processing Capabilities</h3>\n\n<p>OAM provides an integrated processing pipeline that enables organizations to:</p>\n<h3 class=\"content-h3\" id=\"h-archive-data-from-heterogeneous-sources-including-relational\">Archive data from heterogeneous sources including relational databases, file systems,</h3>\n<p>email repositories, and application platforms</p>\n<h3 class=\"content-h3\" id=\"h-verify-archive-integrity-using-cryptographic-hash-validation\">Verify archive integrity using cryptographic hash validation and checksum mechanisms to</h3>\n<p>ensure authenticity and tamper detection</p>\n<h3 class=\"content-h3\" id=\"h-compress-archived-artifacts-to-optimize-storage-utilization-\">Compress archived artifacts to optimize storage utilization and reduce infrastructure</h3>\n<p>costs</p>\n<h3 class=\"content-h3\" id=\"h-encrypt-data-at-rest-using-enterprise-grade-encryption-stand\">Encrypt data at rest using enterprise-grade encryption standards to maintain</h3>\n<p>confidentiality and regulatory compliance</p>\n<h3 class=\"content-h3\" id=\"h-index-both-content-and-metadata-to-enable-high-performance-s\">Index both content and metadata to enable high-performance search and granular</h3>\n<p>retrieval</p>\n<h3 class=\"content-h3\" id=\"h-extract-structured-datasets-or-unstructured-files-from-archi\">Extract structured datasets or unstructured files from archived artifacts without full</h3>\n<p>system restoration</p>\n<p>The platform supports ingestion and lifecycle management of:</p>\n<h3 class=\"content-h3\" id=\"h-structured-data-e-g-relational-database-tables\">Structured data (e.g., relational database tables)</h3>\n<h3 class=\"content-h3\" id=\"h-semi-structured-data-e-g-xml-json-email-formats\">Semi-structured data (e.g., XML, JSON, email formats)</h3>\n<h3 class=\"content-h3\" id=\"h-unstructured-data-e-g-documents-pdfs-multimedia-files\">Unstructured data (e.g., documents, PDFs, multimedia files)</h3>\n<h3 class=\"content-h3\" id=\"h-records-management-and-regulatory-compliance-capabilities\">Records Management and Regulatory Compliance Capabilities</h3>\n<p>OAM provides a comprehensive records management framework aligned with global regulatory</p>\n<p>requirements and industry standards.</p>\n<h3 class=\"content-h3\" id=\"h-record-classification-and-retention-governance\">Record Classification and Retention Governance</h3>\n<h3 class=\"content-h3\" id=\"h-record-class-codes-and-retention-periods\">Record Class Codes and Retention Periods</h3>\n<p>Enables classification of records according to predefined taxonomies. Each class is</p>\n<p>associated with policy-driven retention durations, legal basis, and disposition rules.</p>\n<p>Retention enforcement is automated and auditable.</p>\n<h3 class=\"content-h3\" id=\"h-legal-and-regulatory-controls\">Legal and Regulatory Controls</h3>\n<h3 class=\"content-h3\" id=\"h-disposition-holds-legal-regulatory-investigative\">Disposition Holds (Legal, Regulatory, Investigative)</h3>\n<p>Supports litigation holds and regulatory preservation requirements. Records under hold</p>\n<p>are automatically excluded from destruction workflows until the hold is released.</p>\n<h3 class=\"content-h3\" id=\"h-designated-third-party-d3p-finra-lofu-support\">Designated Third Party (D3P) / FINRA LoFU Support</h3>\n<p>Enables compliance with Financial Industry Regulatory Authority (FINRA) requirements,</p>\n<p>including Letter of Undertaking (LoFU) and Designated Third Party (D3P) access models</p>\n<p>for regulated broker-dealer environments.</p>\n<h3 class=\"content-h3\" id=\"h-disposition-framework-and-workflow-moreq2-based\">Disposition Framework and Workflow (MoREQ2-Based)</h3>\n<p>Implements structured, multi-stage disposition workflows aligned with the MoREQ2</p>\n<p>specification.</p>\n\n<p>Features include:</p>\n<p>o Multi-stakeholder approvals</p>\n<p>o Segregation of duties</p>\n<p>o Full audit trail logging</p>\n<p>o Controlled execution of destruction or preservation actions</p>\n<h3 class=\"content-h3\" id=\"h-data-sovereignty-and-regional-governance\">Data Sovereignty and Regional Governance</h3>\n<h3 class=\"content-h3\" id=\"h-regional-and-cross-border-data-management\">Regional and Cross-Border Data Management</h3>\n<p>Supports geographically distributed deployments to enforce jurisdiction-specific data</p>\n<p>residency requirements. Policies can restrict storage location, access rights, and cross-</p>\n<p>border transfers to comply with privacy and sovereignty regulations.</p>\n<h3 class=\"content-h3\" id=\"h-storage-architecture-flexibility\">Storage Architecture Flexibility</h3>\n<h3 class=\"content-h3\" id=\"h-worm-and-non-worm-archive-storage\">WORM and Non-WORM Archive Storage</h3>\n<p>Supports both immutable (Write Once, Read Many) and standard storage models.</p>\n<p>o WORM storage ensures tamper-proof retention in regulated environments.</p>\n<p>o Non-WORM storage provides flexibility for internal governance scenarios.</p>\n<h3 class=\"content-h3\" id=\"h-advanced-data-access-and-retrieval\">Advanced Data Access and Retrieval</h3>\n<p>OAM enables in-place data access without requiring full restoration of archived datasets:</p>\n<h3 class=\"content-h3\" id=\"h-structured-data-querying\">Structured Data Querying</h3>\n<p>Users can execute SQL queries directly against archived relational datasets. Query results</p>\n<p>can be exported without rehydrating the data into a production database environment.</p>\n<h3 class=\"content-h3\" id=\"h-unstructured-data-search-and-export\">Unstructured Data Search and Export</h3>\n<p>Full-text indexing allows content-based searches across archived documents and files.</p>\n<p>Search results can be exported selectively without restoring the entire archive to the file</p>\n<p>system.</p>\n<p>This approach:</p>\n<p>Reduces operational overhead</p>\n<p>Minimizes data movement risks</p>\n<p>Preserves chain-of-custody integrity</p>\n<p>Accelerates eDiscovery and audit responses</p>\n<h3 class=\"content-h3\" id=\"h-enterprise-benefits\">Enterprise Benefits</h3>\n<p>Through its integrated architecture, OAM delivers:</p>\n\n<p>End-to-end lifecycle governance</p>\n<p>Regulatory defensibility</p>\n<p>Reduced primary storage footprint</p>\n<p>Secure, policy-driven data preservation</p>\n<p>High-performance search and analytics within the archive layer</p>\n<p>Infobelt Omni Archive Manager thus functions not only as an archiving engine but as a fully</p>\n<p>governed Information Records Management (IRM) platform supporting compliance, operational</p>\n<p>resilience, and long-term digital preservation</p>"}, "login-screen-2": {"badge": "Login Screen", "title": "Login Screen", "section": "Login Screen", "topic": "Login Screen", "body": "<p>The Login Screen provides secure access to the Omni Archive Manager (OAM) . It serves as the</p>\n<p>authentication gateway to the application and enforces role-based access control.</p>\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>The login interface validates user credentials against the authentication system and grants</p>\n<p>access based on assigned roles and permissions.</p>\n<figure class=\"content-figure\"><img src=\"images/img_10b8283686.png\" alt=\"\" loading=\"lazy\"></figure>"}, "login-components": {"badge": "Login Screen", "title": "Login Components", "section": "Login Screen", "topic": "Login Components", "body": "\n<h3 class=\"content-h3\" id=\"h-1-username-field\">1. Username Field</h3>\n<p>Accepts the authorized User ID assigned by the system administrator.</p>\n<p>Input is case-sensitive (depending on authentication configuration).</p>\n<h3 class=\"content-h3\" id=\"h-2-password-field\">2. Password Field</h3>\n<p>Accepts the associated password.</p>\n<p>Password input is masked for security.</p>\n<h3 class=\"content-h3\" id=\"h-3-login-button\">3. Login Button</h3>\n<p>Submits the entered credentials for authentication.</p>\n<p>Initiates secure session creation upon successful validation.</p>\n<h3 class=\"content-h3\" id=\"h-authentication-process\">Authentication Process</h3>\n<ol class=\"content-ol\"><li>User enters Username and Password.</li><li>Credentials are transmitted securely over HTTPS.</li><li>The system validates credentials against the configured authentication source (e.g.,</li></ol>\n<p>internal user directory or external identity provider).</p>\n<ol class=\"content-ol\"><li>Upon successful authentication:</li></ol>\n<p>o A secure user session is created.</p>\n<p>o Role-based permissions are applied.</p>\n<p>o The user is redirected to the dashboard or home page.</p>\n<p>If authentication fails:</p>\n<p>An error message is displayed.</p>\n<p>Access is denied.</p>\n<p>Failed attempts may be logged for security monitoring.</p>\n<h3 class=\"content-h3\" id=\"h-security-features\">Security Features</h3>\n<p>Encrypted communication (HTTPS)</p>\n<p>Role-based access control (RBAC)</p>\n<p>Session management with timeout control</p>\n<p>Audit logging of login attempts</p>\n<p>Password masking</p>\n<h3 class=\"content-h3\" id=\"h-access-requirements\">Access Requirements</h3>\n<p>Valid application URL provided by the administrator</p>\n<p>Authorized credentials</p>\n<p>Network connectivity to the OAM server</p>\n<p>This login screen ensures secure, authenticated access to Omni Archive Manager while</p>\n<p>maintaining compliance with enterprise security policies.</p>\n\n<h3 class=\"content-h3\" id=\"h-note-when-active-directory-authentication-is-incorporated-us\">Note: When Active Directory authentication is incorporated, users will not be prompted with</h3>\n<p>these login screens, as authentication is handled seamlessly through their existing domain</p>\n<p>credentials.</p>"}, "users-and-roles-2": {"badge": "Users And Roles", "title": "Users And Roles", "section": "Users And Roles", "topic": "Users And Roles", "body": "<p>Infobelt Omni Archive Manager (OAM) implements a Role-Based Access Control (RBAC)</p>\n<p>framework that enables granular assignment of system privileges to individual users.</p>\n<p>The platform supports four distinct user roles, each defined with specific permissions governing</p>\n<p>access to application modules, configuration components, operational functions, and</p>\n<p>governance workflows. Access rights are enforced at the user interface, application, and data</p>\n<p>layers to ensure segregation of duties, least-privilege access, and regulatory compliance.</p>\n<figure class=\"content-figure\"><img src=\"images/img_19ae49f0f1.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-user-roles-and-access-tiers\">User Roles and Access Tiers</h3>\n<p>Infobelt Omni Archive Manager (OAM) enforces a Role-Based Access Control (RBAC) model with</p>\n<p>four predefined roles. Each role is assigned a specific access tier and corresponding permissions</p>\n<p>across the User Interface, Application Services, and Database layers.</p>"}, "1-role-admin": {"badge": "Users And Roles", "title": "1. Role: Admin", "section": "Users And Roles", "topic": "1. Role: Admin", "body": "<h3 class=\"content-h3\" id=\"h-tier-privileged-access\">Tier: Privileged Access</h3>\n<p>The Admin role provides unrestricted access across all three architectural tiers:</p>\n<h3 class=\"content-h3\" id=\"h-user-interface-layer-full-access-to-all-modules\">User Interface Layer \u2013 Full access to all modules</h3>\n<h3 class=\"content-h3\" id=\"h-application-layer-full-configuration-and-operational-control\">Application Layer \u2013 Full configuration and operational control</h3>\n<h3 class=\"content-h3\" id=\"h-database-layer-administrative-level-access-as-governed-by-de\">Database Layer \u2013 Administrative-level access (as governed by deployment policy)</h3>\n<h3 class=\"content-h3\" id=\"h-capabilities\">Capabilities:</h3>\n<p>Complete system configuration</p>\n<p>User and role management</p>\n<p>Project and policy configuration</p>\n\n<p>Archive store and extract store setup</p>\n<p>Task scheduling and execution</p>\n<p>Workflow override authority</p>\n<p>System monitoring and audit access</p>\n<p>The admin possesses both administrative and operational privileges and has full control over all</p>\n<p>functional and technical components of OAM.</p>"}, "2-role-operator": {"badge": "Users And Roles", "title": "2. Role: Operator", "section": "Users And Roles", "topic": "2. Role: Operator", "body": "<h3 class=\"content-h3\" id=\"h-tier-high-elevated-access\">Tier: High / Elevated Access</h3>\n<p>The Operator role is responsible for system operations and execution of core processing tasks.</p>\n<h3 class=\"content-h3\" id=\"h-capabilities\">Capabilities:</h3>\n<p>Onboard and configure new data sources</p>\n<p>Create and manage projects</p>\n<p>Execute archive, index, verify, extract, and destroy tasks</p>\n<p>Monitor job status and system activity</p>\n<p>Operators do not have full system configuration privileges (such as user management or global</p>\n<p>security configuration) unless explicitly granted.</p>"}, "3-role-governance": {"badge": "Users And Roles", "title": "3. Role: Governance", "section": "Users And Roles", "topic": "3. Role: Governance", "body": "<h3 class=\"content-h3\" id=\"h-tier-medium-restricted-access\">Tier: Medium / Restricted Access</h3>\n<p>The Governance role is intended for compliance, legal, and records management users.</p>\n<h3 class=\"content-h3\" id=\"h-access-scope\">Access Scope:</h3>\n<p>Read-only access to records associated with their assigned domains or departments</p>\n<p>Participation in records management workflows</p>\n<h3 class=\"content-h3\" id=\"h-capabilities\">Capabilities:</h3>\n<p>Place or remove legal holds</p>\n<p>Approve or reject disposition requests</p>\n<p>Review metadata and retention classifications</p>\n<p>Participate in disposition workflows</p>\n<p>Governance users cannot modify system configurations or execute operational tasks.</p>"}, "4-role-readonly": {"badge": "Users And Roles", "title": "4. Role: Readonly", "section": "Users And Roles", "topic": "4. Role: Readonly", "body": "<h3 class=\"content-h3\" id=\"h-tier-standard-access\">Tier: Standard Access</h3>\n<p>The Readonly role provides view-only access to application data without modification privileges.</p>\n<h3 class=\"content-h3\" id=\"h-capabilities\">Capabilities:</h3>\n<p>View project details (e.g., archive jobs and task history)</p>\n<p>Access dashboards</p>\n<p>Run reports</p>\n<p>Review audit logs</p>\n\n<p>Readonly users cannot perform administrative, operational, or governance actions.</p>"}, "rolefeature-matrix": {"badge": "Users And Roles", "title": "Role\u2013Feature Matrix", "section": "Users And Roles", "topic": "Role\u2013Feature Matrix", "body": "<p>The Role\u2013Feature Matrix defines access mappings between system modules and user roles. It governs configuration privileges, task execution permissions, workflow participation rights, reporting access, and administrative controls. Access enforcement is applied at the application and metadata layers to ensure segregation of duties and compliance with enterprise governance policies.</p>\n<style>.rfm-table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13.5px}.rfm-table th,.rfm-table td{border:1px solid var(--border);padding:9px 12px;text-align:left}.rfm-table thead tr{background:var(--accent);color:#fff}.rfm-table thead th{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px}.rfm-table tbody tr:nth-child(even){background:var(--accent-light)}.rfm-table tbody tr:hover{background:rgba(79,126,248,.08)}.rfm-table td.section-header{font-weight:700;color:var(--text-primary);background:var(--border);padding-left:10px}.rfm-table td.sub-row{padding-left:24px}.rfm-table td.indent{padding-left:40px}</style>\n<table class=\"rfm-table\"><thead><tr><th>Menu</th><th>Admin</th><th>Operations Access</th><th>Governance Access</th><th>Readonly</th></tr></thead><tbody><tr><td class=\"section-header\">Dashboard</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Most Recent Project</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Most Recent Tasks</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Key System Metrics</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Number of System Tasks per Day</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"section-header\">Configuration</td><td>Full</td><td>Yes</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\">Domains</td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\">Retention Policies</td><td>Full</td><td>Full</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\">Archive Store</td><td>Full</td><td>Full</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\">Extract Store</td><td>Full</td><td>Full</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\">Metadata Templates</td><td>Full</td><td>Full</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\"><strong>Users</strong></td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"indent\">Manage Users</td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"indent\">User Project Mappings</td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"indent\">Disposition Hold</td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"indent\">Retention Triggers</td><td>Full</td><td>Full</td><td>No</td><td>No</td></tr><tr><td class=\"indent\">Groups</td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"section-header\">Projects</td><td>Full</td><td>Full</td><td>RO-Associated</td><td>RO-Associated</td></tr><tr><td class=\"sub-row\">Project Wizard</td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\">Browse Projects</td><td>Full</td><td>Full</td><td>RO-Associated</td><td>RO-Associated</td></tr><tr><td class=\"sub-row\">Run Project History</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Business Functions</td><td>Full</td><td>Full</td><td>RO-Associated</td><td>RO-Associated</td></tr><tr><td class=\"sub-row\">SQL Collections</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"section-header\">Tasks</td><td colspan=\"4\"></td></tr><tr><td class=\"sub-row\">Tasks</td><td>Full</td><td>Yes</td><td>Yes</td><td>Yes</td></tr><tr><td class=\"sub-row\">Scheduled Tasks</td><td>Full</td><td>No</td><td>No</td><td>No</td></tr><tr><td class=\"section-header\">Toolkit</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\"><strong>Content Browsers</strong></td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"indent\">File Browser</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"indent\">SQL Browser</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"indent\">Email Browser</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Downloads</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">AQL Copilot</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Clean Index</td><td>Full</td><td>Full</td><td>No</td><td>No</td></tr><tr><td class=\"sub-row\">JDBCSchemas</td><td>Full</td><td>Full</td><td>RO-Associated</td><td>RO-Associated</td></tr><tr><td class=\"sub-row\">Worker Monitor</td><td>Full</td><td>Full</td><td>View</td><td>View</td></tr><tr><td class=\"section-header\">Reports</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Destruction Reports</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Audit Reports</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Project Reports</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Archive Task Reports</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"section-header\">Disposition</td><td>Full</td><td>Full</td><td>Associated</td><td>Associated</td></tr><tr><td class=\"sub-row\">Disposition Workflow</td><td>Full</td><td>Full</td><td>Associated</td><td>RO-Associated</td></tr></tbody></table>"}, "security-setup-recommendations": {"badge": "Users And Roles", "title": "Security Setup Recommendations", "section": "Users And Roles", "topic": "Security Setup Recommendations", "body": "<p>To maintain a secure deployment of Omni Archive Manager, the following controls must be</p>\n<p>implemented:</p>\n<h3 class=\"content-h3\" id=\"h-1-account-hardening\">1. Account Hardening</h3>\n<p>All pre-populated accounts must be locked, except:</p>\n<h3 class=\"content-h3\" id=\"h-admin-openskye-org\">admin@openskye.org</h3>\n<h3 class=\"content-h3\" id=\"h-2-credential-security\">2. Credential Security</h3>\n<p>The default password for the admin account must be changed immediately after</p>\n<p>deployment.</p>\n<h3 class=\"content-h3\" id=\"h-3-individual-accountability\">3. Individual Accountability</h3>\n<p>Each user must be assigned a unique, individual account.</p>\n<p>Shared credentials are strictly prohibited.</p>\n<h3 class=\"content-h3\" id=\"h-4-administrative-control\">4. Administrative Control</h3>\n<p>The admin account must not be used for daily operations.</p>\n\n<p>Only one designated system administrator should use the admin account for application-</p>\n<p>level administration.</p>\n<h3 class=\"content-h3\" id=\"h-5-naming-convention\">5. Naming Convention</h3>\n<p>All user accounts (email IDs) must be configured in lowercase to ensure authentication</p>\n<p>consistency and prevent case-sensitivity issues.</p>\n<h3 class=\"content-h3\" id=\"h-governance-principles-enforced\">Governance Principles Enforced</h3>\n<p>Least Privilege Access</p>\n<p>Segregation of Duties</p>\n<p>Individual Accountability</p>\n<p>Audit Traceability</p>\n<p>Controlled Administrative Access</p>\n<p>This structured access model ensures operational efficiency while maintaining regulatory</p>\n<p>compliance and enterprise-grade security controls.</p>"}, "dashboard": {"badge": "Users And Roles", "title": "Dashboard", "section": "Users And Roles", "topic": "Dashboard", "body": "<p>The Dashboard module in Omni Archive Manager (OAM) provides centralized visibility into</p>\n<p>system activity, infrastructure utilization, and archive operations. It serves as the</p>\n<p>operational monitoring interface for authorized users.</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>After successful authentication, the Dashboard (Home Page) is displayed in the center panel of</p>\n<p>the application interface. The main navigation menu appears on the left side.</p>\n<figure class=\"content-figure\"><img src=\"images/img_242eb6a933.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>The Dashboard provides a real-time operational summary of:</p>\n\n<p>System configuration</p>\n<p>Archive activity</p>\n<p>Task execution history</p>\n<p>Infrastructure utilization</p>\n<p>It functions as the main monitoring console for daily system operations.</p>\n<h3 class=\"content-h3\" id=\"h-key-metrics\">Key Metrics</h3>\n<p>The Key Metrics section provides a high-level overview of system configuration and usage</p>\n<p>statistics.</p>\n<h3 class=\"content-h3\" id=\"h-metrics-displayed\">Metrics Displayed:</h3>\n<h3 class=\"content-h3\" id=\"h-total-projects-number-of-configured-archive-projects\">Total Projects \u2013 Number of configured archive projects</h3>\n<h3 class=\"content-h3\" id=\"h-total-information-stores-number-of-connected-data-sources\">Total Information Stores \u2013 Number of connected data sources</h3>\n<h3 class=\"content-h3\" id=\"h-total-archive-stores-number-of-configured-archive-storage-de\">Total Archive Stores \u2013 Number of configured archive storage destinations</h3>\n<h3 class=\"content-h3\" id=\"h-total-archived-files-total-objects-stored-across-archive-sto\">Total Archived Files \u2013 Total objects stored across archive stores</h3>\n<h3 class=\"content-h3\" id=\"h-total-nodes-workers-active-processing-nodes-handling-archive\">Total Nodes (Workers) \u2013 Active processing nodes handling archive tasks</h3>\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>These metrics allow Operations to:</p>\n<p>Monitor system growth</p>\n<p>Assess workload distribution</p>\n<p>Validate infrastructure scaling</p>\n<p>Track archive volume accumulation</p>\n<h3 class=\"content-h3\" id=\"h-most-recent-tasks\">Most Recent Tasks</h3>\n<p>The Most Recent Tasks panel displays a chronological list of recently executed tasks.</p>\n<h3 class=\"content-h3\" id=\"h-task-types-may-include\">Task Types May Include:</h3>\n<p>Archive</p>\n<p>Index</p>\n<p>Verify</p>\n<p>Extract</p>\n<p>Destroy   etc.</p>\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>This section provides:</p>\n<p>Task execution visibility</p>\n<p>Operational traceability</p>\n<p>Quick access to task logs</p>\n<p>It enables Operations to detect execution failures or performance issues promptly.</p>\n<h3 class=\"content-h3\" id=\"h-most-recent-projects\">Most Recent Projects</h3>\n\n<p>The Most Recent Projects section lists projects that are created recently.</p>\n<p>A Project in OAM represents the primary configuration entity responsible for archiving and</p>\n<p>managing a dataset.</p>\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>Monitor configuration updates</p>\n<p>Quickly navigate to frequently used projects</p>\n<p>Track ingestion or governance changes</p>\n<h3 class=\"content-h3\" id=\"h-number-of-tasks-by-day\">Number of Tasks by Day</h3>\n<p>The Number of Tasks by Day section presents a bar chart visualizing daily task execution</p>\n<p>volume.</p>\n<p>Each time a task is executed (e.g., archive, index, verify), the chart is automatically updated.</p>\n<h3 class=\"content-h3\" id=\"h-administrative-benefits\">Administrative Benefits</h3>\n<p>Monitor workload trends</p>\n<p>Identify peak activity periods</p>\n<p>Analyse operational throughput</p>\n<p>Support capacity planning</p>\n<p>Detect anomalies in task execution patterns</p>\n<h3 class=\"content-h3\" id=\"h-dashboard-summary\">Dashboard Summary</h3>\n<p>The Dashboard functions as the operational control center of Omni Archive Manager by</p>\n<p>providing:</p>\n<p>Real-time system statistics</p>\n<p>Infrastructure and workload visibility</p>\n<p>Archive activity monitoring</p>\n<p>Quick navigation to active components</p>\n<p>Access to Dashboard components is governed by role-based access control (RBAC) to ensure</p>\n<p>secure and restricted visibility.</p>"}, "managing-the-system-as-the-admin-user-2": {"badge": "Managing the System as the Admin User", "title": "Managing the System as the Admin User", "section": "Managing the System as the Admin User", "topic": "Managing the System as the Admin User", "body": "<p>The Admin role in Omni Archive Manager (OAM) has full privileged access across all system</p>\n<p>layers (UI, application, and database). The Admin is responsible for overall system configuration,</p>\n<p>governance enforcement, and operational control.</p>\n<h3 class=\"content-h3\" id=\"h-key-administrative-responsibilities\">Key Administrative Responsibilities</h3>\n<p>The Admin user can perform the following high-level functions:</p>\n<h3 class=\"content-h3\" id=\"h-user-creation-and-management\">User Creation and Management</h3>\n<p>o Create, modify, and disable user accounts</p>\n\n<p>o Assign roles (Admin, Operator, Governance, Readonly)</p>\n<p>o Configure user-project mappings</p>\n<p>o Manage user groups</p>\n<h3 class=\"content-h3\" id=\"h-configuration-of-system-components\">Configuration of System Components</h3>\n<p>o Configure domains</p>\n<p>o Define retention policies</p>\n<p>o Configure archive and extract stores</p>\n<p>o Create metadata templates</p>\n<p>o Configure disposition holds and retention triggers</p>\n<h3 class=\"content-h3\" id=\"h-execution-and-oversight-of-tasks\">Execution and Oversight of Tasks</h3>\n<p>o Execute archive, verify, index, extract, and destroy tasks</p>\n<p>o Monitor scheduled jobs</p>\n<p>o Review system logs and audit trails</p>\n<p>o Override workflows when required</p>"}, "change-the-admin-password": {"badge": "Managing the System as the Admin User", "title": "Change the Admin Password", "section": "Managing the System as the Admin User", "topic": "Change the Admin Password", "body": "<p>For security hardening, the Admin user must change the default password immediately after</p>\n<p>first login.</p>\n<h3 class=\"content-h3\" id=\"h-procedure-to-change-the-admin-password\">Procedure to Change the Admin Password</h3>\n<ol class=\"content-ol\"><li>Log in to Omni Archive Manager using the default Admin credentials.</li><li>Navigate to the top-right corner of the Dashboard/Home screen.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_fb7b720032.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click the profile next to the search and settings icon.</li></ol>\n\n<ol class=\"content-ol\"><li>Select Change Password in side panel.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_f87af2af64.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>The popup window will open.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_3b2b61ab20.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the current (default) password in the Old Password field.</li><li>Enter a new password in the New Password field.</li><li>Re-enter the same password in the Re-enter New Password field.</li><li>Click Submit to save the changes.</li></ol>\n<p>The system will update the credentials and enforce the new password for subsequent logins.</p>\n<h3 class=\"content-h3\" id=\"h-security-recommendation\">Security Recommendation</h3>\n<p>Use a strong password compliant with enterprise security standards.</p>\n<p>Do not share Admin credentials.</p>\n<p>Restrict Admin account usage to a single designated system administrator.</p>\n<p>Changing the default password ensures compliance with security best practices and prevents</p>\n<p>unauthorized access to the system.</p>\n"}, "domains": {"badge": "Configuration", "title": "Domains", "section": "Configuration", "topic": "Domains", "body": "<p>A Domain is a super-set of projects. It is used to logically group multiple projects together</p>\n<p>based on organizational needs such as departments, business units, or other hierarchical</p>\n<p>structures.</p>\n<p>Domains help in organizing projects efficiently, making it easier to manage, filter, and</p>\n<p>perform operations across related projects within the system.</p>\n<figure class=\"content-figure\"><img src=\"images/img_141a457fb3.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-configuring-domains\">Configuring Domains</h3>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Domains feature allows you to organize projects, assign and manage governance</p>\n<p>controls such as Legal, Compliance, and Record Ownership.</p>\n<h3 class=\"content-h3\" id=\"h-1-viewing-domains\">1. Viewing Domains</h3>\n<p>To view existing domains:</p>\n<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Domains from the main menu.</li><li>The system displays a list of all configured domains.</li><li>Review domain details directly from this list.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_8fea01a77b.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-2-creating-a-new-domain\">2. Creating a New Domain</h3>\n<p>Follow these steps to create a new domain:</p>\n<h3 class=\"content-h3\" id=\"h-step-1-open-create-domain-screen\">Step 1: Open Create Domain Screen</h3>\n<ol class=\"content-ol\"><li>Go to Configuration \u2192 Domains.</li><li>Click + New.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_9157d8aa04.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>The Create Domain screen appears.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_059bfc8e3e.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-step-2-enter-domain-details\">Step 2: Enter Domain Details</h3>\n<p>Fill in the following fields:</p>\n<h3 class=\"content-h3\" id=\"h-name\">Name</h3>\n<p>Enter a unique name for the domain (e.g., Test Domain).</p>\n<h3 class=\"content-h3\" id=\"h-list-of-projects-eligible-for-this-domain\">List of Projects Eligible for this Domain</h3>\n<p>Select one or more projects that can be associated with this domain.</p>\n<p>o Use Ctrl key to select multiple projects.</p>\n<h3 class=\"content-h3\" id=\"h-list-of-projects-selected-for-this-domain\">List of Projects Selected for this Domain</h3>\n<p>Move projects between lists using forward/backward arrows.</p>\n<p>o You can leave this empty if projects will be assigned later.</p>\n<figure class=\"content-figure\"><img src=\"images/img_60e75dacac.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-legal-control-representative\">Legal Control Representative</h3>\n<p>Select the stakeholder responsible for legal oversight.</p>\n<h3 class=\"content-h3\" id=\"h-compliance-control-representative\">Compliance Control Representative</h3>\n<p>Select the stakeholder responsible for compliance.</p>\n<h3 class=\"content-h3\" id=\"h-record-owner\">Record Owner</h3>\n<p>Select the stakeholder responsible for record ownership.</p>\n\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>Stakeholders cannot be added to a domain if the associated project already has</p>\n<p>stakeholders assigned.</p>\n<h3 class=\"content-h3\" id=\"h-step-3-save-domain\">Step 3: Save Domain</h3>\n<ol class=\"content-ol\"><li>Click Save.</li><li>The new domain will appear in the domain list.</li></ol>\n<h3 class=\"content-h3\" id=\"h-3-updating-a-domain\">3. Updating a Domain</h3>\n<p>Use this feature to reassign projects between domains.</p>\n<h3 class=\"content-h3\" id=\"h-step-1-open-domain\">Step 1: Open Domain</h3>\n<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Domains.</li><li>Click on the domain you want to update.</li><li>The Update Domain screen opens.</li></ol>\n<h3 class=\"content-h3\" id=\"h-step-2-reassign-projects\">Step 2: Reassign Projects</h3>\n<ol class=\"content-ol\"><li>In Reassign Projects from one Domain to another, select the source domain.</li><li>Move projects between:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-eligible-projects\">o Eligible Projects</h3>\n<h3 class=\"content-h3\" id=\"h-o-selected-projects\">o Selected Projects</h3>\n<ol class=\"content-ol\"><li>Use arrow buttons to adjust selections.</li></ol>\n<h3 class=\"content-h3\" id=\"h-step-3-apply-changes\">Step 3: Apply Changes</h3>\n<ol class=\"content-ol\"><li>Click Apply to confirm updates.</li><li>The selected projects will be reassigned to the chosen domain.</li></ol>"}, "retention-policies": {"badge": "Configuration", "title": "Retention Policies", "section": "Configuration", "topic": "Retention Policies", "body": "<p>A Retention Policy establishes the data classification rules applied to archived data, governing</p>\n<p>how long the data is retained and when it becomes eligible for deletion or destruction.</p>\n<p>Retention policies are configured to ensure that archived data is maintained in accordance with</p>\n<p>regulatory requirements, legal obligations, and internal organizational standards.</p>\n\n<p>Each retention policy defines:</p>\n<p>Data classification criteria used to categorize archived data.</p>\n<p>Retention duration specifying how long the data must be preserved.</p>\n<p>Compliance requirements aligned with applicable regulations or corporate governance</p>\n<p>standards.</p>\n<p>Lifecycle actions indicating when data becomes eligible for review, archival transition, or</p>\n<p>destruction.</p>\n<p>By applying retention policies across archives, organizations can systematically manage the data</p>\n<p>lifecycle, maintain compliance, and optimize storage utilization while ensuring audit readiness.</p>"}, "upload-multiple-retention-policies": {"badge": "Configuration", "title": "Upload Multiple Retention Policies", "section": "Configuration", "topic": "Upload Multiple Retention Policies", "body": "<p>To upload multiple retention policies in bulk, perform the following steps:</p>\n<ol class=\"content-ol\"><li>Click the Download link in the Retention Policies menu to obtain the template.</li></ol>\n<p>o The template is downloaded in .csv format.</p>\n<figure class=\"content-figure\"><img src=\"images/img_f3de029984.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Populate the template with the required retention policy details.</li><li>Click the Upload link in the Retention Policies menu.</li><li>Click Choose File.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_de355c6ebb.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Browse to the location of the completed template and click Set Path.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_a739c782b5.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click Upload Policies to upload the retention policies in bulk.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_be23f357ff.png\" alt=\"\" loading=\"lazy\"></figure>\n"}, "create-a-new-retention-policy": {"badge": "Configuration", "title": "Create a New Retention Policy", "section": "Configuration", "topic": "Create a New Retention Policy", "body": "<ol class=\"content-ol\"><li>Click the + New button in the Retention Policies menu.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_88731a6419.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The Retention Policy Details screen is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_8734e62a15.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<p>a. Retention Policy Short Name</p>\n<p>o Provide a unique identifier (minimum 3 characters), typically including a records</p>\n<p>code.</p>\n<p>o Example: CCM123</p>\n<p>b. Retention Period</p>\n<p>Select one of the following options:</p>\n<p>o Time period in days</p>\n<p>o Time period in months</p>\n<p>o Time period in years</p>\n<p>o Permanent (WORM)</p>\n<p>o Deletion Allowed (not recommended)</p>\n<p>o Initial Unspecified (to be defined later)</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_9fd1372674.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>o A numeric value is required when selecting days, months, or years.</p>\n<p>o Numeric values are not required for Permanent (WORM), Deletion Allowed, or</p>\n<p>Initial Unspecified.</p>\n<p>c. Name</p>\n<p>o Provide a descriptive name for the policy.</p>\n<p>o Example: CCM123 \u2013 Equity Derivatives Trade Data</p>\n<p>d. Description</p>\n<p>o Describe the purpose and applicability of the retention policy.</p>\n<ol class=\"content-ol\"><li>Click Save.</li></ol>"}, "update-and-view-retention-policy-binding": {"badge": "Configuration", "title": "Update and View Retention Policy Binding", "section": "Configuration", "topic": "Update and View Retention Policy Binding", "body": "<ol class=\"content-ol\"><li>Select a retention policy from the Retention Policies menu.</li></ol>\n<p>o The Retention Policy Details screen is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_4cab25e9d3.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Available options:</li></ol>\n<p>a. Binding</p>\n<p>o Click Binding to view associated projects linked to the policy.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_180681a867.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>b. Modify Policy</p>\n<p>o Update the required fields and click Apply to save changes.</p>\n<p>c. View History</p>\n<p>o Review historical changes to the policy.</p>\n<figure class=\"content-figure\"><img src=\"images/img_cf1bcdb83e.png\" alt=\"\" loading=\"lazy\"></figure>"}, "archive-stores": {"badge": "Configuration", "title": "Archive Stores", "section": "Configuration", "topic": "Archive Stores", "body": "<p>An archive store is a storage location used to retain archived data. Omni Archive Manager</p>\n<p>supports the following storage platforms:</p>\n<p>Host Filesystem</p>\n<p>Amazon S3</p>\n<p>Hitachi Content Platform</p>\n<p>EMC Centera</p>\n<p>Hadoop</p>\n<p>Google Storage</p>\n<p>Azure Blob Storage</p>\n<p>Archive stores can be configured via:</p>\n<h3 class=\"content-h3\" id=\"h-configuration-archive-stores\">Configuration \u2192 Archive Stores</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_53dffc5f7c.png\" alt=\"\" loading=\"lazy\"></figure>"}, "view-an-archive-store": {"badge": "Configuration", "title": "View an Archive Store", "section": "Configuration", "topic": "View an Archive Store", "body": "<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Archive Stores.</li></ol>\n<p>o The Archive Stores screen is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_cbb3cd4a7e.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click an archive store name to view or modify its configuration.</li></ol>"}, "create-a-new-archive-store": {"badge": "Configuration", "title": "Create a New Archive Store", "section": "Configuration", "topic": "Create a New Archive Store", "body": "<ol class=\"content-ol\"><li>Click the + New button in the Archive Stores menu.</li></ol>\n<p>o The Archive Store Details screen is displayed.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_cd55bb6295.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter a name for the archive store.</li></ol>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>Use a consistent naming convention, such as:</p>\n<p>AppName_Location_AS</p>\n<p>Example: Ledger_Denver_AS</p>\n<ol class=\"content-ol\"><li>Select an Implementation from the dropdown:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-host-filesystem-local-or-mounted-file-system-e-g-c-archive\">o Host Filesystem \u2013 Local or mounted file system (e.g., C:\\Archives, /data/archives)</h3>\n<h3 class=\"content-h3\" id=\"h-o-amazon-s3-amazon-s3-storage\">o Amazon S3 \u2013 Amazon S3 storage</h3>\n<h3 class=\"content-h3\" id=\"h-o-hitachi-content-platform-hcp-storage\">o Hitachi Content Platform \u2013 HCP storage</h3>\n<h3 class=\"content-h3\" id=\"h-o-emc-centera-emc-centera-storage\">o EMC Centera \u2013 EMC Centera storage</h3>\n<h3 class=\"content-h3\" id=\"h-o-hadoop-hadoop-based-storage\">o Hadoop \u2013 Hadoop-based storage</h3>\n<h3 class=\"content-h3\" id=\"h-o-google-storage-google-cloud-storage\">o Google Storage \u2013 Google Cloud Storage</h3>\n<h3 class=\"content-h3\" id=\"h-o-azure-blob-storage-azure-blob-storage\">o Azure Blob Storage \u2013 Azure Blob Storage</h3>\n<figure class=\"content-figure\"><img src=\"images/img_10712a5ffc.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Provide the required parameters based on the selected implementation.</li></ol>\n<h3 class=\"content-h3\" id=\"h-host-filesystem-configuration\">Host Filesystem Configuration</h3>\n<ol class=\"content-ol\"><li>Click the pop-out icon next to the filePath field.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_38e8b21e7b.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The Select File Path window is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_35b5c07a72.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-the-directory-must-already-exist\">Note: The directory must already exist.</h3>\n<ol class=\"content-ol\"><li>Select the desired directory and click Set Path.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_fc1414899e.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The selected path appears in the filePath field.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_2e34b1f195.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click Apply to create the archive store.</li></ol>\n<h3 class=\"content-h3\" id=\"h-amazon-s3-configuration\">Amazon S3 Configuration</h3>\n<p>Provide the following details and click Save:</p>\n<p>accessKey</p>\n<p>secretKey</p>\n<p>bucketName</p>\n<p>region</p>\n<p>prefix</p>\n<figure class=\"content-figure\"><img src=\"images/img_2af25939d2.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-contact-technical-support-for-environment-specific-para\">Note: Contact technical support for environment-specific parameters.</h3>\n<h3 class=\"content-h3\" id=\"h-hitachi-content-platform-configuration\">Hitachi Content Platform Configuration</h3>\n<p>Provide the following details and click Save:</p>\n<p>userName</p>\n<p>password</p>\n<p>endpoint</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_a3667e22c9.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-contact-technical-support-for-environment-specific-para\">Note: Contact technical support for environment-specific parameters.</h3>\n<h3 class=\"content-h3\" id=\"h-emc-centera-configuration\">EMC Centera Configuration</h3>\n<p>Provide the following details and click Save:</p>\n<p>ipAddress</p>\n<p>peaFilePath</p>\n<figure class=\"content-figure\"><img src=\"images/img_523eb73138.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-contact-technical-support-for-required-configuration-de\">Note: Contact technical support for required configuration details.</h3>\n<h3 class=\"content-h3\" id=\"h-hadoop-configuration\">Hadoop Configuration</h3>\n<p>Provide the following details and click Save:</p>\n<p>hadoopUrl</p>\n<p>dirPath</p>\n<p>userName</p>\n<p>password</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_2b088b45cc.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-contact-technical-support-for-required-configuration-de\">Note: Contact technical support for required configuration details.</h3>\n<h3 class=\"content-h3\" id=\"h-google-storage-configuration\">Google Storage Configuration</h3>\n<p>Provide the following details and click Save:</p>\n<p>projectId</p>\n<p>privateKeyId</p>\n<p>privateKey</p>\n<p>clientEmail</p>\n<p>clientId</p>\n<p>bucketName</p>\n<p>prefix</p>\n<figure class=\"content-figure\"><img src=\"images/img_512169f70b.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-contact-technical-support-for-required-configuration-de\">Note: Contact technical support for required configuration details.</h3>\n<h3 class=\"content-h3\" id=\"h-azure-blob-storage-configuration\">Azure Blob Storage Configuration:</h3>\n\n<p>Provide the following details and click Apply:</p>\n<p>accountName</p>\n<p>accountKey</p>\n<p>containerName</p>\n<p>prefix</p>\n<p>endpoint</p>\n<figure class=\"content-figure\"><img src=\"images/img_993bccae73.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-contact-technical-support-for-environment-specific-para\">Note: Contact technical support for environment-specific parameters.</h3>"}, "extract-stores": {"badge": "Configuration", "title": "Extract Stores", "section": "Configuration", "topic": "Extract Stores", "body": "<p>An extract store is a storage location used to restore archived data back to its original format</p>\n<p>(for example, a file system or database).</p>\n<h3 class=\"content-h3\" id=\"h-create-a-new-extract-store\">Create a New Extract Store</h3>\n<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Extract Stores.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_d426f1dc14.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<ol class=\"content-ol\"><li>Click the + New button.</li></ol>\n<p>o The Extract Store Details window is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_88400ec142.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<p>a. Name</p>\n<p>o Provide a name that clearly represents the target host filesystem or destination.</p>\n<p>b. Implementation Type</p>\n<p>Select one of the following options:</p>\n<p>o Host Filesystem</p>\n<p>o JDBC Database</p>\n<p>o SharePoint</p>\n<p>o Cosmos DB</p>"}, "host-filesystem-configuration": {"badge": "Configuration", "title": "Host Filesystem Configuration", "section": "Configuration", "topic": "Host Filesystem Configuration", "body": "<ol class=\"content-ol\"><li>Click the pop-out icon next to the filePath field.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_1b5ede9049.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The Select File Path window is displayed.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_09aac6dcd0.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-the-directory-must-be-pre-created\">Note: The directory must be pre-created.</h3>\n<ol class=\"content-ol\"><li>Navigate to the desired location and click Set Path.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_25e1c655e1.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The selected path is displayed in the filePath field.</p>\n<figure class=\"content-figure\"><img src=\"images/img_c82bc08042.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Verify the path and click Save.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_becedb1b22.png\" alt=\"\" loading=\"lazy\"></figure>"}, "jdbc-database-configuration": {"badge": "Configuration", "title": "JDBC Database Configuration", "section": "Configuration", "topic": "JDBC Database Configuration", "body": "<ol class=\"content-ol\"><li>Select a Database Type from the dropdown:</li></ol>\n<p>o Oracle</p>\n<p>o Sybase</p>\n<p>o MS SQL</p>\n<p>o DB2</p>\n<figure class=\"content-figure\"><img src=\"images/img_1f21e7178d.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-mysql-is-not-supported-for-extract-stores\">Note: MySQL is not supported for extract stores.</h3>\n<ol class=\"content-ol\"><li>Enter the required parameters based on the selected database type (see sections below).</li><li>Click Test to validate the configuration.</li></ol>\n<p>o An error message is displayed if any parameters are incorrect.</p>\n<p>o A success message is displayed if the configuration is valid.</p>\n<figure class=\"content-figure\"><img src=\"images/img_8de7757cf3.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>After a successful test, click Save.</li></ol>\n"}, "oracle-configuration": {"badge": "Configuration", "title": "Oracle Configuration", "section": "Configuration", "topic": "Oracle Configuration", "body": "<ol class=\"content-ol\"><li>Select a Connection Type:</li></ol>\n<p>o SID</p>\n<p>o Service</p>\n<p>o RAC</p>\n<figure class=\"content-figure\"><img src=\"images/img_27ad332809.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-sid-configuration\">SID Configuration</h3>\n<p>Provide the following details:</p>\n<h3 class=\"content-h3\" id=\"h-version-select-11g-12c-or-19c\">version: Select 11g, 12c, or 19c</h3>\n<h3 class=\"content-h3\" id=\"h-hostname-database-host-name\">hostname: Database host name</h3>\n<h3 class=\"content-h3\" id=\"h-port-port-number\">port: Port number</h3>\n<h3 class=\"content-h3\" id=\"h-sid-service-enter-the-sid\">sid/service: Enter the SID</h3>\n<h3 class=\"content-h3\" id=\"h-schema-schema-name\">schema: Schema name</h3>\n<h3 class=\"content-h3\" id=\"h-user-database-user-id\">user: Database user ID</h3>\n<h3 class=\"content-h3\" id=\"h-password-user-password\">password: User password</h3>\n<figure class=\"content-figure\"><img src=\"images/img_1a94426f2e.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-service-configuration\">Service Configuration</h3>\n<p>Provide the following details:</p>\n<h3 class=\"content-h3\" id=\"h-version-select-11g-12c-or-19c\">version: Select 11g, 12c, or 19c</h3>\n<h3 class=\"content-h3\" id=\"h-hostname-database-host-name\">hostname: Database host name</h3>\n<h3 class=\"content-h3\" id=\"h-port-port-number\">port: Port number</h3>\n<h3 class=\"content-h3\" id=\"h-sid-service-enter-the-service-name\">sid/service: Enter the service name</h3>\n<h3 class=\"content-h3\" id=\"h-schema-schema-name\">schema: Schema name</h3>\n<h3 class=\"content-h3\" id=\"h-user-database-user-id\">user: Database user ID</h3>\n<h3 class=\"content-h3\" id=\"h-password-user-password\">password: User password</h3>\n<h3 class=\"content-h3\" id=\"h-rac-configuration\">RAC Configuration</h3>\n<p>Provide the following details:</p>\n<h3 class=\"content-h3\" id=\"h-version-select-11g-12c-or-19c\">version: Select 11g, 12c, or 19c</h3>\n<h3 class=\"content-h3\" id=\"h-host-port-enter-host-and-port-details\">host:port: Enter host and port details</h3>\n<h3 class=\"content-h3\" id=\"h-service-service-name\">service: Service name</h3>\n<h3 class=\"content-h3\" id=\"h-schema-schema-name\">schema: Schema name</h3>\n<h3 class=\"content-h3\" id=\"h-user-database-user-id\">user: Database user ID</h3>\n<h3 class=\"content-h3\" id=\"h-password-user-password\">password: User password</h3>"}, "sybase-configuration": {"badge": "Configuration", "title": "Sybase Configuration", "section": "Configuration", "topic": "Sybase Configuration", "body": "<p>Provide the following details and click Save:</p>\n<h3 class=\"content-h3\" id=\"h-version-default-is-15-x\">version: Default is 15.x</h3>\n<h3 class=\"content-h3\" id=\"h-hostname-host-name\">hostname: Host name</h3>\n<h3 class=\"content-h3\" id=\"h-port-port-number\">port: Port number</h3>\n<h3 class=\"content-h3\" id=\"h-instance-database-instance-name\">instance: Database instance name</h3>\n<h3 class=\"content-h3\" id=\"h-db-name-database-name\">db name: Database name</h3>\n<h3 class=\"content-h3\" id=\"h-user-database-user-id\">user: Database user ID</h3>\n<h3 class=\"content-h3\" id=\"h-password-user-password\">password: User password</h3>\n<figure class=\"content-figure\"><img src=\"images/img_9daa3d8ea5.png\" alt=\"\" loading=\"lazy\"></figure>\n"}, "ms-sql-configuration": {"badge": "Configuration", "title": "MS SQL Configuration", "section": "Configuration", "topic": "MS SQL Configuration", "body": "<p>Provide the following details:</p>\n<h3 class=\"content-h3\" id=\"h-version-select-2008-r2-or-2012\">version: Select 2008 R2 or 2012</h3>\n<h3 class=\"content-h3\" id=\"h-hostname-host-name\">hostname: Host name</h3>\n<h3 class=\"content-h3\" id=\"h-port-port-number\">port: Port number</h3>\n<h3 class=\"content-h3\" id=\"h-instance-database-instance-name\">instance: Database instance name</h3>\n<h3 class=\"content-h3\" id=\"h-db-name-database-name\">db name: Database name</h3>\n<h3 class=\"content-h3\" id=\"h-user-database-user-id\">user: Database user ID</h3>\n<h3 class=\"content-h3\" id=\"h-password-user-password\">password: User password</h3>\n<h3 class=\"content-h3\" id=\"h-masterkeypassword-master-key-password\">masterkeypassword: Master key password</h3>\n<p>The Master Key Password is an optional parameter used in the system. It is only required</p>\n<p>when working with encrypted data.</p>\n<figure class=\"content-figure\"><img src=\"images/img_f3823aca52.png\" alt=\"\" loading=\"lazy\"></figure>"}, "db2-configuration": {"badge": "Configuration", "title": "DB2 Configuration", "section": "Configuration", "topic": "DB2 Configuration", "body": "<p>Provide the following details and click Save:</p>\n<h3 class=\"content-h3\" id=\"h-version-default-is-11-1\">version: Default is 11.1</h3>\n<h3 class=\"content-h3\" id=\"h-hostname-host-name\">hostname: Host name</h3>\n<h3 class=\"content-h3\" id=\"h-port-port-number\">port: Port number</h3>\n<h3 class=\"content-h3\" id=\"h-schema-schema-name\">schema: Schema name</h3>\n<h3 class=\"content-h3\" id=\"h-db-name-database-name\">db name: Database name</h3>\n<h3 class=\"content-h3\" id=\"h-user-database-user-id\">user: Database user ID</h3>\n<h3 class=\"content-h3\" id=\"h-password-user-password\">password: User password</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_a8ca1db8de.png\" alt=\"\" loading=\"lazy\"></figure>"}, "sharepoint-configuration": {"badge": "Configuration", "title": "SharePoint Configuration", "section": "Configuration", "topic": "SharePoint Configuration", "body": "<p>Provide the following details and click Save:</p>\n<h3 class=\"content-h3\" id=\"h-client-id-client-id\">client_id: Client ID</h3>\n<h3 class=\"content-h3\" id=\"h-tenant-id-tenant-id\">tenant_id: Tenant ID</h3>\n<h3 class=\"content-h3\" id=\"h-client-secret-client-secret-key\">client_secret: Client secret key</h3>\n<h3 class=\"content-h3\" id=\"h-site-domain-sharepoint-site-domain\">site_domain: SharePoint site domain</h3>\n<figure class=\"content-figure\"><img src=\"images/img_f92e3e70c8.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-cosmos-db-configuration\">Cosmos DB Configuration</h3>\n<p>Provide the following details and click Save:</p>\n<h3 class=\"content-h3\" id=\"h-host-cosmos-db-account-endpoint-uri\">host: Cosmos DB account endpoint/URI</h3>\n<h3 class=\"content-h3\" id=\"h-primary-key-primary-key-for-the-account\">primary_key: Primary key for the account</h3>\n<h3 class=\"content-h3\" id=\"h-region-hosting-region\">region: Hosting region</h3>\n<h3 class=\"content-h3\" id=\"h-database-database-name\">database: Database name</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_410ed80896.png\" alt=\"\" loading=\"lazy\"></figure>"}, "metadata-templates": {"badge": "Configuration", "title": "Metadata Templates", "section": "Configuration", "topic": "Metadata Templates", "body": "<p>The Metadata Templates menu option allows users to define and store custom metadata</p>\n<p>associated with archived data within a project.</p>\n<p>For example, metadata attributes such as Department, Document Type, or identifiers linking</p>\n<p>data objects in Omni Archive Manager to external systems can be defined and maintained using</p>\n<p>metadata templates.</p>\n<figure class=\"content-figure\"><img src=\"images/img_3f933f56ad.png\" alt=\"\" loading=\"lazy\"></figure>"}, "create-a-new-metadata-template": {"badge": "Configuration", "title": "Create a New Metadata Template", "section": "Configuration", "topic": "Create a New Metadata Template", "body": "<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Metadata Templates.</li><li>Click the + New button.</li></ol>\n<p>o The Metadata Template Details window is displayed.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_43d2553842.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-template-name\">o Template Name</h3>\n<p>Provide a unique name for the metadata template.</p>\n<h3 class=\"content-h3\" id=\"h-o-template-description\">o Template Description</h3>\n<p>Enter a description outlining the purpose of the template and the attributes it</p>\n<p>contains.</p>\n<h3 class=\"content-h3\" id=\"h-o-attribute-name\">o Attribute Name</h3>\n<p>Specify the internal name of the metadata attribute.</p>\n<h3 class=\"content-h3\" id=\"h-o-attribute-label\">o Attribute Label</h3>\n<p>Provide a user-friendly label for the attribute.</p>\n<h3 class=\"content-h3\" id=\"h-o-attribute-type\">o Attribute Type</h3>\n<p>Select the appropriate data type from the following options:</p>\n<p>Text</p>\n<p>Numeric</p>\n<p>Date</p>\n<p>Enumerated</p>\n<h3 class=\"content-h3\" id=\"h-o-enumerated-values-if-applicable\">o Enumerated Values (if applicable)</h3>\n<p>If Enumerated is selected, click + Add to define a list of allowed values.</p>\n<p>Enter each value in the provided input field.</p>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>Enumerated attributes restrict input to predefined values, enabling consistent and controlled</p>\n<p>data entry.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_898ddff39b.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-o-attribute-description\">o Attribute Description</h3>\n<p>Provide a description for the attribute.</p>\n<h3 class=\"content-h3\" id=\"h-o-optional\">o Optional</h3>\n<p>Select this checkbox if the attribute is not mandatory.</p>\n<ol class=\"content-ol\"><li>Click Save to create the metadata template.</li></ol>"}, "users": {"badge": "Configuration", "title": "Users", "section": "Configuration", "topic": "Users", "body": "<p>The Users module enables administrators to create, manage, and control access for users</p>\n<p>within Omni Archive Manager. It provides functionality to define user accounts, assign roles,</p>\n<p>and manage permissions across domains and projects. This ensures secure access control,</p>\n<p>proper user governance, and alignment with organizational policies.</p>\n<h3 class=\"content-h3\" id=\"h-add-a-new-user\">Add a New User</h3>\n<p>To add a new user in Omni Archive Manager, the Admin must perform the following steps:</p>\n<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Users \u2192 Manage Users.</li><li>Click the + New button.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_e952113f98.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The User Details screen is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_d34475934c.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following information:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-name\">o Name</h3>\n<p>Enter the user\u2019s full name (e.g., Steve Smith).</p>\n<h3 class=\"content-h3\" id=\"h-o-email\">o Email</h3>\n<p>Enter the user\u2019s email address (e.g., steve.smith@acme.com).</p>\n<h3 class=\"content-h3\" id=\"h-o-active\">o Active</h3>\n<p>Enabled: User account is active and can access the system.</p>\n<p>Disabled: User account is inactive but retained for audit purposes.</p>\n<h3 class=\"content-h3\" id=\"h-o-password\">o Password</h3>\n<p>Enter the user\u2019s password.</p>\n<p>For new users: This is the initial password.</p>\n<p>For existing users: This can be used to reset the password.</p>\n<h3 class=\"content-h3\" id=\"h-o-re-enter-password\">o Re-enter Password</h3>\n<p>Re-enter the password for confirmation.</p>\n<ol class=\"content-ol\"><li>Click Save.</li></ol>\n<p>o The user is added and displayed in the Manage Users list.</p>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>New users are assigned the read-only role by default. Roles can be updated later.</p>\n<ol class=\"content-ol\"><li>To assign a role:</li></ol>\n<p>o Select the user from the Manage Users list.</p>\n\n<p>o Click Grant next to the desired role.</p>\n<p>o Click Apply to update the role.</p>\n<figure class=\"content-figure\"><img src=\"images/img_bbb4cfaa78.png\" alt=\"\" loading=\"lazy\"></figure>"}, "manage-existing-users": {"badge": "Configuration", "title": "Manage Existing Users", "section": "Configuration", "topic": "Manage Existing Users", "body": "<p>To modify user details, the Admin must perform the following steps:</p>\n<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Users \u2192 Manage Users.</li><li>Select the user to be modified.</li></ol>\n<p>o The User Details screen is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_e952113f98.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Update the required fields:</li></ol>\n<p>o Modify Name and Email, if required.</p>\n<p>o Click Reset Password to change the user\u2019s password.</p>\n<p>By clicking on the Reset button, the user\u2019s password is reverted to the default</p>\n<h3 class=\"content-h3\" id=\"h-password-assigned-by-the-system\">password assigned by the system.</h3>\n<p>o Click Grant to assign or update roles.</p>\n<ol class=\"content-ol\"><li>Click Apply to save the changes.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_bbb4cfaa78.png\" alt=\"\" loading=\"lazy\"></figure>"}, "user-project-mappings": {"badge": "Configuration", "title": "User Project Mappings", "section": "Configuration", "topic": "User Project Mappings", "body": "<p>To assign users to specific domains and projects:</p>\n<p>Only users with ReadOnly and Governance roles are listed in this section.</p>\n<h3 class=\"content-h3\" id=\"h-readonly-users-have-view-only-access-to-project-data\">ReadOnly Users: Have view-only access to project data</h3>\n<h3 class=\"content-h3\" id=\"h-governance-users-have-oversight-and-compliance-related-acces\">Governance Users: Have oversight and compliance-related access</h3>\n<h3 class=\"content-h3\" id=\"h-operations-users-are-not-listed-because\">Operations Users are not listed because:</h3>\n<p>o They already have full access to all projects</p>\n<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Users \u2192 User Project Mappings.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_e8c2532a0c.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select the user.</li></ol>\n<p>o The Mappings Detail page is displayed.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_f5235c302c.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Assign domains:</li></ol>\n<p>o Select domains from the Select Domain to grant permission list.</p>\n<p>o Click the forward arrow to move them to the Domain(s) Granted list.</p>\n<figure class=\"content-figure\"><img src=\"images/img_f3986986c4.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Assign projects:</li></ol>\n<p>o Select projects from the Select Project to grant permission list.</p>\n<p>o Click the forward arrow to move them to the Project(s) Granted list.</p>\n<figure class=\"content-figure\"><img src=\"images/img_7c390e43be.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click Apply to save the assignments.</li></ol>\n"}, "unassign-users-from-domains-and-projects": {"badge": "Configuration", "title": "Unassign Users from Domains and Projects", "section": "Configuration", "topic": "Unassign Users from Domains and Projects", "body": "<p>To remove domain and project access:</p>\n<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Users \u2192 User Project Mappings.</li><li>Select the user.</li></ol>\n<p>o The Mappings Detail page is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_e8c2532a0c.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Unassign domains:</li></ol>\n<p>o Select domains from the Domain(s) Granted list.</p>\n<p>o Click the backward arrow to move them back to the Select Domain to grant</p>\n<p>permission list.</p>\n<figure class=\"content-figure\"><img src=\"images/img_f5235c302c.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Unassign projects:</li></ol>\n<p>o Select projects from the Project(s) Granted list.</p>\n<p>o Click the backward arrow to move them back to the Select Project to grant</p>\n<p>permission list.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_7c390e43be.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click Apply to update the changes.</li></ol>"}, "disposition-hold": {"badge": "Configuration", "title": "Disposition Hold", "section": "Configuration", "topic": "Disposition Hold", "body": "<p>A Disposition Hold is a policy that prevents the deletion or destruction of archived data while</p>\n<p>the hold is active. It ensures that data is preserved for legal, regulatory, or other organizational</p>\n<p>requirements.</p>"}, "configure-a-new-disposition-hold": {"badge": "Configuration", "title": "Configure a New Disposition Hold", "section": "Configuration", "topic": "Configure a New Disposition Hold", "body": "<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Disposition Holds.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_ae0235c0c8.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click the + New button.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_c599911b7f.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The Disposition Hold Details window is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_afb3b059f5.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-name\">o Name</h3>\n<p>Provide a name for the disposition hold.</p>\n<h3 class=\"content-h3\" id=\"h-o-description\">o Description</h3>\n<p>Enter a description explaining the purpose of the hold.</p>\n<h3 class=\"content-h3\" id=\"h-o-type-of-hold\">o Type of Hold</h3>\n<p>Select one of the following options:</p>\n<p>Lega
