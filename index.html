ar</p>\n<ol class=\"content-ol\"><li>Select the required Project or Collection</li></ol>\n<h3 class=\"content-h3\" id=\"h-additional-configuration\">Additional Configuration</h3>\n<ol class=\"content-ol\"><li>Enter Retention Duration:</li></ol>\n<p>Specify the number of days the processed data should be retained in the query</p>\n<p>processing location</p>\n<figure class=\"content-figure\"><img src=\"images/img_bdb8b9182a.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>If Projects is selected:</li></ol>\n<p>Choose the Task Queued Date (archive date)</p>\n<figure class=\"content-figure\"><img src=\"images/img_8128894b9d.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-include-lob-data\">Include LOB Data</h3>\n<p>The Include LOB Data option allows users to include Large Object (LOB) data\u2014such as</p>\n<p>BLOBs or CLOBs\u2014in the SQL query results.</p>\n<p>When enabled, LOB data is included along with standard query results</p>\n<p>This is useful when detailed content (e.g., documents, large text fields) is required</p>\n<figure class=\"content-figure\"><img src=\"images/img_d8592c647a.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note\">Note</h3>\n<p>Including LOB data may increase query processing time</p>\n<p>It may also increase download time in the SQL Browser, depending on the data</p>\n<p>volume</p>\n<p>It is recommended to enable this option only when LOB data is specifically required.</p>\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<p>Click Start to execute the task immediately</p>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<p>To run later:</p>\n<p>o Select a schedule</p>\n<p>o Click Schedule</p>\n\n<h3 class=\"content-h3\" id=\"h-key-benefits\">Key Benefits</h3>\n<p>Enables querying of archived structured data</p>\n<p>Prepares data for SQL-based analysis</p>\n<p>Supports efficient access to archived datasets</p>"}, "trigger-task": {"badge": "Tasks", "title": "Trigger Task", "section": "Tasks", "topic": "Trigger Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Trigger Task is used to automatically initiate analysis when new or modified files are</p>\n<p>detected in a project. It enables real-time or event-driven processing by notifying the</p>\n<p>system and executing predefined actions.</p>\n<h3 class=\"content-h3\" id=\"h-creating-a-trigger-task\">Creating a Trigger Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n<ol class=\"content-ol\"><li>Select Trigger from the Task Type dropdown</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_48d84d8866.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<p>Choose a server-worker</p>\n<p>Or select None</p>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n<ol class=\"content-ol\"><li>Select the Project to associate with the trigger</li></ol>\n<h3 class=\"content-h3\" id=\"h-trigger-configuration\">Trigger Configuration</h3>\n<ol class=\"content-ol\"><li>Select Trigger Type:</li></ol>\n<p>Choose the type of trigger based on the event (e.g., file changes, updates)</p>\n<ol class=\"content-ol\"><li>Select Trigger:</li></ol>\n<p>Choose the specific trigger action to be executed</p>\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<p>Click Start to activate the trigger task immediately</p>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<p>To activate later:</p>\n<p>o Select a schedule</p>\n\n<p>o Click Schedule</p>\n<h3 class=\"content-h3\" id=\"h-key-benefits\">Key Benefits</h3>\n<p>Enables automated data processing</p>\n<p>Reduces manual intervention</p>\n<p>Ensures timely analysis of new or updated data</p>"}, "verify-task": {"badge": "Tasks", "title": "Verify Task", "section": "Tasks", "topic": "Verify Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Verify Task ensures data integrity by validating data between archive, extract, and</p>\n<p>source systems.</p>\n<h3 class=\"content-h3\" id=\"h-unstructured-data-is-verified-by-comparing-the-checksum\">Unstructured data is verified by comparing the checksum.</h3>\n<h3 class=\"content-h3\" id=\"h-structured-data-is-verified-by-comparing-the-row-count\">Structured data is verified by comparing the row count.</h3>\n<p>This process confirms that archived or extracted data matches the expected source.</p>\n<h3 class=\"content-h3\" id=\"h-steps-to-create-a-verify-task\">Steps to Create a Verify Task</h3>\n<h3 class=\"content-h3\" id=\"h-step-1-navigate-to-tasks\">Step 1: Navigate to Tasks</h3>\n<ol class=\"content-ol\"><li>Go to Tasks &gt; Tasks.</li><li>Click the + New button to create a new task.</li></ol>\n\n<h3 class=\"content-h3\" id=\"h-step-2-select-task-type\">Step 2: Select Task Type</h3>\n<ol class=\"content-ol\"><li>From the Task Type drop-down menu, select Verify.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_094906d2cb.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-step-3-select-node\">Step 3: Select Node</h3>\n<ol class=\"content-ol\"><li>From the Node drop-down menu, select the appropriate worker (server-worker)</li></ol>\n<p>where the verification should run.</p>\n<h3 class=\"content-h3\" id=\"h-step-4-select-project\">Step 4: Select Project</h3>\n<ol class=\"content-ol\"><li>From the Project drop-down menu, select the project you want to verify.</li></ol>\n<h3 class=\"content-h3\" id=\"h-step-5-choose-verification-type\">Step 5: Choose Verification Type</h3>\n<ol class=\"content-ol\"><li>From the Verification Type drop-down menu, select one of the following options:</li></ol>\n<h3 class=\"content-h3\" id=\"h-verify-archive-store-against-the-object-metadata\">Verify archive store against the object metadata</h3>\n<p>Validates archived data against its metadata records.</p>\n<h3 class=\"content-h3\" id=\"h-verify-archive-store-against-the-original-information-source\">Verify archive store against the original information source</h3>\n<p>Compares archived data directly with the original source system.</p>\n<h3 class=\"content-h3\" id=\"h-verify-extract-store-against-the-archive-source\">Verify extract store against the archive source</h3>\n<p>Compares extracted data with the archived data to ensure consistency.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_c78863f5a2.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-start-or-schedule-the-verify-task\">Start or Schedule the Verify Task</h3>\n<h3 class=\"content-h3\" id=\"h-to-start-immediately\">To Start Immediately</h3>\n<ol class=\"content-ol\"><li>Click Start to begin the verification process right away.</li></ol>\n<h3 class=\"content-h3\" id=\"h-to-schedule-for-later\">To Schedule for Later</h3>\n<ol class=\"content-ol\"><li>To run the task at a later date or time:</li></ol>\n<p>o Select the appropriate schedule from the drop-down options at the bottom</p>\n<p>of the screen.</p>\n<p>o Click Schedule to queue the task.</p>\n<h3 class=\"content-h3\" id=\"h-result\">Result</h3>\n<p>Once completed, the system verifies:</p>\n<p>Checksums for unstructured data</p>\n<p>Row counts for structured data</p>\n<p>This confirms that the data in the selected stores is accurate and consistent.</p>\n"}, "file-browser": {"badge": "Toolkit", "title": "File Browser", "section": "Toolkit", "topic": "File Browser", "body": "<h3 class=\"content-h3\" id=\"h-1-overview\">1. Overview</h3>\n<p>The File Browser module enables users to browse and manage unstructured data stored in:</p>\n<h3 class=\"content-h3\" id=\"h-archived-data\">Archived Data</h3>\n<h3 class=\"content-h3\" id=\"h-source-data\">Source Data</h3>\n<h3 class=\"content-h3\" id=\"h-capabilities\">Capabilities</h3>\n<p>View files</p>\n<p>Download files</p>\n<p>Upload files (restricted to Archived Data only)</p>\n<h3 class=\"content-h3\" id=\"h-2-accessing-the-file-browser\">2. Accessing the File Browser</h3>\n<p>Follow these steps to open the File Browser:</p>\n<ol class=\"content-ol\"><li>Navigate to:</li></ol>\n<h3 class=\"content-h3\" id=\"h-toolkit-content-browsers-file-browser\">Toolkit \u2192 Content Browsers \u2192 File Browser</h3>\n<figure class=\"content-figure\"><img src=\"images/img_4c0aea763e.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>The interface includes:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-left-panel\">o Left Panel:</h3>\n<p>Archived Data folders</p>\n<p>Source Data folders</p>\n\n<h3 class=\"content-h3\" id=\"h-o-main-panel\">o Main Panel:</h3>\n<p>File list (Name, Size, Last Modified Date)</p>\n<h3 class=\"content-h3\" id=\"h-o-right-panel\">o Right Panel:</h3>\n<p>File properties (visible upon file selection)</p>\n<h3 class=\"content-h3\" id=\"h-3-archived-data-operations\">3. Archived Data Operations</h3>\n<p>The Archived Data section supports full file management capabilities.</p>\n<figure class=\"content-figure\"><img src=\"images/img_27518b80d1.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-available-actions\">Available Actions</h3>\n<h3 class=\"content-h3\" id=\"h-action\">Action</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<h3 class=\"content-h3\" id=\"h-navigation\">Navigation</h3>\n<p>Browse folders using the left-hand panel</p>\n<h3 class=\"content-h3\" id=\"h-view-files\">View Files</h3>\n<p>Files are displayed in an Explorer-style interface</p>\n<h3 class=\"content-h3\" id=\"h-download\">Download</h3>\n<p>Download selected files</p>\n<h3 class=\"content-h3\" id=\"h-file-properties-view-file-details-in-the-right-hand-panel\">File Properties View file details in the right-hand panel</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_0a88e5fe95.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-4-source-data-operations\">4. Source Data Operations</h3>\n<p>The Source Data section provides access to source-level data with limited actions.</p>\n<figure class=\"content-figure\"><img src=\"images/img_09a559d7e4.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-available-actions\">Available Actions</h3>\n<h3 class=\"content-h3\" id=\"h-action\">Action</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<h3 class=\"content-h3\" id=\"h-navigation\">Navigation</h3>\n<p>Browse folders using the left-hand panel</p>\n<h3 class=\"content-h3\" id=\"h-view-files\">View Files</h3>\n<p>Files are displayed in an Explorer-style interface</p>\n<h3 class=\"content-h3\" id=\"h-download\">Download</h3>\n<p>Download selected files</p>\n<h3 class=\"content-h3\" id=\"h-upload\">Upload</h3>\n<p>Upload files (Maximum size: 1 GB)</p>\n<h3 class=\"content-h3\" id=\"h-file-properties-view-file-details-in-the-right-hand-panel\">File Properties View file details in the right-hand panel</h3>\n\n<h3 class=\"content-h3\" id=\"h-advanced-search\">Advanced Search</h3>\n<p>The Advanced Search option in the File Browser allows users to perform detailed and</p>\n<p>refined searches on archived files using multiple filters and criteria. This helps in quickly</p>\n<p>locating specific files based on metadata, content, and file properties.</p>\n<p>The Advanced Search button is enabled only after selecting an Archive Queued</p>\n<h3 class=\"content-h3\" id=\"h-date\">Date.</h3>\n<p>Advanced Search is supported only for archived data.</p>\n<p>Ensure that a valid archive date is selected in the File Browser before attempting to use the</p>\n<p>Advanced Search functionality.</p>\n<h3 class=\"content-h3\" id=\"h-accessing-advanced-search\">Accessing Advanced Search</h3>\n<ol class=\"content-ol\"><li>Click the Advanced Search button</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_e0418559cb.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>A side panel appears with multiple search filters</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_a1885bd05f.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-search-filters\">Search Filters</h3>\n<p>You can use one or more of the following fields to refine your search:</p>\n<h3 class=\"content-h3\" id=\"h-select-project-choose-the-project-to-search-within\">Select Project: Choose the project to search within</h3>\n<h3 class=\"content-h3\" id=\"h-select-queued-date-select-the-archive-date\">Select Queued Date: Select the archive date</h3>\n<h3 class=\"content-h3\" id=\"h-phrase-match-search-for-exact-phrases-within-file-content\">Phrase Match: Search for exact phrases within file content</h3>\n<h3 class=\"content-h3\" id=\"h-file-name-enter-the-file-name-partial-or-full\">File Name: Enter the file name (partial or full)</h3>\n<h3 class=\"content-h3\" id=\"h-owner-filter-files-by-owner-name\">Owner: Filter files by owner name</h3>\n<h3 class=\"content-h3\" id=\"h-archive-path-specify-the-archived-file-location\">Archive Path: Specify the archived file location</h3>\n\n<h3 class=\"content-h3\" id=\"h-path-search-based-on-the-original-file-path\">Path: Search based on the original file path</h3>\n<h3 class=\"content-h3\" id=\"h-file-size-filter-based-on-file-size\">File Size: Filter based on file size</h3>\n<h3 class=\"content-h3\" id=\"h-archive-file-size-filter-based-on-file-size\">Archive File Size: Filter based on file size</h3>\n<h3 class=\"content-h3\" id=\"h-mime-type-specify-file-type-e-g-application-pdf\">Mime Type: Specify file type (e.g., application/pdf)</h3>\n<h3 class=\"content-h3\" id=\"h-extension-filter-by-file-extension-e-g-txt-docx\">Extension: Filter by file extension (e.g., .txt, .docx)</h3>\n<h3 class=\"content-h3\" id=\"h-date-created-range-filter-by-file-creation-date\">Date Created Range: Filter by file creation date</h3>\n<h3 class=\"content-h3\" id=\"h-last-modified-range-filter-by-last-modified-date\">Last Modified Range: Filter by last modified date</h3>\n<h3 class=\"content-h3\" id=\"h-archive-date-range-filter-by-archive-date\">Archive Date Range: Filter by archive date</h3>\n<h3 class=\"content-h3\" id=\"h-metadata-attribute-search-using-custom-metadata-fields\">Metadata Attribute: Search using custom metadata fields</h3>\n<h3 class=\"content-h3\" id=\"h-pattern-type-identify-sensitive-or-structured-data-patterns-\">Pattern Type: Identify sensitive or structured data patterns (e.g., SSN format like xxx-</h3>\n<p>xx-xxxx)</p>\n<h3 class=\"content-h3\" id=\"h-search-all-returns-results-that-match-all-selected-criteria\">Search All: Returns results that match all selected criteria</h3>\n<h3 class=\"content-h3\" id=\"h-search-any-returns-results-that-match-any-of-the-selected-cr\">Search Any: Returns results that match any of the selected criteria</h3>"}, "sql-browser": {"badge": "Toolkit", "title": "SQL Browser", "section": "Toolkit", "topic": "SQL Browser", "body": "<p>Browsing Structured Data</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The SQL Browser enables users to access, and query structured archived data without</p>\n<p>restoring it from the archive store into a database. This allows efficient data analysis directly</p>\n<p>on archived content.</p>\n<p>Users with read-only access to a project can:</p>\n<p>Execute SQL queries</p>\n<p>View query results</p>\n<p>Save queries for future use</p>\n<p>Export results in CSV, JSON, and SQL formats</p>\n<h3 class=\"content-h3\" id=\"h-note-recently-executed-queries-are-stored-for-a-limited-peri\">Note: Recently executed queries are stored for a limited period.</h3>\n<h3 class=\"content-h3\" id=\"h-accessing-sql-browser\">Accessing SQL Browser</h3>\n<ol class=\"content-ol\"><li>Navigate to Toolkit \u2192 Content Browsers \u2192 SQL Browser</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_c49f52c721.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-key-capabilities\">Key Capabilities</h3>\n<p>Run queries on projects and collections</p>\n<p>Save and reuse frequently used queries</p>\n<p>Query multiple archives using collections</p>\n<p>Export query results in multiple formats</p>\n<p>A collection is a group of projects that allows querying across multiple archived datasets</p>\n<p>simultaneously.</p>\n<p>Querying Options</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The SQL Browser provides two methods to run queries on structured archived data:</p>\n<h3 class=\"content-h3\" id=\"h-option\">Option</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<p>Execute Drill Query</p>\n<p>Allows users to write and execute manual SQL queries</p>\n<p>Panel</p>\n<p>Helps users build queries using a guided interface (no SQL</p>\n<p>Query Builder</p>\n<p>knowledge required)</p>\n<h3 class=\"content-h3\" id=\"h-option-1-execute-drill-query-panel\">Option 1: Execute Drill Query Panel</h3>\n<p>Use this option if you are familiar with table structures and SQL queries.</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Select Object Type as Project from the dropdown</li></ol>\n\n<ol class=\"content-ol\"><li>Select the required Project</li><li>The Archive Store field is auto-populated</li><li>Select an Archive Date</li><li>Enter the SQL query in the Execute Drill Query textbox</li><li>Click Execute Query</li></ol>\n<p>The results are displayed in the results section</p>\n<figure class=\"content-figure\"><img src=\"images/img_856b3e0757.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-additional-actions\">Additional Actions</h3>\n<h3 class=\"content-h3\" id=\"h-action-description\">Action Description</h3>\n<p>Save</p>\n<p>Saves the query to the Saved Queries section</p>\n<p>Recent Stores the latest queries temporarily</p>\n<p>Clear Removes the query from the textbox</p>\n<h3 class=\"content-h3\" id=\"h-tip-use-this-option-when-you-know-table-names-columns-and-qu\">Tip: Use this option when you know table names, columns, and query structure.</h3>\n<h3 class=\"content-h3\" id=\"h-option-2-query-builder\">Option 2: Query Builder</h3>\n<p>Use this option if you are not familiar with database schema or SQL syntax.</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n\n<ol class=\"content-ol\"><li>Select Object Type as Project</li><li>Select the required Project</li><li>The Archive Store field is auto-populated</li><li>Select an Archive Date</li><li>Click + Add to open the Query Builder</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_bb8191c9a6.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-using-query-builder\">Using Query Builder</h3>\n<p>Add Tables</p>\n<p>Define Where conditions</p>\n<p>Configure Joins</p>\n<figure class=\"content-figure\"><img src=\"images/img_bb30662794.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>The system automatically generates the query</p>\n<p>The generated query appears in the Execute Drill Query section</p>\n\n<ol class=\"content-ol\"><li>Close the Query Builder window</li><li>Click Execute Query</li></ol>\n<p>Results are displayed in a table below the query section</p>\n<h3 class=\"content-h3\" id=\"h-notes\">Notes</h3>\n<p>The Object Type dropdown supports:</p>\n<h3 class=\"content-h3\" id=\"h-o-projects\">o Projects</h3>\n<h3 class=\"content-h3\" id=\"h-o-collections\">o Collections</h3>\n<p>Use Collections to query across multiple projects</p>\n<figure class=\"content-figure\"><img src=\"images/img_fa2a5778c8.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Export Query Results</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The SQL Browser allows users to export query results into the following formats:</p>\n<h3 class=\"content-h3\" id=\"h-csv\">CSV</h3>\n<h3 class=\"content-h3\" id=\"h-json\">JSON</h3>\n<h3 class=\"content-h3\" id=\"h-sql\">SQL</h3>\n<figure class=\"content-figure\"><img src=\"images/img_ff9ae7e783.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-exporting-results-50000-records\">Exporting Results (\u2264 50000 Records)</h3>\n<p>For smaller result sets:</p>\n<ol class=\"content-ol\"><li>Select the desired format from the Select Type dropdown</li><li>Click Export</li></ol>\n<p>The file is downloaded directly in the selected format</p>\n\n<h3 class=\"content-h3\" id=\"h-exporting-results-50000-records\">Exporting Results (&gt; 50000 Records)</h3>\n<p>For larger datasets, the system uses a Download Task.</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Click Export</li><li>A confirmation pop-up appears</li><li>Click Yes to proceed</li></ol>\n<h3 class=\"content-h3\" id=\"h-download-task-execution\">Download Task Execution</h3>\n<ol class=\"content-ol\"><li>The New Task screen opens with pre-populated details</li><li>Verify the information</li><li>Click Start</li></ol>\n<p>The download task begins processing</p>\n<h3 class=\"content-h3\" id=\"h-accessing-downloaded-files\">Accessing Downloaded Files</h3>\n<ol class=\"content-ol\"><li>Navigate to Toolkit \u2192 Content Browsers \u2192 Downloads</li><li>Locate the generated file in the Downloads</li><li>Click the file name to download</li></ol>\n<h3 class=\"content-h3\" id=\"h-key-notes\">Key Notes</h3>\n<p>Direct download is supported only for \u2264 50000 records</p>\n<p>For larger datasets, exporting is handled asynchronously via Download Task</p>\n<p>Ensure the Query Processing Task is completed before exporting large datasets</p>\n<p>Save Queries</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The SQL Browser allows users to save queries for future use. Saved queries help in:</p>\n<p>Reusing frequently executed queries</p>\n<p>Improving efficiency</p>\n\n<p>Avoiding repetitive query creation</p>\n<p>There is no limit to the number of queries that can be saved.</p>\n<figure class=\"content-figure\"><img src=\"images/img_a3eae1ac88.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-saving-a-query\">Saving a Query</h3>\n<p>Follow these steps to save a query:</p>\n<ol class=\"content-ol\"><li>Click Save after entering or executing a query</li><li>The Save SQL Query pop-out window appears</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_9688ac317a.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter a name for the query</li><li>Click Save</li></ol>\n<p>The query is stored in the Saved Queries section</p>\n<h3 class=\"content-h3\" id=\"h-key-notes\">Key Notes</h3>\n<p>Saved queries can be accessed anytime from the Saved Queries panel</p>\n<p>Queries are stored with user-defined names for easy identification</p>\n\n<p>Recent Queries</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The SQL Browser automatically stores recently executed queries in the Recent Queries</p>\n<p>section for quick access and reuse.</p>\n<figure class=\"content-figure\"><img src=\"images/img_4e7c1add0e.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-key-details\">Key Details</h3>\n<h3 class=\"content-h3\" id=\"h-feature\">Feature</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<p>Storage Limit</p>\n<p>Only the latest 20 queries are stored</p>\n<p>Retention Period Queries are preserved for a limited duration</p>\n<p>Accessibility</p>\n<p>Easily accessible from the Recent Queries panel</p>\n<h3 class=\"content-h3\" id=\"h-usage\">Usage</h3>\n<p>Quickly rerun recently executed queries</p>\n<p>Refer to recent query history without saving manually</p>\n<p>Search Saved Queries</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Saved Queries section provides search functionality to help users quickly locate</p>\n<p>previously saved queries.</p>\n<h3 class=\"content-h3\" id=\"h-searching-saved-queries\">Searching Saved Queries</h3>\n\n<p>Use the available search options within the Saved Queries section</p>\n<figure class=\"content-figure\"><img src=\"images/img_f8fd81690f.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Enter keywords based on:</p>\n<p>o Query name</p>\n<p>o Query owner</p>\n<p>Matching queries are displayed for quick access and reuse</p>\n<h3 class=\"content-h3\" id=\"h-important-notes\">Important Notes</h3>\n<p>Table names must not start with:</p>\n<p>o &quot;.&quot;</p>\n<p>o &quot;/&quot;</p>\n<p>To select multiple columns, use standard SQL format:</p>\n<p>SELECT * FROM &lt;tablename&gt;</p>\n<h3 class=\"content-h3\" id=\"h-unsupported-usage\">Unsupported Usage</h3>\n<p>The following clauses do not support &quot;/&quot;:</p>\n<h3 class=\"content-h3\" id=\"h-clause-type\">Clause Type</h3>\n<p>WHERE clause</p>\n<p>JOIN (ON clause)</p>\n\n<h3 class=\"content-h3\" id=\"h-clause-type\">Clause Type</h3>\n<p>Arithmetic expressions</p>\n<p>Share Saved Queries</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Saved Queries feature allows users to share queries with other users in the system. This</p>\n<p>enables:</p>\n<p>Collaboration between users</p>\n<p>Reuse of commonly used queries</p>\n<p>Standardization of query logic</p>\n<h3 class=\"content-h3\" id=\"h-sharing-a-saved-query\">Sharing a Saved Query</h3>\n<p>Follow these steps to share a query:</p>\n<ol class=\"content-ol\"><li>Click the Share icon next to the saved query</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_79847f49ce.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>In the pop-up window:</li></ol>\n<p>o Select users from the List of Users</p>\n<p>o Use the arrow icons to move selected users to the Selected list</p>\n<ol class=\"content-ol\"><li>Click Apply</li></ol>\n<p>The query is now shared with the selected users</p>\n\n<h3 class=\"content-h3\" id=\"h-key-notes\">Key Notes</h3>\n<p>Only saved queries can be shared</p>\n<p>Shared queries become accessible to selected users</p>\n<p>Querying Collections Using Free Form Query</p>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>This option allows users to run manual SQL queries on collections, enabling querying across</p>\n<p>multiple projects and archived datasets simultaneously.</p>\n<h3 class=\"content-h3\" id=\"h-steps-to-query-collections\">Steps to Query Collections</h3>\n<ol class=\"content-ol\"><li>Select Object Type as Collection from the dropdown</li><li>Select the required Collection</li></ol>\n<p>o If the collection has a date range, select the applicable date</p>\n<figure class=\"content-figure\"><img src=\"images/img_3fb43894a6.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click the Guide (!) icon to view:</li></ol>\n<p>o Guide to write queries</p>\n<p>o Supported SQL clauses</p>\n<ol class=\"content-ol\"><li>Enter the SQL query in the Execute Drill Query textbox</li><li>Click Execute Query</li></ol>\n<p>The results are displayed in a table below</p>\n\n<h3 class=\"content-h3\" id=\"h-post-query-actions\">Post-Query Actions</h3>\n<h3 class=\"content-h3\" id=\"h-action-description\">Action Description</h3>\n<p>Export Download results in CSV, JSON, or SQL formats</p>\n<p>Save</p>\n<p>Save query in the Saved Queries section</p>\n<p>Recent Automatically stored in Recent Queries</p>\n<p>Clear Remove query from the textbox</p>\n<h3 class=\"content-h3\" id=\"h-important-notes\">Important Notes</h3>\n<p>The Object Type dropdown includes:</p>\n<p>o Projects</p>\n<p>o Collections</p>\n<p>You must use the alias name in the query, not the project name</p>"}, "email-browser": {"badge": "Toolkit", "title": "Email Browser", "section": "Toolkit", "topic": "Email Browser", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Email Browser allows users to view and search the contents of Microsoft email</p>\n<h3 class=\"content-h3\" id=\"h-container-files-such-as\">container files such as:</h3>\n<h3 class=\"content-h3\" id=\"h-pst\">.pst</h3>\n<h3 class=\"content-h3\" id=\"h-ost\">.ost</h3>\n<p>To access email data, an Explore Task must be executed on the project to index and extract</p>\n<p>email contents from the information source.</p>\n<h3 class=\"content-h3\" id=\"h-accessing-email-browser\">Accessing Email Browser</h3>\n<ol class=\"content-ol\"><li>Navigate to Toolkit \u2192 Content Browsers \u2192 Email Browser</li><li>Select a Project from the dropdown</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_8884edcdd1.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<p>The system displays available email container data identified during the Explore task</p>\n<h3 class=\"content-h3\" id=\"h-email-details-displayed\">Email Details Displayed</h3>\n<figure class=\"content-figure\"><img src=\"images/img_0c55495d1e.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-field\">Field</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<p>Subject</p>\n<p>Email subject line</p>\n<p>Attachment Indicates presence of attachments</p>\n<p>Date</p>\n<p>Email date</p>\n<p>From</p>\n<p>Sender email address</p>\n<p>To</p>\n<p>Recipient email address</p>\n<h3 class=\"content-h3\" id=\"h-search-options\">Search Options</h3>\n<h3 class=\"content-h3\" id=\"h-1-basic-search\">1. Basic Search</h3>\n<p>Enter a keyword in the Search textbox</p>\n<p>Click Search</p>\n<h3 class=\"content-h3\" id=\"h-2-advanced-search\">2. Advanced Search</h3>\n<ol class=\"content-ol\"><li>Click Advanced Search</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_2e4e9c2343.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Provide the following details:</li></ol>\n<p>o From email ID</p>\n<p>o To email ID</p>\n<p>o Email subject</p>\n<p>o Date range</p>\n<ol class=\"content-ol\"><li>(Optional) Select Has Attachment checkbox</li><li>Click Submit</li></ol>\n<h3 class=\"content-h3\" id=\"h-3-header-row-search\">3. Header Row Search</h3>\n<p>Enter values directly in the column headers:</p>\n<p>o Subject</p>\n<p>o Date range</p>\n<p>o From</p>\n<p>o To</p>\n<h3 class=\"content-h3\" id=\"h-key-notes\">Key Notes</h3>\n<p>Email data is available only after running the Explore Task</p>\n<p>Supports efficient filtering using multiple search criteria</p>\n<p>Useful for analyzing large volumes of email data</p>"}, "aql-copilot": {"badge": "Toolkit", "title": "AQL-Copilot", "section": "Toolkit", "topic": "AQL-Copilot", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n\n<h3 class=\"content-h3\" id=\"h-aql-copilot-is-an-ai-powered-query-assistant-integrated-with\">AQL-Copilot is an AI-powered query assistant integrated within the system that allows users to</h3>\n<p>interact with archived data using natural language. Instead of writing complex SQL queries, users</p>\n<p>can simply ask questions in plain English and retrieve relevant results instantly.</p>\n<p>It enhances data accessibility, improves productivity, and simplifies querying for both technical</p>\n<p>and non-technical users.</p>\n<h3 class=\"content-h3\" id=\"h-navigation\">Navigation</h3>\n<h3 class=\"content-h3\" id=\"h-in-oam\">In OAM</h3>\n<p>Navigate to Toolkit \u2192 Content Browsers \u2192 AQL-Copilot</p>\n<p>This opens the AQL-Copilot interface</p>\n<figure class=\"content-figure\"><img src=\"images/img_64b03dfcad.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-welcome-screen\">Welcome Screen</h3>\n<p>The Welcome Screen allows users to select the dataset before querying.</p>\n<h3 class=\"content-h3\" id=\"h-options-available\">Options Available</h3>\n<h3 class=\"content-h3\" id=\"h-object-selection\">Object Selection:</h3>\n<p>o Choose between Project or Collection (OAM)</p>\n<h3 class=\"content-h3\" id=\"h-dropdown-selection\">Dropdown Selection:</h3>\n<p>o Select the required project/collection</p>\n<h3 class=\"content-h3\" id=\"h-archive-date\">Archive Date:</h3>\n<p>o Choose the date for which data is available</p>\n<h3 class=\"content-h3\" id=\"h-info-icon\">Info Icon:</h3>\n<p>o Provides additional details about selection</p>\n<h3 class=\"content-h3\" id=\"h-buttons\">Buttons:</h3>\n<h3 class=\"content-h3\" id=\"h-o-next-proceed-to-interactive-screen\">o Next \u2192 Proceed to interactive screen</h3>\n<h3 class=\"content-h3\" id=\"h-o-cancel-navigate-back-to-dashboard\">o Cancel \u2192 Navigate back to dashboard</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_201c648216.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-selecting-archive-date\">Selecting Archive Date</h3>\n<p>Use the Archive Date dropdown to select the required dataset</p>\n<p>Tooltips help identify available processed dates</p>\n<p>Only valid dates with processed data can be selected</p>\n<h3 class=\"content-h3\" id=\"h-error-handling\">Error Handling</h3>\n<p>If no data is available for the selected date:</p>\n<p>o An error message is displayed</p>\n<p>Users must select a valid archive date to proceed</p>\n<h3 class=\"content-h3\" id=\"h-interactive-screen\">Interactive Screen</h3>\n<p>The interactive screen is divided into two main sections:</p>\n<figure class=\"content-figure\"><img src=\"images/img_8f57583eef.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-left-panel\">Left Panel</h3>\n<p>Displays the selected dataset (Project/Collection + Date)</p>\n<p>Shows recent questions asked in the current session</p>\n<h3 class=\"content-h3\" id=\"h-reset-button\">Reset Button:</h3>\n<p>o Clears all data and questions</p>\n\n<p>o Returns to the welcome screen</p>\n<p>o Displays a confirmation message</p>\n<h3 class=\"content-h3\" id=\"h-right-panel\">Right Panel</h3>\n<h3 class=\"content-h3\" id=\"h-predefined-questions\">Predefined Questions:</h3>\n<p>o Common queries available for quick selection</p>\n<h3 class=\"content-h3\" id=\"h-query-textbox\">Query Textbox:</h3>\n<p>o Users can enter questions in simple English</p>\n<p>Supports natural language queries without SQL knowledge</p>\n<h3 class=\"content-h3\" id=\"h-asking-questions\">Asking Questions</h3>\n<p>Enter a question in the textbox such as:</p>\n<p>o \u201cShow all records from last month\u201d</p>\n<p>o \u201cList users with access to specific files\u201d</p>\n<p>Click to execute the query</p>\n<h3 class=\"content-h3\" id=\"h-viewing-results\">Viewing Results</h3>\n<p>Once the query is executed:</p>\n<p>Results are displayed in a tabular format</p>\n<p>Features include:</p>\n<h3 class=\"content-h3\" id=\"h-o-pagination-for-large-datasets\">o Pagination for large datasets</h3>\n<p>o Easy navigation through records</p>\n<h3 class=\"content-h3\" id=\"h-exporting-results\">Exporting Results</h3>\n<p>Results can be exported in the following formats:</p>\n<h3 class=\"content-h3\" id=\"h-o-csv\">o CSV</h3>\n<h3 class=\"content-h3\" id=\"h-o-json\">o JSON</h3>\n<h3 class=\"content-h3\" id=\"h-o-sql\">o SQL</h3>\n<h3 class=\"content-h3\" id=\"h-recent-questions\">Recent Questions</h3>\n<p>Displays previously asked questions in the current session</p>\n<p>Helps users quickly re-run queries</p>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>o History is session-based only</p>\n<p>o Not stored for long-term access</p>\n<h3 class=\"content-h3\" id=\"h-reset-functionality\">Reset Functionality</h3>\n<p>Clicking Reset:</p>\n<p>o Clears selected dataset</p>\n<p>o Removes all previous queries</p>\n<p>o Navigates back to the welcome screen</p>\n"}, "downloads": {"badge": "Toolkit", "title": "Downloads", "section": "Toolkit", "topic": "Downloads", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Downloads interface provides access to all non-expired downloadable files generated from</p>\n<p>previous download tasks.</p>\n<p>The module enables users to:</p>\n<p>View metadata associated with generated download files</p>\n<p>Filter files based on scope (Project / Collection)</p>\n<p>Search files using specific parameters</p>\n<p>Download selected files</p>\n<h3 class=\"content-h3\" id=\"h-accessing-the-downloads-module\">Accessing the Downloads Module</h3>\n<h3 class=\"content-h3\" id=\"h-step-1-navigate-to-downloads\">Step 1: Navigate to Downloads</h3>\n<ol class=\"content-ol\"><li>Log in to the application.</li><li>From the main navigation menu, go to:</li></ol>\n<p>Toolkit &gt; Content Browsers &gt; Downloads</p>\n<p>Upon selection, the Downloads Explorer screen is displayed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_671f45bb20.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-downloads-interface-components\">Downloads Interface Components</h3>\n<p>After navigation, the screen displays a tabular grid containing the following columns:</p>\n<h3 class=\"content-h3\" id=\"h-column-name-description\">Column Name Description</h3>\n<h3 class=\"content-h3\" id=\"h-file-name\">File Name</h3>\n<p>Name of the generated downloadable file</p>\n<h3 class=\"content-h3\" id=\"h-browser\">Browser</h3>\n<p>Source browser associated with the file</p>\n<h3 class=\"content-h3\" id=\"h-project\">Project</h3>\n<p>Associated project name</p>\n<h3 class=\"content-h3\" id=\"h-created\">Created</h3>\n<p>File creation date and timestamp</p>\n<h3 class=\"content-h3\" id=\"h-expiry\">Expiry</h3>\n<p>Expiration date of the file</p>\n<h3 class=\"content-h3\" id=\"h-status\">Status</h3>\n<p>Current availability status (e.g., AVAILABLE)</p>\n<h3 class=\"content-h3\" id=\"h-filtering-files\">Filtering Files</h3>\n<p>The Downloads module supports scope-based filtering.</p>\n<h3 class=\"content-h3\" id=\"h-step-2-apply-filter\">Step 2: Apply Filter</h3>\n\n<ol class=\"content-ol\"><li>Locate the Filter On dropdown menu at the top of the grid.</li><li>Select one of the following options:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-project-displays-files-grouped-by-project\">o Project \u2013 Displays files grouped by project</h3>\n<h3 class=\"content-h3\" id=\"h-o-collection-displays-files-grouped-by-collection\">o Collection \u2013 Displays files grouped by collection</h3>\n<p>The file list dynamically refreshes based on the selected filter.</p>\n<h3 class=\"content-h3\" id=\"h-searching-for-files\">Searching for Files</h3>\n<p>The module provides column-level search functionality.</p>\n<h3 class=\"content-h3\" id=\"h-step-3-use-search-fields\">Step 3: Use Search Fields</h3>\n<p>You may search files using the following parameters:</p>\n<h3 class=\"content-h3\" id=\"h-file-name\">File Name</h3>\n<h3 class=\"content-h3\" id=\"h-project-name\">Project Name</h3>\n<h3 class=\"content-h3\" id=\"h-created-date\">Created Date</h3>\n<h3 class=\"content-h3\" id=\"h-expiry-date\">Expiry Date</h3>\n<p>To perform a search:</p>\n<ol class=\"content-ol\"><li>Enter the search criteria in the respective column search field.</li><li>The grid auto-filters matching records.</li></ol>\n<h3 class=\"content-h3\" id=\"h-downloading-a-file\">Downloading a File</h3>\n<h3 class=\"content-h3\" id=\"h-step-4-download-file\">Step 4: Download File</h3>\n<ol class=\"content-ol\"><li>Identify the required file from the list.</li><li>Ensure the file status is AVAILABLE.</li><li>Click on the corresponding File Name hyperlink.</li><li>The file download process initiates automatically.</li></ol>\n<h3 class=\"content-h3\" id=\"h-functional-flow-summary\">Functional Flow Summary</h3>\n<ol class=\"content-ol\"><li>Navigate to Downloads.</li><li>Apply Project/Collection filter (if required).</li><li>Search using metadata fields (optional).</li><li>Click file name to download.</li></ol>"}, "clean-index": {"badge": "Toolkit", "title": "Clean Index", "section": "Toolkit", "topic": "Clean Index", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Clean Index feature allows users to remove indexed data related to:</p>\n<h3 class=\"content-h3\" id=\"h-archive-index\">Archive Index</h3>\n<h3 class=\"content-h3\" id=\"h-explore-index\">Explore Index</h3>\n<p>This helps in resetting or clearing indexed data, enabling re-indexing when required.</p>\n\n<h3 class=\"content-h3\" id=\"h-accessing-clean-index\">Accessing Clean Index</h3>\n<ol class=\"content-ol\"><li>Navigate to Toolkit \u2192 Clean Index</li><li>The Clean Index screen displays a list of projects</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_e89e1ce7b9.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-cleaning-index-data\">Cleaning Index Data</h3>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Select a Project from the list</li><li>The Name field is auto populated</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_43a4728b34.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select the Type:</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_30b705541e.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-o-archive\">o Archive</h3>\n<h3 class=\"content-h3\" id=\"h-o-explore\">o Explore</h3>\n<ol class=\"content-ol\"><li>Click Clean to initiate the cleaning process</li></ol>\n\n<h3 class=\"content-h3\" id=\"h-system-messages\">System Messages</h3>\n<h3 class=\"content-h3\" id=\"h-status-message\">Status Message</h3>\n<p>Success Indexes of explored data cleaned successfully for this project.</p>\n<p>Error</p>\n<p>Indexes of archived data do not exist for this project.</p>\n<h3 class=\"content-h3\" id=\"h-key-notes\">Key Notes</h3>\n<p>Cleaning removes indexed data but does not delete actual stored data</p>\n<p>After cleaning, indexing must be performed again to restore search capabilities</p>\n<p>Useful when re-indexing or resolving indexing issues</p>"}, "jdbc-schemas": {"badge": "Toolkit", "title": "JDBC Schemas", "section": "Toolkit", "topic": "JDBC Schemas", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The JDBC Schemas feature provides an optional tool to capture and manage the schema of a</p>\n<p>JDBC-based information source before archiving.</p>\n<p>It allows users to:</p>\n<p>Download and store the current schema of a JDBC database</p>\n<p>Sync schema changes in real-time</p>\n<p>Use schema relationships during archiving</p>\n<h3 class=\"content-h3\" id=\"h-key-features\">Key Features</h3>\n<p>Stores database schema in the Omni Archive Manager internal database</p>\n<p>Enables real-time schema synchronization</p>\n<p>Supports relationship-based archiving</p>\n<p>Works in conjunction with Business Functions for fine-grained data archiving</p>\n<h3 class=\"content-h3\" id=\"h-accessing-jdbc-schemas\">Accessing JDBC Schemas</h3>\n<ol class=\"content-ol\"><li>Navigate to Toolkit \u2192 JDBC Schemas</li><li>The JDBC Schemas screen is displayed</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_23cd2687f2.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-viewing-schema\">Viewing Schema</h3>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Select an Information Store from the dropdown</li><li>Click View</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_d449bcfc7f.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>The schema structure is displayed</p>\n<figure class=\"content-figure\"><img src=\"images/img_d28112ef30.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-syncing-schema\">Syncing Schema</h3>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Click Sync</li></ol>\n\n<p>The system retrieves the latest schema from the JDBC source</p>\n<p>Existing schema in the internal database is replaced</p>\n<h3 class=\"content-h3\" id=\"h-using-schema-in-archiving\">Using Schema in Archiving</h3>\n<p>When a schema is synced:</p>\n<p>o Archive tasks use defined relationships (joins)</p>\n<p>o Enables accurate and structured data archiving</p>\n<p>This is especially useful for:</p>\n<p>o Complex database relationships</p>\n<p>o Multi-table archiving scenarios</p>\n<h3 class=\"content-h3\" id=\"h-business-function-integration\">Business Function Integration</h3>\n<ol class=\"content-ol\"><li>Click Business Function</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_7a1f7c5940.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>The Business Function screen is displayed</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_5c2ff5003c.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click + New to create a new business function</li></ol>\n<p>Refer to the Business Functions section for detailed steps.</p>\n<h3 class=\"content-h3\" id=\"h-key-notes\">Key Notes</h3>\n<p>Schema sync is optional but recommended before archiving</p>\n<p>Syncing overwrites previously stored schema</p>\n<p>Helps maintain consistency between source and archived data</p>"}, "worker-monitor": {"badge": "Toolkit", "title": "Worker Monitor", "section": "Toolkit", "topic": "Worker Monitor", "body": "<h3 class=\"content-h3\" id=\"h-objective\">Objective</h3>\n\n<p>The Worker Monitor module provides centralized visibility and management of worker pools</p>\n<p>and individual workers, including their status (Idle, Busy, Inactive) and allocation.</p>\n<h3 class=\"content-h3\" id=\"h-prerequisites\">Prerequisites</h3>\n<p>Access to Toolkit \u2192 Worker Monitor</p>\n<p>Required permissions to create and manage worker pools</p>\n<p>Available worker nodes in the system</p>\n<h3 class=\"content-h3\" id=\"h-1-access-worker-monitor\">1. Access Worker Monitor</h3>\n<ol class=\"content-ol\"><li>Navigate to:</li></ol>\n<p>Dashboard \u2192 Toolkit \u2192 Worker Monitor</p>\n<figure class=\"content-figure\"><img src=\"images/img_0d17c26842.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>The Worker Monitor dashboard is displayed with:</li></ol>\n<p>o Worker Pools list</p>\n<p>o Worker status summary (Idle, Busy, Inactive)</p>\n<p>o Worker details within each pool</p>\n<h3 class=\"content-h3\" id=\"h-2-view-worker-pools-and-status\">2. View Worker Pools and Status</h3>\n<h3 class=\"content-h3\" id=\"h-pool-overview\">Pool Overview</h3>\n<p>Each row represents a Worker Pool with:</p>\n<h3 class=\"content-h3\" id=\"h-pool-name\">Pool Name</h3>\n<h3 class=\"content-h3\" id=\"h-number-of-workers\">Number of Workers</h3>\n<h3 class=\"content-h3\" id=\"h-idle-workers\">Idle Workers</h3>\n<h3 class=\"content-h3\" id=\"h-busy-workers\">Busy Workers</h3>\n<h3 class=\"content-h3\" id=\"h-inactive-workers\">Inactive Workers</h3>\n<h3 class=\"content-h3\" id=\"h-expand-pool\">Expand Pool</h3>\n<ol class=\"content-ol\"><li>Click the expand icon ( &gt; ) next to a pool</li><li>View detailed list of workers under that pool:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-worker-name\">o Worker Name</h3>\n\n<h3 class=\"content-h3\" id=\"h-o-status\">o Status</h3>\n<figure class=\"content-figure\"><img src=\"images/img_f23ac58bad.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-3-refresh-worker-data\">3. Refresh Worker Data</h3>\n<ol class=\"content-ol\"><li>Click: Refresh</li><li>The system updates:</li></ol>\n<p>o Worker status</p>\n<p>o Pool statistics</p>\n<p>o Availability metrics</p>\n<h3 class=\"content-h3\" id=\"h-4-create-a-new-worker-pool\">4. Create a New Worker Pool</h3>\n<ol class=\"content-ol\"><li>Click: + Add New Worker Pool</li><li>The Worker Pool Configuration panel opens</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_1db66b72a7.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-5-configure-worker-pool\">5. Configure Worker Pool</h3>\n\n<h3 class=\"content-h3\" id=\"h-5-1-enter-basic-details\">5.1 Enter Basic Details</h3>\n<ol class=\"content-ol\"><li>Provide:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-name-mandatory-max-80-characters\">o Name (mandatory, max 80 characters)</h3>\n<h3 class=\"content-h3\" id=\"h-o-description-optional-max-255-characters\">o Description (optional, max 255 characters)</h3>\n<h3 class=\"content-h3\" id=\"h-5-2-allocate-workers\">5.2 Allocate Workers</h3>\n<p>The interface contains two sections:</p>\n<h3 class=\"content-h3\" id=\"h-unallocated-workers\">Unallocated Workers</h3>\n<p>Displays available workers not assigned to any pool</p>\n<p>Includes search functionality:</p>\n<p>Search by Worker</p>\n<h3 class=\"content-h3\" id=\"h-allocated-workers\">Allocated Workers</h3>\n<p>Displays workers assigned to the current pool</p>\n<h3 class=\"content-h3\" id=\"h-5-3-assign-workers\">5.3 Assign Workers</h3>\n<p>Use control buttons between panels:</p>\n<p>&gt; \u2192 Move selected worker to Allocated</p>\n<p>&gt;&gt; \u2192 Move all workers to Allocated</p>\n<p>&lt; \u2192 Remove selected worker from pool</p>\n<p>&lt;&lt; \u2192 Remove all workers from pool</p>\n<h3 class=\"content-h3\" id=\"h-5-4-save-configuration\">5.4 Save Configuration</h3>\n<ol class=\"content-ol\"><li>Click:</li></ol>\n<p>Save</p>\n<ol class=\"content-ol\"><li>Worker pool is created and reflected in the Worker Monitor dashboard</li></ol>\n<h3 class=\"content-h3\" id=\"h-6-additional-actions\">6. Additional Actions</h3>\n<h3 class=\"content-h3\" id=\"h-reset-configuration\">Reset Configuration</h3>\n<p>Click: Reset</p>\n<p>Clears all unsaved changes</p>\n<h3 class=\"content-h3\" id=\"h-delete-pool\">Delete Pool</h3>\n<p>Click: Delete</p>\n<p>Removes the worker pool (if applicable and permitted)</p>\n<h3 class=\"content-h3\" id=\"h-7-worker-status-definitions\">7. Worker Status Definitions</h3>\n<h3 class=\"content-h3\" id=\"h-status-description\">Status Description</h3>\n<h3 class=\"content-h3\" id=\"h-idle\">Idle</h3>\n<p>Worker is available and ready to process tasks</p>\n<h3 class=\"content-h3\" id=\"h-busy\">Busy</h3>\n<p>Worker is currently executing a task</p>\n<h3 class=\"content-h3\" id=\"h-inactive-worker-is-not-available-or-disconnected\">Inactive Worker is not available or disconnected</h3>\n"}, "reports-2": {"badge": "Reports", "title": "Reports", "section": "Reports", "topic": "Reports", "body": "<p>The Reports module in Omni Archive Manager (OAM) provides operational, governance, and</p>\n<p>compliance visibility across archival activities. Reports are generated based on system metadata</p>\n<p>stored in the OMR (Omni Metadata Repository) and reflect real-time or historical system</p>\n<p>activity.</p>\n<p>The reporting categories are structured as follows:</p>\n<ol class=\"content-ol\"><li>Destruction Reports</li><li>Audit Reports</li><li>Project Reports</li><li>Archive Task Reports</li></ol>"}, "destruction-reports": {"badge": "Reports", "title": "Destruction Reports", "section": "Reports", "topic": "Destruction Reports", "body": "<p>The Destruction Reports screen displays records permanently removed from an archive store as</p>\n<p>part of a destroy task</p>\n<figure class=\"content-figure\"><img src=\"images/img_61cbd531ab.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>Provides audit evidence of records destroyed</p>\n<p>Supports regulatory and retention compliance validation</p>\n<p>Confirms execution of approved disposition workflows</p>\n<h3 class=\"content-h3\" id=\"h-navigation\">Navigation</h3>\n<h3 class=\"content-h3\" id=\"h-reports-destruction-reports\">Reports \u2192 Destruction Reports</h3>\n<h3 class=\"content-h3\" id=\"h-search-capabilities\">Search Capabilities</h3>\n<p>Users can search by:</p>\n<p>Owner</p>\n\n<p>Path</p>\n<h3 class=\"content-h3\" id=\"h-report-fields\">Report Fields</h3>\n<p>The report displays the following metadata attributes</p>\n<p>Object ID</p>\n<p>Modified</p>\n<p>Owner</p>\n<p>Ingested</p>\n<p>Destroyed</p>\n<p>Path</p>\n<p>Selecting a record opens detailed object metadata including:</p>\n<p>Created Date</p>\n<p>Original Size</p>\n<p>Archive Size</p>\n<p>MIME Type</p>\n<p>Retention Policy</p>\n<p>Retention Period</p>\n<p>Total Row Count</p>\n<p>Metadata Attributes</p>\n<p>This report provides full traceability of destroyed records.</p>"}, "audit-reports": {"badge": "Reports", "title": "Audit Reports", "section": "Reports", "topic": "Audit Reports", "body": "<p>The Audit Reports module provides a complete audit trail of user activity and system events</p>\n<figure class=\"content-figure\"><img src=\"images/img_3b38d5f72b.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<figure class=\"content-figure\"><img src=\"images/img_344a3eb201.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>Tracks user actions</p>\n<p>Records configuration changes</p>\n<p>Supports compliance and forensic analysis</p>\n<p>Provides user-level or full system activity logs</p>\n<h3 class=\"content-h3\" id=\"h-navigation\">Navigation</h3>\n<h3 class=\"content-h3\" id=\"h-reports-audit-reports\">Reports \u2192 Audit Reports</h3>\n<h3 class=\"content-h3\" id=\"h-report-configuration\">Report Configuration</h3>\n<p>Users must configure:</p>\n<ol class=\"content-ol\"><li>Audit Type</li></ol>\n<p>o Full Audit Log</p>\n<p>o By User</p>\n<ol class=\"content-ol\"><li>User Selection (if \u201cBy User\u201d is selected)</li><li>Date Range</li></ol>\n<p>Click Apply to generate the report.</p>\n<h3 class=\"content-h3\" id=\"h-report-fields\">Report Fields</h3>\n<p>User</p>\n<p>Event</p>\n<p>Entity</p>\n<p>New Value</p>\n<p>Old Value</p>\n<p>Timestamp (At)</p>\n<h3 class=\"content-h3\" id=\"h-export\">Export</h3>\n<p>Click Export to download the report in Microsoft Excel format.</p>\n<p>This report ensures complete system accountability and traceability.</p>"}, "project-reports": {"badge": "Reports", "title": "Project Reports", "section": "Reports", "topic": "Project Reports", "body": "<p>The Project Reports module provides analytical and statistical views of archived data within a</p>\n<p>selected project</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_702d8bec4b.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>Analyse archive content distribution</p>\n<p>Visualize file types, ownership, sizes, and timelines</p>\n<p>Support storage optimization and reporting</p>\n<h3 class=\"content-h3\" id=\"h-navigation\">Navigation</h3>\n<h3 class=\"content-h3\" id=\"h-reports-project-reports\">Reports \u2192 Project Reports</h3>\n<h3 class=\"content-h3\" id=\"h-report-parameters\">Report Parameters</h3>\n<ol class=\"content-ol\"><li>Select Project</li><li>Select Chart Type</li><li>Select View Dimension</li></ol>\n<h3 class=\"content-h3\" id=\"h-available-view-options\">Available View Options</h3>\n<p>File Type</p>\n<p>Created Date</p>\n<p>Last Modified Date</p>\n<p>Size</p>\n<p>Owners</p>\n<p>Charts display frequency distribution on the Y-axis and the selected dimension on the X-axis.</p>\n<p>Hovering over chart bars displays data volume details.</p>\n<h3 class=\"content-h3\" id=\"h-tabular-output\">Tabular Output</h3>\n<p>The report also includes a table with:</p>\n<p>Path</p>\n<p>Created Date</p>\n<p>Modified Date</p>\n<p>Owner</p>\n<p>MIME Type</p>\n<p>Original Size</p>\n<h3 class=\"content-h3\" id=\"h-output-options\">Output Options</h3>\n<p>Click Generate to create the report</p>\n<p>Click Download PDF to export the report</p>\n"}, "archive-task-reports": {"badge": "Reports", "title": "Archive Task Reports", "section": "Reports", "topic": "Archive Task Reports", "body": "<p>The Archive Task Reports module provides operational reporting on archive execution activity</p>\n<p>within a specified period</p>\n<figure class=\"content-figure\"><img src=\"images/img_3e0ce4037f.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-purpose\">Purpose</h3>\n<p>Monitor ingestion performance</p>\n<p>Validate row-level accuracy</p>\n<p>Track archive growth</p>\n<p>Review task execution status</p>\n<h3 class=\"content-h3\" id=\"h-navigation\">Navigation</h3>\n<h3 class=\"content-h3\" id=\"h-reports-archive-task-reports\">Reports \u2192 Archive Task Reports</h3>\n<h3 class=\"content-h3\" id=\"h-configuration\">Configuration</h3>\n<ol class=\"content-ol\"><li>Select Project</li><li>Select Start Date</li><li>Select End Date</li><li>Click Submit</li></ol>\n<h3 class=\"content-h3\" id=\"h-report-fields\">Report Fields</h3>\n<p>Day of Week</p>\n<p>Month / Day / Year</p>\n<p>Queue Date</p>\n<p>Status</p>\n<p>Original Size</p>\n<p>Archive Size</p>\n<p>Original Rows</p>\n<p>Archive Rows</p>\n<p>Tables</p>\n<p>Rows_DLTA</p>\n<p>Status Code</p>\n<p>Rows_DLTA_%</p>\n<p>Overall Summary</p>\n\n<div class=\"callout callout-note\"><div class=\"callout-icon\">i</div><div><div class=\"callout-label\">Note</div><p>This report supports ingestion validation and performance monitoring for structured and</p></div></div>\n<p>unstructured data archives only. Semi\u2011structured archives such as XML archive types are not</p>\n<p>supported.</p>"}, "disposition-workflow-2": {"badge": "Disposition Workflow", "title": "Disposition Workflow", "section": "Disposition Workflow", "topic": "Disposition Workflow", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Disposition Workflow feature enables users to:</p>\n<p>Generate reports of objects eligible for disposition</p>\n<p>Review associated domain, project, and object details</p>\n<p>Perform actions such as approval for destruction, transfer, or retention management</p>\n<p>This feature is critical for ensuring data lifecycle governance and compliance.</p>\n<h3 class=\"content-h3\" id=\"h-accessing-disposition-workflow\">Accessing Disposition Workflow</h3>\n<ol class=\"content-ol\"><li>Navigate to Disposition \u2192 Disposition Workflow</li><li>The Disposition Workflow screen is displayed</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_1e21168c73.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-generating-a-disposition-report\">Generating a Disposition Report</h3>\n<p>Follow these steps to generate a report:</p>\n<h3 class=\"content-h3\" id=\"h-1-select-domain\">1. Select Domain</h3>\n<p>Choose a Domain from the dropdown</p>\n<p>The domain-related details are displayed</p>\n<figure class=\"content-figure\"><img src=\"images/img_9fb0c539c8.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-2-select-project\">2. Select Project</h3>\n<p>Choose a Project from the dropdown</p>\n<p>Project-specific details and filters are displayed</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_d5c585f642.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-3-apply-actions\">3. Apply Actions</h3>\n<p>Select one of the following disposition actions:</p>\n<h3 class=\"content-h3\" id=\"h-approve-destruction\">Approve Destruction</h3>\n<h3 class=\"content-h3\" id=\"h-mark-for-transfer\">Mark For Transfer</h3>\n<h3 class=\"content-h3\" id=\"h-indefinite-retention\">Indefinite Retention</h3>\n<h3 class=\"content-h3\" id=\"h-mark-for-further-review\">Mark for Further Review</h3>\n<h3 class=\"content-h3\" id=\"h-place-on-hold\">Place on Hold</h3>\n<h3 class=\"content-h3\" id=\"h-remove-hold\">Remove Hold</h3>\n<h3 class=\"content-h3\" id=\"h-none\">None</h3>\n<h3 class=\"content-h3\" id=\"h-4-set-preview-days\">4. Set Preview Days</h3>\n<p>Enter the number of days in the Preview Days field</p>\n<p>This determines the range of data included in the report</p>\n<h3 class=\"content-h3\" id=\"h-5-generate-report\">5. Generate Report</h3>\n<p>Click Generate Report</p>\n<p>The system displays a report containing:</p>\n<p>Domain details</p>\n<p>Project details</p>\n<p>Object-level information</p>\n<h3 class=\"content-h3\" id=\"h-approving-objects-for-destruction\">Approving Objects for Destruction</h3>\n<h3 class=\"content-h3\" id=\"h-1-select-objects\">1. Select Objects</h3>\n<p>Use checkboxes to select objects for disposition</p>\n\n<h3 class=\"content-h3\" id=\"h-2-submit-for-approval\">2. Submit for Approval</h3>\n<p>Click Submit</p>\n<h3 class=\"content-h3\" id=\"h-3-confirm-action\">3. Confirm Action</h3>\n<p>The Confirm Destruction Approval window appears</p>\n<p>Enter your initials for confirmation</p>\n<p>Click Submit</p>"}, "terms-and-definitions-2": {"badge": "Terms and Definitions", "title": "Terms and Definitions", "section": "Terms and Definitions", "topic": "Terms and Definitions", "body": "<h3 class=\"content-h3\" id=\"h-archives\">Archives</h3>\n<p>Within Omni Archive Manager (OAM), an archive is a managed repository of records preserved</p>\n<p>for long-term retention, evidentiary purposes, and regulatory compliance. Archives contain data</p>\n<p>objects along with associated metadata required to maintain authenticity, integrity, and</p>\n<p>retrievability over time.</p>\n<p>The Storage Networking Industry Association (SNIA) defines an archive as \u201ca collection of data</p>\n<p>objects, perhaps with associated metadata, in a storage system whose primary purpose is the</p>\n<p>long-term preservation and retention of that data.\u201d</p>\n<p>In OAM, archives are logically separated from operational systems and backups and may be</p>\n<p>stored on WORM or non-WORM compliant storage depending on regulatory requirements.</p>\n<h3 class=\"content-h3\" id=\"h-data-archiving\">Data Archiving</h3>\n<p>Data archiving is the controlled process of transferring inactive or less-frequently accessed data</p>\n<p>from primary production systems to a dedicated archival repository optimized for durability,</p>\n<p>compliance, and long-term retention.</p>\n<p>Archived data in OAM is:</p>\n<p>Indexed for granular search and retrieval</p>\n<p>Preserved in a tamper-evident format</p>\n<p>Managed under defined retention and disposition rules</p>\n<p>Archiving differs from backup in that it supports regulatory retention, auditability, and lifecycle</p>\n<p>governance rather than disaster recovery alone.</p>\n\n<h3 class=\"content-h3\" id=\"h-data-retention-policy\">Data Retention Policy</h3>\n<p>A data retention policy is a formal governance framework defining how long specific categories</p>\n<p>of records must be retained to satisfy legal, regulatory, fiscal, operational, or historical</p>\n<p>obligations.</p>\n<p>In OAM, retention policies specify:</p>\n<p>Classification criteria</p>\n<p>Retention duration</p>\n<p>Legal hold conditions</p>\n<p>Disposition actions (archive, destroy, preserve)</p>\n<p>Metadata requirements for searchability and defensibility</p>\n<p>Retention rules are enforced automatically through lifecycle workflows.</p>\n<h3 class=\"content-h3\" id=\"h-data-store\">Data Store</h3>\n<p>A data store is a logical or physical repository that persists digital information. Examples include</p>\n<p>relational databases, file systems, object storage, and directory services.</p>\n<p>Data stored may include structured, semi-structured, or unstructured content such as:</p>\n<p>Text documents</p>\n<p>Images</p>\n<p>Audio/video files</p>\n<p>Application datasets</p>\n<p>OAM integrates with multiple data stores for ingestion and lifecycle management.</p>\n<h3 class=\"content-h3\" id=\"h-disposition\">Disposition</h3>\n<p>Disposition refers to the execution of retention decisions, including destruction, archival</p>\n<p>preservation, or transfer of records once their retention period has expired or conditions have</p>\n<p>been met.</p>\n<p>Disposition processes in OAM are policy-driven, auditable, and may require multi-stakeholder</p>\n<p>approval.</p>\n<h3 class=\"content-h3\" id=\"h-disposition-schedule\">Disposition Schedule</h3>\n<p>A disposition schedule (retention schedule) is a formal inventory of record classes or series that</p>\n<p>defines:</p>\n\n<p>Description and purpose of the records</p>\n<p>Responsible business unit</p>\n<p>Retention duration</p>\n<p>Final disposition action</p>\n<p>It operationalizes retention governance within the system.</p>\n<h3 class=\"content-h3\" id=\"h-file\">File</h3>\n<p>A file is an electronic document or digital object stored in a filesystem or repository. Within</p>\n<p>OAM, a file may represent a record or part of a record set.</p>\n<h3 class=\"content-h3\" id=\"h-ingest\">Ingest</h3>\n<p>Ingest is the controlled intake process by which data is imported into the archival system. The</p>\n<p>term originates from the Consultative Committee for Space Data Systems Open Archival</p>\n<p>Information System (OAIS) reference model.</p>\n<p>In OAM, ingest includes:</p>\n<p>Data extraction</p>\n<p>Metadata enrichment</p>\n<p>Indexing</p>\n<p>Compression and encryption</p>\n<p>Integrity verification</p>\n<h3 class=\"content-h3\" id=\"h-metadata\">Metadata</h3>\n<p>Metadata is structured descriptive information about a data object. It enables indexing,</p>\n<p>classification, retrieval, auditing, and lifecycle enforcement.</p>\n<p>Examples include:</p>\n<p>Creation date</p>\n<p>Record owner</p>\n<p>Retention classification</p>\n<p>MIME type</p>\n<p>Hash values</p>\n<h3 class=\"content-h3\" id=\"h-mime\">MIME</h3>\n<p>Multipurpose Internet Mail Extensions (MIME) is an Internet standard that identifies the nature</p>\n<p>and format of a file transmitted electronically. MIME types enable systems to determine content</p>\n<p>handling behaviour.</p>\n\n<h3 class=\"content-h3\" id=\"h-pdf\">PDF</h3>\n<p>Portable Document Format (PDF) is an open document standard maintained by the International</p>\n<p>Organization for Standardization (ISO). Originally developed by Adobe Systems, PDF preserves</p>\n<p>document formatting independent of platform or device.</p>\n<h3 class=\"content-h3\" id=\"h-pst\">PST</h3>\n<p>Personal Storage Table (PST) is a proprietary file format used by Microsoft Outlook to store</p>\n<p>emails, calendar entries, and other mailbox data locally. PST files are commonly ingested into</p>\n<p>OAM for regulatory preservation and migration.</p>\n<h3 class=\"content-h3\" id=\"h-rac\">RAC</h3>\n<p>Oracle Real Application Clusters (RAC) enables a single Oracle database to operate across</p>\n<p>multiple servers for high availability and horizontal scalability. RAC provides failover capabilities</p>\n<p>and session continuity while accessing shared storage infrastructure.</p>\n<h3 class=\"content-h3\" id=\"h-record\">Record</h3>\n<p>In OAM, a record is the atomic unit of managed content. It may consist of:</p>\n<p>A file</p>\n<p>A structured dataset</p>\n<p>An archive artifact</p>\n<p>Associated metadata</p>\n<p>Records are subject to classification, retention, audit, and disposition controls.</p>\n<h3 class=\"content-h3\" id=\"h-retention\">Retention</h3>\n<p>Retention is the controlled preservation of records according to an approved retention schedule.</p>\n<p>Records are stored in secure electronic formats and may be replicated to secondary media for</p>\n<p>resilience.</p>\n<p>Retention includes classification, monitoring, and enforcement of disposal eligibility.</p>\n<h3 class=\"content-h3\" id=\"h-retention-period\">Retention Period</h3>\n\n<p>The retention period is the defined time duration during which a record must be preserved</p>\n<p>before becoming eligible for disposition. The duration is determined by legal, regulatory,</p>\n<p>operational, or contractual obligations.</p>\n<h3 class=\"content-h3\" id=\"h-semi-structured-data\">Semi-Structured Data</h3>\n<p>Semi-structured data contains organizational properties but does not conform to strict relational</p>\n<p>schemas. Examples include:</p>\n<p>XML</p>\n<p>JSON</p>\n<p>Email content</p>\n<p>Intranet documents</p>\n<p>These formats contain hierarchical or tagged structures but allow flexible content</p>\n<p>representation.</p>\n<h3 class=\"content-h3\" id=\"h-service\">Service</h3>\n<p>In Oracle environments, a service represents one or more database instances grouped under a</p>\n<p>logical access name. The service name is the TNS alias used by clients for remote connectivity</p>\n<p>and workload routing.</p>\n<h3 class=\"content-h3\" id=\"h-sid\">SID</h3>\n<p>The System Identifier (SID) uniquely identifies an Oracle database instance on a host machine. It</p>\n<p>represents the local instance name within the Oracle environment.</p>\n<h3 class=\"content-h3\" id=\"h-sift-filter\">Sift Filter</h3>\n<p>Sift filters are regular expressions (regex) used to define search or extraction patterns within</p>\n<p>archives. They enable pattern-based filtering of content during ingest, exploration, or indexing</p>\n<p>operations.</p>\n<h3 class=\"content-h3\" id=\"h-stakeholders\">Stakeholders</h3>\n<p>OAM defines three stakeholder roles that participate primarily in the disposition workflow.</p>\n<p>Users (excluding Admin and Read-Only roles) may be assigned one of these stakeholder roles:</p>\n<p>Legal \u2013 Read-only access to records; participates in legal review and hold approvals.</p>\n<p>Compliance \u2013 Limited edit access within assigned departments or domains.</p>\n<p>Record Owner \u2013 Full edit and update authority over assigned records.</p>\n<p>In disposition workflows:</p>\n\n<p>A task must be approved by all three stakeholders before execution.</p>\n<p>System administrators retain override authority to execute tasks when necessary.</p>\n<p>This multi-party approval model ensures segregation of duties and regulatory defensibility.</p>\n<h3 class=\"content-h3\" id=\"h-structured-data\">Structured Data</h3>\n<p>Structured data is organized into predefined schemas, typically in tabular format (rows and</p>\n<p>columns), such as relational database tables.</p>\n<h3 class=\"content-h3\" id=\"h-trigger-event\">Trigger Event</h3>\n<p>A trigger event is a database-stored procedure that executes automatically in response to</p>\n<p>predefined actions (e.g., insert, update, delete operations).</p>\n<h3 class=\"content-h3\" id=\"h-unstructured-data\">Unstructured Data</h3>\n<p>Unstructured data lacks a predefined schema or relational model. Examples include:</p>\n<p>Word documents</p>\n<p>PDFs</p>\n<p>Images</p>\n<p>Audio and video files</p>\n<p>Such data requires indexing and metadata enrichment for effective governance.</p>\n<h3 class=\"content-h3\" id=\"h-worm-storage\">WORM Storage</h3>\n<p>WORM (Write Once, Read Many) storage prevents alteration or deletion of records once</p>\n<p>written. This ensures immutability and compliance with regulatory mandates such as SEC 17a-4.</p>\n<h3 class=\"content-h3\" id=\"h-requirements-of-a-records-management-application\">Requirements of a Records Management Application</h3>\n<p>A compliant records management system such as OAM must:</p>\n<ol class=\"content-ol\"><li>Optimize storage utilization while enforcing retention and disposition policies.</li><li>Identify and report records eligible for transfer, preservation, or destruction.</li><li>Maintain full lifecycle auditing and system activity tracking.</li><li>Support export of records and associated metadata for regulatory transfer.</li><li>Enable record modification (where permitted), metadata updates, or secure deletion.</li><li>Support legal holds and folder-level freezes preventing modification or removal.</li><li>Provide retrieval of indexes and preserved records from archival storage media.</li></ol>\n\n<p>These capabilities collectively ensure regulatory compliance, operational efficiency, and</p>\n<p>defensible information governance.</p>"}, "additional-system-architecture-and-functional-components-2": {"badge": "Additional: System Architecture and Functional Components", "title": "Additional: System Architecture and Functional Components", "section": "Additional: System Architecture and Functional Components", "topic": "Additional: System Architecture and Functional Components", "body": "<p>Infobelt Omni Archive Manager (OAM) is architected around modular functional blocks that</p>\n<p>enable scalable ingestion, governance enforcement, archival processing, and lifecycle control.</p>\n<p>The primary operational construct in OAM is the Project, under which execution is performed</p>\n<p>through configurable Tasks.</p>\n<figure class=\"content-figure\"><img src=\"images/img_725d777908.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-project\">Project</h3>\n<p>A Project represents a logical configuration that defines the complete data processing pipeline</p>\n<p>from source acquisition to archive storage and extraction. It encapsulates the technical</p>\n<p>components required to ingest, manage, and preserve data in a controlled and auditable</p>\n<p>manner.</p>\n<h3 class=\"content-h3\" id=\"h-a-project-consists-of-the-following-core-components\">A project consists of the following core components:</h3>\n<h3 class=\"content-h3\" id=\"h-1-information-source\">1. Information Source</h3>\n\n<p>The Information Source defines the origin system from which data is accessed or extracted.</p>\n<p>Supported source types may include:</p>\n<p>Relational databases (e.g., Oracle, SQL Server)</p>\n<p>File systems and network shares</p>\n<p>Email repositories (e.g., PST files)</p>\n<p>Application platforms</p>\n<p>Object storage systems</p>\n<p>The information source configuration includes connection parameters, authentication</p>\n<p>credentials, access controls, and data selection criteria. OAM interacts with the source system in</p>\n<p>a read-only or controlled-access mode to ensure source system integrity.</p>\n<h3 class=\"content-h3\" id=\"h-2-archive-store\">2. Archive Store</h3>\n<p>The Archive Store is the destination repository where archived artifacts are securely stored.</p>\n<p>It is optimized for:</p>\n<p>Long-term retention</p>\n<p>Compression and encryption</p>\n<p>Tamper-evident storage</p>\n<p>WORM or non-WORM configurations</p>\n<p>Integrity verification</p>\n<p>Archive stores may reside on:</p>\n<p>Local storage systems</p>\n<p>SAN/NAS infrastructure</p>\n<p>Object storage</p>\n<p>Cloud storage platforms</p>\n<p>Each archive artifact stored includes associated metadata, hash values, and indexing structures</p>\n<p>to ensure future retrievability and defensibility.</p>\n<h3 class=\"content-h3\" id=\"h-3-extract-store\">3. Extract Store</h3>\n<p>The Extract Store defines the destination location where archived data can be restored or</p>\n<p>exported in a usable format for operational, audit, legal, or analytical purposes.</p>\n<p>Key characteristics:</p>\n<p>Controlled restoration environment</p>\n<p>Supports selective extraction (partial or full datasets)</p>\n<p>Maintains metadata integrity during export</p>\n<p>Enables structured data export without rehydration into production systems</p>\n\n<p>This component supports eDiscovery workflows and regulatory data requests without impacting</p>\n<p>the primary archive repository.</p>\n<h3 class=\"content-h3\" id=\"h-4-smart-channel\">4. Smart Channel</h3>\n<p>The Smart Channel acts as a governance injection and metadata enrichment layer within the</p>\n<p>project configuration.</p>\n<p>It allows operations to:</p>\n<p>Attach retention policies</p>\n<p>Apply record classification codes</p>\n<p>Inject business metadata</p>\n<p>Assign stakeholders</p>\n<p>Enforce compliance rules</p>\n<p>Smart Channels ensure that governance and lifecycle controls are applied at the point of</p>\n<p>ingestion rather than retroactively, enabling policy-driven automation and compliance-by-</p>\n<p>design.</p>\n<h3 class=\"content-h3\" id=\"h-tasks\">Tasks</h3>\n<p>Tasks are executable operations configured within a Project. They perform specific lifecycle or</p>\n<p>processing actions against the defined information source and archive store.</p>\n<p>Each task execution is logged and audited to maintain full traceability.</p>\n<h3 class=\"content-h3\" id=\"h-common-task-types\">Common Task Types</h3>\n<h3 class=\"content-h3\" id=\"h-archive\">Archive</h3>\n<p>Extracts selected data from the information source, processes it (compression,</p>\n<p>encryption, hashing), and stores it in the archive store with associated metadata.</p>\n<h3 class=\"content-h3\" id=\"h-explore\">Explore</h3>\n<p>Analysis source data without archiving it. Used for data discovery, volume estimation,</p>\n<p>and classification validation.</p>\n<h3 class=\"content-h3\" id=\"h-index\">Index</h3>\n<p>Creates or updates searchable indexes for archived artifacts to enable full-text and</p>\n<p>metadata-based retrieval.</p>\n<h3 class=\"content-h3\" id=\"h-verify\">Verify</h3>\n<p>Performs integrity validation using cryptographic hash comparison to ensure that</p>\n<p>archived data has not been altered or corrupted.</p>\n<h3 class=\"content-h3\" id=\"h-compress\">Compress</h3>\n<p>Applies data compression algorithms to optimize storage utilization.</p>\n\n<h3 class=\"content-h3\" id=\"h-destroy\">Destroy</h3>\n<p>Executes policy-driven disposition actions once retention conditions are satisfied and</p>\n<p>approvals are obtained.</p>\n<h3 class=\"content-h3\" id=\"h-extract\">Extract</h3>\n<p>Restores archived data into the extract store in a controlled and auditable manner.</p>\n<p>Additional task types may be configured depending on deployment requirements.</p>\n<h3 class=\"content-h3\" id=\"h-architectural-perspective\">Architectural Perspective</h3>\n<p>From a system design standpoint:</p>\n<h3 class=\"content-h3\" id=\"h-projects-define-the-data-pipeline-and-governance-framework\">Projects define the data pipeline and governance framework.</h3>\n<h3 class=\"content-h3\" id=\"h-tasks-execute-operational-workflows-within-that-framework\">Tasks execute operational workflows within that framework.</h3>\n<p>Governance rules are enforced through Smart Channels.</p>\n<p>Archive and Extract Stores ensure separation of preservation and operational</p>\n<p>restoration.</p>\n<p>This modular architecture enables horizontal scalability, distributed worker execution,</p>\n<p>regulatory defensibility, and secure lifecycle management across enterprise environments.</p>"}, "functional-and-technical-components-of-infobelt-omni-archive": {"badge": "Additional: System Architecture and Functional Components", "title": "Functional and Technical Components of Infobelt Omni Archive Manager", "section": "Additional: System Architecture and Functional Components", "topic": "Functional and Technical Components of Infobelt Omni Archive Manager", "body": "<p>Infobelt Omni Archive Manager (OAM) is built using a layered architecture that separates user</p>\n<p>operations, processing logic, and storage components. This design ensures scalability,</p>\n<p>performance, and compliance.</p>\n<figure class=\"content-figure\"><img src=\"images/img_d118fb16d5.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-functional-components-what-the-system-does\">Functional Components (What the System Does)</h3>\n<h3 class=\"content-h3\" id=\"h-1-data-operations\">1. Data Operations</h3>\n<p>These are the main processing tasks:</p>\n<h3 class=\"content-h3\" id=\"h-archive-move-data-from-source-to-archive\">Archive \u2013 Move data from source to archive</h3>\n<h3 class=\"content-h3\" id=\"h-explore-analyse-source-data-before-archiving\">Explore \u2013 Analyse source data before archiving</h3>\n<h3 class=\"content-h3\" id=\"h-compress-reduce-storage-size\">Compress \u2013 Reduce storage size</h3>\n<h3 class=\"content-h3\" id=\"h-verify-check-data-integrity\">Verify \u2013 Check data integrity</h3>\n<h3 class=\"content-h3\" id=\"h-index-make-archived-data-searchable\">Index \u2013 Make archived data searchable</h3>\n<h3 class=\"content-h3\" id=\"h-extract-restore-archived-data\">Extract \u2013 Restore
