l</p>\n<p>Regulatory</p>\n<p>Other</p>\n<figure class=\"content-figure\"><img src=\"images/img_9b6f635eb1.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<ol class=\"content-ol\"><li>Click Save to create the disposition hold.</li></ol>"}, "retention-triggers": {"badge": "Configuration", "title": "Retention Triggers", "section": "Configuration", "topic": "Retention Triggers", "body": "<p>A Retention Trigger defines an event that initiates or terminates the retention period for</p>\n<p>archived data based on a retention policy.</p>\n<p>For example, a retention trigger can start the retention period when an account reaches a zero</p>\n<p>balance and is officially closed.</p>\n<figure class=\"content-figure\"><img src=\"images/img_119bafce3f.png\" alt=\"\" loading=\"lazy\"></figure>"}, "create-a-new-retention-trigger": {"badge": "Configuration", "title": "Create a New Retention Trigger", "section": "Configuration", "topic": "Create a New Retention Trigger", "body": "<ol class=\"content-ol\"><li>Navigate to Configuration \u2192 Retention Triggers.</li><li>Click the + New button.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_90e44f1f1a.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The Retention Trigger Details window is displayed.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_09480d46ad.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-name\">o Name</h3>\n<p>Provide a unique name for the retention trigger.</p>\n<h3 class=\"content-h3\" id=\"h-o-description\">o Description</h3>\n<p>Enter a description explaining the purpose of the trigger.</p>\n<h3 class=\"content-h3\" id=\"h-o-project\">o Project</h3>\n<p>Select the applicable project from the dropdown menu.</p>\n<h3 class=\"content-h3\" id=\"h-o-retention-trigger-type\">o Retention Trigger Type</h3>\n<p>Select the appropriate trigger type.</p>\n<p>Based on the selected type, additional fields will be displayed.</p>\n<h3 class=\"content-h3\" id=\"h-o-update-metadata\">o Update Metadata</h3>\n<p>This option appears based on the selected trigger type.</p>\n<p>Select the appropriate value from the dropdown.</p>\n<h3 class=\"content-h3\" id=\"h-o-retention-policy\">o Retention Policy</h3>\n<p>Displayed based on the Update Metadata selection.</p>\n<p>Select the applicable retention policy.</p>\n<h3 class=\"content-h3\" id=\"h-o-retention-action\">o Retention Action</h3>\n<p>Choose one of the following:</p>\n<h3 class=\"content-h3\" id=\"h-apply-retention-retains-data-from-the-current-date-for-the-d\">Apply Retention: Retains data from the current date for the duration</h3>\n<p>defined in the retention policy.</p>\n<h3 class=\"content-h3\" id=\"h-remove-retention-makes-the-data-eligible-for-destruction\">Remove Retention: Makes the data eligible for destruction.</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_b95439710f.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-o-business-function\">o Business Function</h3>\n<p>Select a business function to apply the trigger to a subset of project data.</p>\n<p>When selected, additional fields such as Name and Clause (e.g., SQL</p>\n<p>conditions like location or SELECT id FROM location) appear under</p>\n<p>Advanced Properties.</p>\n<figure class=\"content-figure\"><img src=\"images/img_6d7e6ba708.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-o-active\">o Active</h3>\n<p>Enable this checkbox to activate the retention trigger.</p>\n<h3 class=\"content-h3\" id=\"h-o-partition-sql\">o Partition SQL</h3>\n<p>Provide the SQL expression used to define data partitioning logic.</p>\n<ol class=\"content-ol\"><li>Click Save to create the retention trigger.</li></ol>\n"}, "user-groups": {"badge": "Configuration", "title": "User Groups", "section": "Configuration", "topic": "User Groups", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The User Groups module enables administrators to create and manage logical groupings of</p>\n<p>users, domains, and projects. These groups are used to control access, permissions, and</p>\n<p>operational scope within the platform.</p>\n<h3 class=\"content-h3\" id=\"h-key-capabilities\">Key Capabilities</h3>\n<p>Create and manage user groups</p>\n<p>Assign users, domains, and projects to a group</p>\n<p>Control access via grouped permissions</p>\n<p>View and manage query-level permissions</p>\n<h3 class=\"content-h3\" id=\"h-accessing-user-groups\">Accessing User Groups</h3>\n<p>Follow these steps to navigate to the User Groups module:</p>\n<ol class=\"content-ol\"><li>Go to:</li></ol>\n<h3 class=\"content-h3\" id=\"h-dashboard-configurations-user-groups\">Dashboard \u2192 Configurations \u2192 User Groups</h3>\n<figure class=\"content-figure\"><img src=\"images/img_0bb7b076fb.png\" alt=\"\" loading=\"lazy\"></figure>"}, "creating-a-new-group": {"badge": "Configuration", "title": "Creating a New Group", "section": "Configuration", "topic": "Creating a New Group", "body": "<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Click + Add</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_fea6ddaa8f.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>The New Group screen is displayed</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_99dd9dcc43.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-name-mandatory\">o Name (mandatory)</h3>\n<h3 class=\"content-h3\" id=\"h-o-description-optional-max-255-characters\">o Description (optional, max 255 characters)</h3>\n<ol class=\"content-ol\"><li>Assign entities using tabs:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-users\">o Users</h3>\n<h3 class=\"content-h3\" id=\"h-o-domains\">o Domains</h3>\n<h3 class=\"content-h3\" id=\"h-o-projects\">o Projects</h3>\n<h3 class=\"content-h3\" id=\"h-tabs-overview\">Tabs Overview</h3>\n<h3 class=\"content-h3\" id=\"h-users-tab\">Users Tab</h3>\n<p>Assign users to the group</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_99dd9dcc43.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-domains-tab\">Domains Tab</h3>\n<p>Assign domains accessible to the group</p>\n<figure class=\"content-figure\"><img src=\"images/img_0d649d6323.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-projects-tab\">Projects Tab</h3>\n<p>Assign projects under the group</p>\n<figure class=\"content-figure\"><img src=\"images/img_a725fc5e4d.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-create-group\">Create Group</h3>\n<p>Click Create Group to save</p>\n<p>Group is added to the system and visible in listing</p>"}, "editing-a-group": {"badge": "Configuration", "title": "Editing a Group", "section": "Configuration", "topic": "Editing a Group", "body": "<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Select a group from the list</li><li>The Edit Group screen is displayed</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_30960725b7.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-editable-fields\">Editable Fields</h3>\n<p>You can modify key details of a group, including the Name, Description, and assignments such as</p>\n<p>Users, Domains, and Projects. Once changes are made, use the available actions to manage the</p>\n<p>group effectively. The Update Group action saves all modifications; Delete Group removes the</p>\n<p>group from the system, and View Query Permissions allows you to access and review the</p>\n<p>permissions assigned to the group.</p>\n<h3 class=\"content-h3\" id=\"h-delete-group\">Delete Group</h3>\n<h3 class=\"content-h3\" id=\"h-process\">Process</h3>\n<ol class=\"content-ol\"><li>Click Delete Group</li><li>Confirmation dialog appears:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-no-cancel-action\">o No \u2192 Cancel action</h3>\n<h3 class=\"content-h3\" id=\"h-o-yes-confirm-deletion\">o Yes \u2192 Confirm deletion</h3>\n<h3 class=\"content-h3\" id=\"h-behavior\">Behavior</h3>\n<p>Group is permanently deleted upon confirmation</p>\n<p>Associated mappings are removed</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_d76baa94a0.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-query-permissions-panel\">Query Permissions Panel</h3>\n<p>The Query Permissions panel opens as a side panel and provides a read-only view of queries</p>\n<p>accessible to the selected group. It displays key details such as the Query Name and Query</p>\n<h3 class=\"content-h3\" id=\"h-owner-helping-users-understand-which-queries-are-available-a\">Owner, helping users understand which queries are available and who created them. This panel</h3>\n<p>is designed for visibility only and does not allow modifications. Overall, the group management</p>\n<p>functionality supports creating, editing, and deleting groups, as well as assigning users, domains,</p>\n<p>and projects, along with the ability to view query permissions.</p>\n<h3 class=\"content-h3\" id=\"h-access\">Access</h3>\n<p>Click View Query Permissions in Edit Group screen</p>\n<figure class=\"content-figure\"><img src=\"images/img_f5a3a229d3.png\" alt=\"\" loading=\"lazy\"></figure>"}, "project-2": {"badge": "Project", "title": "Project", "section": "Project", "topic": "Project", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n\n<p>A Project is the central entity where all system activities and data management are organized. It</p>\n<p>defines the configuration required to:</p>\n<p>Connect to and authenticate data sources</p>\n<p>Store data in an archive location</p>\n<p>Maintain associated metadata</p>\n<p>Projects serve as the foundation for managing data workflows within the system.</p>"}, "project-wizard": {"badge": "Project", "title": "Project Wizard", "section": "Project", "topic": "Project Wizard", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Project Wizard provides a guided workflow to create and configure a new project. It allows</p>\n<p>users to define:</p>\n<p>Domain and project details</p>\n<p>Information store configuration</p>\n<p>Sift filters</p>\n<p>Governance policies</p>\n<p>Smart channels</p>\n<p>Stakeholders</p>\n<p>A project can be created using either:</p>\n<h3 class=\"content-h3\" id=\"h-project-wizard-or\">Project Wizard, or</h3>\n<h3 class=\"content-h3\" id=\"h-browse-projects-menu\">Browse Projects menu</h3>\n<h3 class=\"content-h3\" id=\"h-creating-a-new-project-using-project-wizard\">Creating a New Project Using Project Wizard</h3>\n<p>Follow the steps below:</p>\n<h3 class=\"content-h3\" id=\"h-1-navigate-to-project-wizard\">1. Navigate to Project Wizard</h3>\n<p>Go to Projects \u2192 Project Wizard</p>\n<p>Select a Domain from the dropdown</p>\n<p>Click Save and Continue</p>\n<figure class=\"content-figure\"><img src=\"images/img_db25a920f3.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-2-project-details\">2. Project Details</h3>\n<p>Provide the following information and click Save and Continue:</p>\n<h3 class=\"content-h3\" id=\"h-name-enter-a-unique-project-name\">Name: Enter a unique project name</h3>\n<h3 class=\"content-h3\" id=\"h-archive-store-select-an-archive-store-from-the-dropdown\">Archive Store: Select an archive store from the dropdown</h3>\n\n<h3 class=\"content-h3\" id=\"h-encryption-choose-the-encryption-type\">Encryption: Choose the encryption type</h3>\n<p>o Note: \u201cNONE\u201d is typically used for non-sensitive data</p>\n<h3 class=\"content-h3\" id=\"h-description-enter-a-brief-summary-of-the-project\">Description: Enter a brief summary of the project</h3>\n<figure class=\"content-figure\"><img src=\"images/img_aedffd46f2.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note-you-can-use-the-back-button-at-any-stage-to-modify-prev\">Note: You can use the Back button at any stage to modify previous entries.</h3>\n<h3 class=\"content-h3\" id=\"h-3-information-store-configuration\">3. Information Store Configuration</h3>\n<p>Provide the following details and click Continue:</p>\n<figure class=\"content-figure\"><img src=\"images/img_f54498a4d0.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-name-auto-generated-based-on-the-project-name-e-g-projectnam\">Name: Auto-generated based on the project name (e.g., ProjectName_IS)</h3>\n<h3 class=\"content-h3\" id=\"h-implementation-type-select-from\">Implementation Type: Select from:</h3>\n<p>o Local Filesystem</p>\n<figure class=\"content-figure\"><img src=\"images/img_bf4892c262.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<p>Unstructured</p>\n<p>CMS</p>\n<p>Delimited File</p>\n<p>Delimited (CSV) file name should be as follows</p>\n<p>&lt;Tablename&gt;--&lt;yyyymmdd&gt;.csv</p>\n<p>Supports to archive Non-ASCII / UTF-8 encoded files</p>\n<p>o JDBC Database</p>\n<figure class=\"content-figure\"><img src=\"images/img_8e0d9a4b87.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Oracle</p>\n<p>Sybase</p>\n<p>MS SQL</p>\n<p>DB 2</p>\n<p>MYSQL</p>\n<p>o Amazon S3</p>\n<figure class=\"content-figure\"><img src=\"images/img_16e608da40.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o SMB Server</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_ed05e19e2e.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o MS Exchange Online Server</p>\n<p>o Google Storage</p>\n<figure class=\"content-figure\"><img src=\"images/img_ed05e19e2e.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o MS Exchange Online Server</p>\n<figure class=\"content-figure\"><img src=\"images/img_9dca102f3f.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o Google Storage</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_214708aba8.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o Salesforce</p>\n<figure class=\"content-figure\"><img src=\"images/img_6b0165390a.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o SharePoint</p>\n<figure class=\"content-figure\"><img src=\"images/img_857d5eafe9.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o Mailbox</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_72baa5f033.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<p>o Cosmos DB</p>\n<figure class=\"content-figure\"><img src=\"images/img_f3dc368f07.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Additional configuration fields will appear based on the selected implementation type.</p>\n<h3 class=\"content-h3\" id=\"h-4-tables-encryption\">4. Tables Encryption</h3>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Tables Encryption step allows users to select specific database tables for encryption. This</p>\n<p>ensures that sensitive data is securely stored and protected during archival.</p>\n<h3 class=\"content-h3\" id=\"h-note-this-feature-is-available-only-for-jdbc-based-projects\">Note: This feature is available only for JDBC-based projects.</h3>\n<h3 class=\"content-h3\" id=\"h-selecting-tables-for-encryption\">Selecting Tables for Encryption</h3>\n<p>Follow these steps to enable table encryption:</p>\n<ol class=\"content-ol\"><li>In the Tables Encryption section, view the list of available tables</li><li>Select the tables that require encryption</li><li>Move the selected tables to the Selected panel using the arrow controls</li></ol>\n<h3 class=\"content-h3\" id=\"h-5-sift-filters\">5. Sift Filters</h3>\n<p>Select a Sift Filter from the dropdown</p>\n<p>If none are available:</p>\n<p>o Enable Create New</p>\n<p>o Enter required details</p>\n<p>Click Continue</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_0e60877513.png\" alt=\"\" loading=\"lazy\"></figure>\n<figure class=\"content-figure\"><img src=\"images/img_9689bd6ce6.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-6-governance\">6. Governance</h3>\n<p>Select a Retention Policy from the dropdown</p>\n<p>Click Continue</p>\n<figure class=\"content-figure\"><img src=\"images/img_f833699495.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-7-smart-channels\">7. Smart Channels</h3>\n\n<p>Select a Metadata Template</p>\n<p>Click Add to include metadata attributes</p>\n<p>Click Continue</p>\n<figure class=\"content-figure\"><img src=\"images/img_f8103739c9.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-8-stakeholders\">8. Stakeholders</h3>\n<p>Assign stakeholders by selecting from dropdowns:</p>\n<p>Legal</p>\n<p>Compliance</p>\n<p>Record Owner</p>\n<p>Click Continue</p>\n<figure class=\"content-figure\"><img src=\"images/img_6831aa2493.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-9-final-settings\">9. Final Settings</h3>\n<p>Review all configured details in the preview section</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_65bdb58cbb.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-complete-setup\">Complete Setup</h3>\n<p>Click Go Home to return to the homepage</p>\n<h3 class=\"content-h3\" id=\"h-or\">OR</h3>\n<p>Click Go To Tasks to create a new task</p>\n<h3 class=\"content-h3\" id=\"h-best-practices\">Best Practices</h3>\n<p>Use clear and consistent naming conventions for projects</p>\n<p>Select appropriate encryption for sensitive data</p>\n<p>Validate configurations before final submission</p>\n<p>Assign correct stakeholders for governance compliance</p>"}, "browse-projects": {"badge": "Project", "title": "Browse Projects", "section": "Project", "topic": "Browse Projects", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Browse Projects feature allows users to view, create, and manage all active and on-hold</p>\n<h3 class=\"content-h3\" id=\"h-projects-within-the-system-it-provides-quick-access-to-proje\">projects within the system. It provides quick access to project details, configurations, and</h3>\n<p>associated tasks.</p>"}, "viewing-or-editing-projects": {"badge": "Project", "title": "Viewing or Editing Projects", "section": "Project", "topic": "Viewing or Editing Projects", "body": "<p>Follow these steps to view or modify an existing project:</p>\n<ol class=\"content-ol\"><li>Navigate to Projects \u2192 Browse Projects</li><li>The list of available projects is displayed</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_cac0fa5ee9.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click on a Project Name to open it</li></ol>\n<p>The Edit Project window appears</p>\n<figure class=\"content-figure\"><img src=\"images/img_ea84398ebf.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-actions-available\">Actions Available</h3>\n<h3 class=\"content-h3\" id=\"h-modify-project-details\">Modify Project Details:</h3>\n<p>Update required fields and click Apply to save changes</p>\n<h3 class=\"content-h3\" id=\"h-update-archive-store-and-information-store-details\">Update Archive Store and Information Store Details</h3>\n<h3 class=\"content-h3\" id=\"h-change-archive-store\">Change Archive Store</h3>\n<p>Use the Change Archive Store option to associate a different archive store with the</p>\n<p>project.</p>\n<h3 class=\"content-h3\" id=\"h-update-stakeholders\">Update Stakeholders</h3>\n<p>Edit and assign stakeholders such as Legal, Compliance, and Record Owners.</p>\n<h3 class=\"content-h3\" id=\"h-update-active-status\">Update Active Status</h3>\n<p>Use the Active checkbox to enable or disable the project based on requirements.</p>\n\n<h3 class=\"content-h3\" id=\"h-delete-project\">Delete Project</h3>\n<p>The project can be deleted only if no tasks have been executed for that project.</p>\n<h3 class=\"content-h3\" id=\"h-view-associated-tasks\">View Associated Tasks:</h3>\n<p>Click Browse Objects to open the Task Explorer and view project-related tasks</p>\n<h3 class=\"content-h3\" id=\"h-change-archive-store\">Change Archive Store</h3>\n<p>The Change Archive Store option allows you to associate a new archive store with the selected</p>\n<p>project. This is useful when you need to migrate storage, update configurations, or switch to a</p>\n<p>different archive location.</p>\n<ul class=\"content-ul\"><li>Click on Change Archive Store under the Components section</li></ul>\n<figure class=\"content-figure\"><img src=\"images/img_76f7fd92ff.png\" alt=\"\" loading=\"lazy\"></figure>\n<ul class=\"content-ul\"><li>The Associated new archive store to the project pop-up window is displayed</li></ul>\n<figure class=\"content-figure\"><img src=\"images/img_6785953819.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-associating-a-new-archive-store\">Associating a New Archive Store</h3>\n<ol class=\"content-ol\"><li>In the pop-up window, select the required Archive Store from the dropdown list</li><li>Click Apply to associate the selected archive store with the project</li></ol>\n<h3 class=\"content-h3\" id=\"h-previously-associated-archive-stores\">Previously Associated Archive Stores</h3>\n<p>The pop-up also displays a list of Previously associated archive stores</p>\n<p>This section includes details such as:</p>\n\n<h3 class=\"content-h3\" id=\"h-o-name-of-the-archive-store\">o Name of the archive store</h3>\n<h3 class=\"content-h3\" id=\"h-o-updated-on-date\">o Updated On date</h3>"}, "creating-a-new-project-from-browse-projects": {"badge": "Project", "title": "Creating a New Project (From Browse Projects)", "section": "Project", "topic": "Creating a New Project (From Browse Projects)", "body": "<p>To create a new project:</p>\n<ol class=\"content-ol\"><li>Click the + New button</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_e8ec3b0789.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The New Project window appears</p>\n<figure class=\"content-figure\"><img src=\"images/img_6f8bae42c0.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<h3 class=\"content-h3\" id=\"h-name-enter-a-unique-project-name-e-g-app-database\">Name: Enter a unique project name (e.g., APP_DATABASE)</h3>\n<h3 class=\"content-h3\" id=\"h-description-provide-a-project-summary\">Description: Provide a project summary</h3>\n\n<h3 class=\"content-h3\" id=\"h-domain-select-a-domain-used-for-grouping-projects\">Domain: Select a domain (used for grouping projects)</h3>\n<figure class=\"content-figure\"><img src=\"images/img_080ce52966.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-encryption-choose-an-encryption-type\">Encryption: Choose an encryption type</h3>\n<p>o Note: \u201cNONE\u201d is commonly used for non-sensitive data</p>\n<figure class=\"content-figure\"><img src=\"images/img_a4737604ab.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-archive-store-select-an-archive-store\">Archive Store: Select an archive store</h3>\n<figure class=\"content-figure\"><img src=\"images/img_4e9dd732dc.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Choose one of the following options:</li></ol>\n<h3 class=\"content-h3\" id=\"h-save-and-continue-proceed-with-additional-configuration\">Save and Continue: Proceed with additional configuration</h3>\n<h3 class=\"content-h3\" id=\"h-save-and-exit-save-and-return-project-can-be-edited-later\">Save and Exit: Save and return (project can be edited later)</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_e2f1fd1e6b.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>If the user clicks Save and Exit, the newly created project is listed in the Browse Projects screen,</p>\n<p>which the user can edit later. See View or Edit Projects for more information.</p>\n<figure class=\"content-figure\"><img src=\"images/img_2a9236cdbc.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>If Save and Continue is selected, the Edit Project window opens.</p>\n<figure class=\"content-figure\"><img src=\"images/img_96a7818ece.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-completing-project-setup\">Completing Project Setup</h3>\n<p>After initial creation:</p>\n<ol class=\"content-ol\"><li>Assign Stakeholders:</li></ol>\n<p>o Legal</p>\n<p>o Compliance</p>\n<p>o Record Owner</p>\n<ol class=\"content-ol\"><li>Add:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-information-store\">o Information Store</h3>\n<h3 class=\"content-h3\" id=\"h-o-channel\">o Channel</h3>\n<h3 class=\"content-h3\" id=\"h-adding-an-information-store\">Adding an Information Store</h3>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>An Information Store defines the source location of data (e.g., file system, database, cloud</p>\n<p>storage).</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n<ol class=\"content-ol\"><li>Navigate to Projects \u2192 Browse Projects</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_2a9236cdbc.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a project</li><li>In the Edit Project panel, click Add Information Store</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_8dbd6f03b9.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>The Edit Information Store window appears</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_23f9df3d98.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Provide the following details:</li></ol>\n<h3 class=\"content-h3\" id=\"h-name-auto-generated-e-g-projectname-is\">Name: Auto-generated (e.g., ProjectName_IS)</h3>\n<h3 class=\"content-h3\" id=\"h-implementation-type-select-from\">Implementation Type: Select from:</h3>\n<p>o Local Filesystem</p>\n<p>o JDBC Database</p>\n<p>o Amazon S3</p>\n<p>o SMB Server</p>\n<p>o MS Exchange Online Server</p>\n<p>o Google Storage</p>\n<p>o Salesforce</p>\n<p>o SharePoint</p>\n<p>o Mailbox</p>\n<p>o Cosmos DB</p>\n<figure class=\"content-figure\"><img src=\"images/img_b265ae6c36.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Configure additional fields based on the selected type</li><li>Click Apply</li><li>Click Back to return</li></ol>\n<h3 class=\"content-h3\" id=\"h-key-information-store-configurations\">Key Information Store Configurations</h3>\n<h3 class=\"content-h3\" id=\"h-local-filesystem\">Local Filesystem</h3>\n<p>Select File Type</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_308b3ab803.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Choose file path using the pop-out selector</p>\n<p>Click Apply after validation</p>\n<h3 class=\"content-h3\" id=\"h-jdbc-database\">JDBC Database</h3>\n<p>Supports:</p>\n<p>Oracle</p>\n<p>Sybase</p>\n<p>MS SQL</p>\n<p>DB2</p>\n<p>MySQL</p>\n<figure class=\"content-figure\"><img src=\"images/img_303d225d2d.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps:</h3>\n<p>Enter database connection details</p>\n<p>Click Test to validate</p>\n<p>Click Apply after successful validation</p>\n<p>Additional prerequisites and permissions may be required depending on the database type.</p>\n<h3 class=\"content-h3\" id=\"h-cloud-external-sources\">Cloud &amp; External Sources</h3>\n<p>Supports:</p>\n<p>Amazon S3</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_3875a5451a.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<p>Google Storage</p>\n<figure class=\"content-figure\"><img src=\"images/img_327335462d.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<p>Salesforce</p>\n<figure class=\"content-figure\"><img src=\"images/img_9e36476a14.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>SharePoint</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_c1cc4260a4.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<p>Mailbox</p>\n<figure class=\"content-figure\"><img src=\"images/img_45d386998c.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>MS Exchange</p>\n<figure class=\"content-figure\"><img src=\"images/img_20a0631b4a.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Each requires credentials and connection details such as:</p>\n<p>Access keys / user credentials</p>\n<p>Host / endpoint URLs</p>\n<p>Bucket or storage paths</p>\n<h3 class=\"content-h3\" id=\"h-adding-a-channel\">Adding a Channel</h3>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>A Channel defines how data is processed and retained within the project.</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps</h3>\n\n<ol class=\"content-ol\"><li>Navigate to Projects \u2192 Browse Projects</li><li>Click + Add New Channel</li></ol>\n<p>The Edit Channel window appears</p>\n<ol class=\"content-ol\"><li>Provide the following details:</li></ol>\n<p>Add Information store definition.</p>\n<h3 class=\"content-h3\" id=\"h-retention-policy-select-appropriate-policy\">Retention Policy: Select appropriate policy</h3>\n<ol class=\"content-ol\"><li>Click Apply</li><li>Click Back</li></ol>\n<h3 class=\"content-h3\" id=\"h-finalizing-project-updates\">Finalizing Project Updates</h3>\n<p>After all configurations are complete, click Apply in the Edit Project window</p>\n<p>You will be redirected to the Browse Projects page</p>\n<h3 class=\"content-h3\" id=\"h-best-practices\">Best Practices</h3>\n<p>Use consistent naming conventions for projects and stores</p>\n<p>Validate connections before applying configurations</p>\n<p>Assign correct retention policies for compliance</p>\n<p>Regularly review project configurations and access</p>"}, "project-run-history": {"badge": "Project", "title": "Project Run History", "section": "Project", "topic": "Project Run History", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Project Run History feature provides a centralized and searchable view of all project</p>\n<p>executions and their associated tasks. It enables users to monitor activity, track execution status,</p>\n<p>and review historical runs across projects.</p>\n<h3 class=\"content-h3\" id=\"h-accessing-project-run-history\">Accessing Project Run History</h3>\n<p>To access run history:</p>\n<ol class=\"content-ol\"><li>Navigate to Projects \u2192 Project Run History</li><li>The system displays a list of projects along with their associated tasks and execution</li></ol>\n<p>details</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_e5ecb02fc6.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-search-and-filter-options\">Search and Filter Options</h3>\n<p>Users can quickly locate specific records using the available search and filter criteria:</p>\n<h3 class=\"content-h3\" id=\"h-project-name-search-for-a-specific-project\">Project Name: Search for a specific project</h3>\n<h3 class=\"content-h3\" id=\"h-task-type-filter-by-type-of-task-e-g-archive-verify\">Task Type: Filter by type of task (e.g., Archive, Verify)</h3>\n<h3 class=\"content-h3\" id=\"h-retention-policy-search-for-a-retention-policy\">Retention Policy: Search for a retention policy</h3>\n<h3 class=\"content-h3\" id=\"h-project-status-filter-by-status-e-g-completed-failed\">Project Status: Filter by status (e.g., completed, failed)</h3>\n<h3 class=\"content-h3\" id=\"h-user-search-based-on-the-user-who-initiated-the-task\">User : Search based on the user who initiated the task</h3>\n<h3 class=\"content-h3\" id=\"h-key-features\">Key Features</h3>\n<h3 class=\"content-h3\" id=\"h-comprehensive-tracking-view-all-project-related-task-executi\">Comprehensive Tracking: View all project-related task executions in one place</h3>\n<h3 class=\"content-h3\" id=\"h-advanced-filtering-quickly-refine-results-using-multiple-cri\">Advanced Filtering: Quickly refine results using multiple criteria</h3>\n<h3 class=\"content-h3\" id=\"h-audit-monitoring-helps-in-auditing-project-activities-and-mo\">Audit &amp; Monitoring: Helps in auditing project activities and monitoring system usage</h3>\n<h3 class=\"content-h3\" id=\"h-historical-insights-analyse-past-runs-for-troubleshooting-an\">Historical Insights: Analyse past runs for troubleshooting and reporting</h3>"}, "business-functions": {"badge": "Project", "title": "Business Functions", "section": "Project", "topic": "Business Functions", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Business Functions feature enables advanced data operations such as selective archiving</p>\n<p>and data extraction. It provides flexibility to:</p>\n<p>Archive specific subsets of data</p>\n<p>Apply conditions for data selection</p>\n<p>Handle large datasets efficiently</p>\n<p>Perform row-level or partition-based operations</p>\n<p>This feature is especially useful for structured data sources such as databases.</p>\n"}, "accessing-business-functions": {"badge": "Project", "title": "Accessing Business Functions", "section": "Project", "topic": "Accessing Business Functions", "body": "<ol class=\"content-ol\"><li>Navigate to Projects \u2192 Business Functions</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_020a2d5416.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>The list of existing business functions is displayed</li><li>Click + New to create a new business function</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_0eca41e1c0.jpeg\" alt=\"\" loading=\"lazy\"></figure>"}, "add-business-function-for-archiving": {"badge": "Project", "title": "Add Business Function for Archiving", "section": "Project", "topic": "Add Business Function for Archiving", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>Archiving business functions allow users to:</p>\n<p>Archive selected tables</p>\n<p>Apply conditional filters</p>\n<p>Perform incremental or large-scale archiving</p>\n<h3 class=\"content-h3\" id=\"h-steps-to-create-an-archiving-business-function\">Steps to Create an Archiving Business Function</h3>\n<ol class=\"content-ol\"><li>Click + New</li></ol>\n\n<p>o The Business Function Details window appears</p>\n<figure class=\"content-figure\"><img src=\"images/img_452665e834.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<h3 class=\"content-h3\" id=\"h-business-function-name-enter-a-unique-name\">Business Function Name: Enter a unique name</h3>\n<h3 class=\"content-h3\" id=\"h-description-provide-a-summary\">Description: Provide a summary</h3>\n<h3 class=\"content-h3\" id=\"h-business-function-for-select-archive\">Business Function For: Select Archive</h3>\n<figure class=\"content-figure\"><img src=\"images/img_41629a2114.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-project-select-the-applicable-project\">Project: Select the applicable project</h3>\n<h3 class=\"content-h3\" id=\"h-business-function-type-choose-from-available-options\">Business Function Type: Choose from available options</h3>\n<h3 class=\"content-h3\" id=\"h-business-function-types-archiving\">Business Function Types (Archiving)</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_00c34a4d19.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-1-none-selective-archiving\">1. None (Selective Archiving)</h3>\n<p>Used for archiving a subset of data based on conditions.</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps:</h3>\n<ol class=\"content-ol\"><li>Select tables and move them to the Selected panel</li><li>(Optional) Add conditions:</li></ol>\n<p>o Click + Add under Advanced Properties</p>\n<figure class=\"content-figure\"><img src=\"images/img_0a5511c544.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o Select table</p>\n<p>o Enter condition (e.g., date-based filter)</p>\n<p>o Click Save</p>\n<ol class=\"content-ol\"><li>Click Save to complete</li></ol>\n<p>You can also archive without conditions by skipping the advanced properties step.</p>\n<h3 class=\"content-h3\" id=\"h-2-offset-multi-part\">2. Offset (Multi-part)</h3>\n<p>Used for large datasets by splitting data into smaller chunks.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_a50d9f7cd1.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-key-points\">Key Points:</h3>\n<p>Improves performance through parallel processing</p>\n<p>Applicable for tables with a primary key</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps:</h3>\n<ol class=\"content-ol\"><li>Select tables</li><li>Click Generate</li><li>Enter number of parts</li><li>Click Save</li></ol>\n<p>Ensure part size is less than total row count.</p>\n<h3 class=\"content-h3\" id=\"h-3-range\">3. Range</h3>\n<p>Used for large datasets where sorting is not feasible due to memory constraints.</p>\n<h3 class=\"content-h3\" id=\"h-supported-databases\">Supported Databases:</h3>\n<p>Oracle</p>\n<p>MS SQL Server</p>\n<p>MySQL</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps:</h3>\n<ol class=\"content-ol\"><li>Select tables</li><li>Click Generate</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_e206b374a0.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<ol class=\"content-ol\"><li>Enter:</li></ol>\n<h3 class=\"content-h3\" id=\"h-o-parts\">o Parts</h3>\n<h3 class=\"content-h3\" id=\"h-o-sample-frequency\">o Sample Frequency</h3>\n<ol class=\"content-ol\"><li>Click Save</li></ol>\n<h3 class=\"content-h3\" id=\"h-4-partition-row-level-archiving\">4. Partition (Row-Level Archiving)</h3>\n<p>Used for archiving data at the row level based on a partition key.</p>\n<figure class=\"content-figure\"><img src=\"images/img_4ebfc60335.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-key-concepts\">Key Concepts:</h3>\n<p>Uses a Partition SQL query</p>\n<p>Generates archives per partition key</p>\n<p>Suitable for relational tables with dependencies</p>\n<h3 class=\"content-h3\" id=\"h-steps\">Steps:</h3>\n<ol class=\"content-ol\"><li>Select related tables (with key relationships)</li><li>Add conditions in Advanced Properties:</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_bbd8103db5.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<p>o Define clause (e.g., columnname=:partitionKey)</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_c908b09586.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter Partition SQL</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_c5ce8f2732.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click Save</li></ol>\n<p>Example: If 10 tables and 10 partition keys are used, 100 archive files will be generated.</p>\n<h3 class=\"content-h3\" id=\"h-add-business-function-for-extraction\">Add Business Function for Extraction</h3>\n<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>Extraction business functions allow users to retrieve archived data efficiently by splitting the</p>\n<p>workload across multiple parts.</p>\n<h3 class=\"content-h3\" id=\"h-steps-to-create-an-extraction-business-function\">Steps to Create an Extraction Business Function</h3>\n<ol class=\"content-ol\"><li>Navigate to Projects \u2192 Business Functions</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_020a2d5416.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click + New</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_0eca41e1c0.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Enter the following details:</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_2e6483e955.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-business-function-name\">Business Function Name</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<h3 class=\"content-h3\" id=\"h-business-function-for-select-extract\">Business Function For: Select Extract</h3>\n<h3 class=\"content-h3\" id=\"h-project-select-the-project\">Project: Select the project</h3>\n<h3 class=\"content-h3\" id=\"h-archive-queue-date-select-the-archive-date\">Archive Queue Date: Select the archive date</h3>\n<h3 class=\"content-h3\" id=\"h-configure-extraction\">Configure Extraction</h3>\n<ol class=\"content-ol\"><li>Select tables and move them to the Selected panel</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_c566783a42.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click Generate</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_2ef010921a.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>The system displays:</p>\n<p>o Table Name</p>\n<p>o Archived Part Count</p>\n<p>o Archived Row Count</p>\n<p>o Parts</p>\n<ol class=\"content-ol\"><li>Enter the number of Parts for extraction</li><li>Click Save</li></ol>"}, "sql-collections": {"badge": "Project", "title": "SQL Collections", "section": "Project", "topic": "SQL Collections", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>A SQL Collection is a logical grouping of projects and/or archives that enables users to query</p>\n<h3 class=\"content-h3\" id=\"h-multiple-datasets-simultaneously-it-simplifies-data-analysis\">multiple datasets simultaneously. It simplifies data analysis by allowing unified access to</h3>\n<p>archived data across different sources.</p>\n<p>A collection can include:</p>\n<p>Archived data from the same project</p>\n<p>Archived data from multiple projects</p>\n<h3 class=\"content-h3\" id=\"h-other-collections\">Other collections</h3>\n\n<p>A combination of projects and collections</p>\n<h3 class=\"content-h3\" id=\"h-note-after-creating-a-collection-a-query-processing-task-mus\">Note: After creating a collection, a Query Processing Task must be executed before querying it</h3>\n<p>in the SQL Browser.</p>"}, "creating-a-collection": {"badge": "Project", "title": "Creating a Collection", "section": "Project", "topic": "Creating a Collection", "body": "<p>Follow these steps to create a new collection:</p>\n<ol class=\"content-ol\"><li>Navigate to Projects \u2192 SQL Collections</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_8adbb53cb7.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>o The Create Collection window appears</p>\n<h3 class=\"content-h3\" id=\"h-enter-collection-details\">Enter Collection Details</h3>\n<ol class=\"content-ol\"><li>Provide the following information:</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_7cb15dc988.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-name-enter-a-unique-collection-name\">Name: Enter a unique collection name</h3>\n<h3 class=\"content-h3\" id=\"h-description-enter-a-summary\">Description: Enter a summary</h3>\n<h3 class=\"content-h3\" id=\"h-type-select-either\">Type: Select either:</h3>\n<p>o Project</p>\n<p>o Collection</p>\n<h3 class=\"content-h3\" id=\"h-include-archives-of-sbs-optional\">Include Archives of SBS (Optional)</h3>\n<p>Select Include Archives of SBS if required</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_22f1d8df05.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Choose one of the following options:</p>\n<h3 class=\"content-h3\" id=\"h-o-number-of-days-fetch-archives-from-the-last-n-days\">o Number of Days: Fetch archives from the last n days</h3>\n<h3 class=\"content-h3\" id=\"h-o-all-archived-include-all-archived-data\">o All Archived: Include all archived data</h3>\n<h3 class=\"content-h3\" id=\"h-o-most-recent-archived-include-only-the-latest-archive\">o Most Recent Archived: Include only the latest archive</h3>\n<h3 class=\"content-h3\" id=\"h-add-projects-or-collections\">Add Projects or Collections</h3>\n<p>In the Project/Collection section:</p>\n<figure class=\"content-figure\"><img src=\"images/img_2d9ee79f22.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Select Project or Collection from the dropdown</p>\n<h3 class=\"content-h3\" id=\"h-if-project-is-selected\">If Project is selected:</h3>\n<p>Choose:</p>\n<h3 class=\"content-h3\" id=\"h-o-project-name\">o Project Name</h3>\n<h3 class=\"content-h3\" id=\"h-o-archived-date\">o Archived Date</h3>\n<p>Enter Encryption Password (if applicable)</p>\n<h3 class=\"content-h3\" id=\"h-if-collection-is-selected\">If Collection is selected:</h3>\n<figure class=\"content-figure\"><img src=\"images/img_940411bba9.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Choose an existing Collection</p>\n<ol class=\"content-ol\"><li>Click Add New to add the entry</li><li>Repeat the steps to include multiple projects or collections</li></ol>\n<h3 class=\"content-h3\" id=\"h-save-the-collection\">Save the Collection</h3>\n<ol class=\"content-ol\"><li>Click Save</li></ol>\n<p>The collection is successfully created</p>\n<p>It will now be available in the SQL Browser</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_3ef5320f80.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-important-note-query-processing\">Important Note: Query Processing</h3>\n<p>Before querying a collection:</p>\n<p>A Query Processing Task must be executed from the Tasks section</p>\n<p>Until this is done, the collection cannot be queried</p>\n<p>The system will display a message prompting you to run the query processing task if it has not</p>\n<p>been executed.</p>"}, "querying-collections": {"badge": "Project", "title": "Querying Collections", "section": "Project", "topic": "Querying Collections", "body": "<p>Follow these steps to query a collection:</p>\n<ol class=\"content-ol\"><li>Navigate to Toolkit \u2192 Content Browsers \u2192 SQL Browser</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_bb9ff15220.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select Object Type = Collection</li><li>Choose the required Collection from the dropdown</li><li>Execute Queries</li></ol>\n<p>Example query - select * from projectname.tablename</p>\n\n<h3 class=\"content-h3\" id=\"h-key-behaviour\">Key Behaviour</h3>\n<p>Only collections with completed Query Processing Tasks can be queried</p>\n<p>Query results will be displayed in the results panel</p>\n<h3 class=\"content-h3\" id=\"h-error-handling\">Error Handling</h3>\n<p>If the query processing task has not been run:</p>\n<p>o An error message will be displayed</p>\n<h3 class=\"content-h3\" id=\"h-limitations\">Limitations</h3>\n<p>Collection names must not contain:</p>\n<p>o &quot;.&quot; (dot)</p>\n<p>o &quot;/&quot; (forward slash)</p>\n<p>These characters are not supported and will result in no query output.</p>\n<h3 class=\"content-h3\" id=\"h-best-practices\">Best Practices</h3>\n<p>Use clear naming conventions for collections</p>\n<p>Group related projects for efficient querying</p>\n<p>Always run the Query Processing Task after creation</p>\n<p>Avoid unsupported special characters in collection names</p>"}, "task-status-indicators": {"badge": "Tasks", "title": "Task Status Indicators", "section": "Tasks", "topic": "Task Status Indicators", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Task Status Indicators provide visual cues to help users quickly understand the current</p>\n<p>state of tasks in the system. These indicators are displayed alongside tasks in the Tasks</p>\n<h3 class=\"content-h3\" id=\"h-panel\">panel.</h3>\n<h3 class=\"content-h3\" id=\"h-task-status-indicators\">Task Status Indicators</h3>\n<h3 class=\"content-h3\" id=\"h-icon\">Icon</h3>\n<h3 class=\"content-h3\" id=\"h-task-status\">Task Status</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<p>In Progress</p>\n<p>Task is currently running</p>\n<p>Completed Successfully</p>\n<p>Task completed without errors</p>\n\n<h3 class=\"content-h3\" id=\"h-icon\">Icon</h3>\n<h3 class=\"content-h3\" id=\"h-task-status\">Task Status</h3>\n<h3 class=\"content-h3\" id=\"h-description\">Description</h3>\n<p>Queued or Canceled</p>\n<p>Task is waiting in queue or has been canceled</p>\n<p>Failed or Canceled</p>\n<p>Task failed during execution or was interrupted</p>\n<h3 class=\"content-h3\" id=\"h-usage\">Usage</h3>\n<p>Monitor task execution in real-time</p>\n<p>Quickly identify failed or pending tasks</p>\n<p>Track completion status without opening task details</p>\n<h3 class=\"content-h3\" id=\"h-task-filters\">Task Filters</h3>\n<p>The Task Filters feature allows users to refine and narrow down task records based on</p>\n<p>specific criteria such as collection, project, status, and execution details. This helps in quickly</p>\n<p>locating relevant tasks within large datasets.</p>\n<p>On the Tasks screen, click the Filter (funnel) icon</p>\n<figure class=\"content-figure\"><img src=\"images/img_2c6a9ab656.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>The Task Filter panel is displayed</p>\n<figure class=\"content-figure\"><img src=\"images/img_9611d2f44a.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-steps-to-apply-filters\">Steps to apply filters</h3>\n\n<p>Open the Task Filter panel</p>\n<p>Select a filter from Select a Filter</p>\n<p>o Collection Name</p>\n<p>o Worker Pool Name</p>\n<p>o Node</p>\n<p>o Project Name</p>\n<p>o Task Type</p>\n<p>o Task Status</p>\n<p>o Task Queued Date</p>\n<p>Choose a corresponding value from Select a Value</p>\n<p>Click Add Filter</p>\n<p>The filter appears in the Filter List Table</p>\n<p>Repeat steps to add multiple filters if required</p>\n<p>Click Apply Filters</p>\n<figure class=\"content-figure\"><img src=\"images/img_4f5776d3d4.png\" alt=\"\" loading=\"lazy\"></figure>"}, "archive-task": {"badge": "Tasks", "title": "Archive Task", "section": "Tasks", "topic": "Archive Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Archive Task allows you to move inactive or unused data into Omni Archive Manager</p>\n<p>for long-term storage and preservation. You can either run the archive process immediately</p>\n<p>or schedule it to run later.</p>\n<p>Follow the steps below to create and manage an archive task.</p>\n<h3 class=\"content-h3\" id=\"h-creating-an-archive-task\">Creating an Archive Task</h3>\n\n<ol class=\"content-ol\"><li>Navigate to Tasks &gt; Tasks.</li><li>Click the + New button located in the right panel.</li><li>From the Task Type drop-down menu, select Archive.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_6f9d786095.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>From the Node drop-down menu, select the appropriate server-worker or choose</li></ol>\n<h3 class=\"content-h3\" id=\"h-none\">None.</h3>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>If None is selected, the system will automatically assign an appropriate server-worker.</p>\n<h3 class=\"content-h3\" id=\"h-configuring-the-archive-task\">Configuring the Archive Task</h3>\n<ol class=\"content-ol\"><li>Select the project you want to archive from the Project drop-down menu.</li></ol>\n<p>o If the selected project contains encrypted data, the following options will</p>\n<p>appear:</p>\n\n<h3 class=\"content-h3\" id=\"h-skip-encrypted-column-encrypted-columns-will-not-be-archived\">Skip Encrypted Column \u2013 Encrypted columns will not be archived.</h3>\n<h3 class=\"content-h3\" id=\"h-archive-as-it-is-do-not-decrypt-while-archiving-encrypted\">Archive as It Is (Do Not Decrypt While Archiving) \u2013 Encrypted</h3>\n<p>columns will be archived without decryption.</p>\n<figure class=\"content-figure\"><img src=\"images/img_3162a119ac.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-important\">Important:</h3>\n<p>These options prevent retrieval of the original encrypted values from the archived</p>\n<p>data.</p>\n<p>These options apply only to MSSQL Server projects.</p>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>The selected project must be configured with an information store.</p>\n<p>If the project is encrypted, the encryption password field will be displayed.</p>\n<p>The Archive Mode field may appear or remain hidden depending on the project</p>\n<p>configuration.</p>\n<ol class=\"content-ol\"><li>Select the applicable Business Function from the drop-down menu, or leave it as</li></ol>\n<p>default to perform a complete archive.</p>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n\n<p>The Business Function drop-down menu appears only if business functions are</p>\n<p>defined for the selected project.</p>\n<ol class=\"content-ol\"><li>The system automatically populates the Retention Policy field.</li></ol>\n<h3 class=\"content-h3\" id=\"h-selecting-archive-mode\">Selecting Archive Mode</h3>\n<ol class=\"content-ol\"><li>Choose the desired archive mode from the Archive Mode drop-down menu:</li></ol>\n<h3 class=\"content-h3\" id=\"h-staged-default-mode\">Staged (Default Mode)</h3>\n<p>Data is temporarily staged (like cache memory) before the archive is finalized. This</p>\n<p>allows direct access to the staged data prior to archive creation.</p>\n<h3 class=\"content-h3\" id=\"h-direct-mode\">Direct Mode</h3>\n<p>Data is archived immediately. Access to the data is only possible by extracting the</p>\n<p>created archive.</p>\n<h3 class=\"content-h3\" id=\"h-starting-or-scheduling-the-task\">Starting or Scheduling the Task</h3>\n<figure class=\"content-figure\"><img src=\"images/img_9cdaa1bb1a.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Click Start to run the archive task immediately.</li><li>To run the task later:</li></ol>\n<p>Select the desired schedule from the drop-down options at the bottom of the page.</p>\n<p>Click Schedule to queue the task for execution at the specified date and time.</p>\n"}, "compress-task": {"badge": "Tasks", "title": "Compress Task", "section": "Tasks", "topic": "Compress Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Compress Task is used to compress archived data before final storage. This helps</p>\n<p>optimize storage space and improve archive management efficiency, this task is only for</p>\n<p>unstructured projects.</p>\n<p>Follow the steps below to create and run a Compress Task.</p>\n<h3 class=\"content-h3\" id=\"h-steps-to-create-a-compress-task\">Steps to Create a Compress Task</h3>\n<h3 class=\"content-h3\" id=\"h-step-1-navigate-to-tasks\">Step 1: Navigate to Tasks</h3>\n<ol class=\"content-ol\"><li>Go to Tasks &gt; Tasks.</li><li>Click the + New button to create a new task.</li></ol>\n<h3 class=\"content-h3\" id=\"h-step-2-select-task-type\">Step 2: Select Task Type</h3>\n<ol class=\"content-ol\"><li>From the Task Type drop-down menu, select Compress.</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_049e356181.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-step-3-select-node\">Step 3: Select Node</h3>\n<ol class=\"content-ol\"><li>From the Node drop-down menu, select the appropriate worker (server-worker)</li></ol>\n<p>where the compression process should run.</p>\n<h3 class=\"content-h3\" id=\"h-step-4-select-project\">Step 4: Select Project</h3>\n<ol class=\"content-ol\"><li>From the Project drop-down menu, select the project whose archived data you want</li></ol>\n<p>to compress.</p>\n<p>o After selecting the project, the Task Queued Data drop-down menu will</p>\n<p>appear.</p>\n<p>o This menu lists previously archived dates available for the selected project.</p>\n<h3 class=\"content-h3\" id=\"h-step-5-select-archive-queue-date\">Step 5: Select Archive Queue Date</h3>\n<ol class=\"content-ol\"><li>From the Task Queued Data drop-down menu, select the appropriate archived date</li></ol>\n<p>that you want to compress.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_69b62c8fcb.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-start-or-schedule-the-compress-task\">Start or Schedule the Compress Task</h3>\n<h3 class=\"content-h3\" id=\"h-to-start-immediately\">To Start Immediately</h3>\n<ol class=\"content-ol\"><li>Click Start to begin the compression process immediately.</li></ol>\n<h3 class=\"content-h3\" id=\"h-to-schedule-for-later\">To Schedule for Later</h3>\n<ol class=\"content-ol\"><li>If you want to run the task at a later time:</li></ol>\n<p>o Select the desired schedule from the drop-down options at the bottom of the</p>\n<p>screen.</p>\n<p>o Click Schedule to queue the task for execution at the specified date and time.</p>\n<h3 class=\"content-h3\" id=\"h-result\">Result</h3>\n<p>Once the task completes, the selected archived data will be compressed and optimized for</p>\n<p>storage.</p>"}, "destroy-task": {"badge": "Tasks", "title": "Destroy Task", "section": "Tasks", "topic": "Destroy Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Destroy Task is used to permanently delete archived data that is eligible for destruction.</p>\n<p>Archived data becomes eligible for destruction when:</p>\n<p>The retention period has expired, and</p>\n<p>There are no active legal holds or restrictions on the data.</p>\n\n<p>Before destruction, the data must be approved through the disposition workflow by</p>\n<p>authorized stakeholders or an administrator. Once approved and the Destroy Task is</p>\n<p>initiated, the system securely and permanently removes the data.</p>\n<h3 class=\"content-h3\" id=\"h-steps-to-create-a-destroy-task\">Steps to Create a Destroy Task</h3>\n<h3 class=\"content-h3\" id=\"h-step-1-navigate-to-tasks\">Step 1: Navigate to Tasks</h3>\n<ol class=\"content-ol\"><li>Go to Tasks &gt; Tasks.</li><li>Click the + New button to create a new task.</li></ol>\n<h3 class=\"content-h3\" id=\"h-step-2-select-task-type\">Step 2: Select Task Type</h3>\n<ol class=\"content-ol\"><li>From the Task Type drop-down menu, select Destroy.</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_325485414e.png\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-step-3-select-node\">Step 3: Select Node</h3>\n<ol class=\"content-ol\"><li>From the Node drop-down menu, select the appropriate worker (server-worker)</li></ol>\n<p>where the destruction process should run.</p>\n<h3 class=\"content-h3\" id=\"h-step-4-select-project\">Step 4: Select Project</h3>\n<ol class=\"content-ol\"><li>From the Project drop-down menu, select the project containing the archived data</li></ol>\n<p>marked for destruction.</p>\n<h3 class=\"content-h3\" id=\"h-important\">Important:</h3>\n<p>Ensure that the data has been approved for destruction through the disposition workflow</p>\n<p>before starting this task.</p>\n<h3 class=\"content-h3\" id=\"h-start-or-schedule-the-destroy-task\">Start or Schedule the Destroy Task</h3>\n<h3 class=\"content-h3\" id=\"h-to-start-immediately\">To Start Immediately</h3>\n<ol class=\"content-ol\"><li>Click Start to begin the destruction process immediately.</li></ol>\n<h3 class=\"content-h3\" id=\"h-to-schedule-for-later\">To Schedule for Later</h3>\n<ol class=\"content-ol\"><li>To run the task later</li></ol>\n<p>o Select the desired schedule from the drop-down options at the bottom of the</p>\n<p>screen.</p>\n<p>o Click Schedule to queue the task.</p>\n<h3 class=\"content-h3\" id=\"h-result\">Result</h3>\n<p>Once the task is completed, all approved archived data within the selected project will be</p>\n<p>securely and permanently destroyed.</p>"}, "download-task": {"badge": "Tasks", "title": "Download Task", "section": "Tasks", "topic": "Download Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Download Task is used to export large volumes of data generated from SQL queries</p>\n<p>executed in the SQL Browser. It enables users to download query results in a specified</p>\n<p>format for further analysis or reporting.</p>\n<h3 class=\"content-h3\" id=\"h-note-before-running-a-download-task-a-query-processing-task-\">Note: Before running a Download Task, a Query Processing Task must be completed for the</h3>\n<p>selected project or collection.</p>\n\n<h3 class=\"content-h3\" id=\"h-creating-a-download-task\">Creating a Download Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n<ol class=\"content-ol\"><li>Select Download from the Task Type dropdown</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_7b43f23ded.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<p>Choose a server-worker</p>\n\n<p>Or select None</p>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n<h3 class=\"content-h3\" id=\"h-select-source-and-format\">Select Source and Format</h3>\n<ol class=\"content-ol\"><li>Select Browser:</li></ol>\n<p>Choose SQL Browser</p>\n<ol class=\"content-ol\"><li>Select Export Type:</li></ol>\n<p>Choose the desired file format for download (e.g., CSV, SQL)</p>\n<figure class=\"content-figure\"><img src=\"images/img_15e6ed4784.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-select-object-type\">Select Object Type</h3>\n<ol class=\"content-ol\"><li>Select Object Type:</li></ol>\n<h3 class=\"content-h3\" id=\"h-projects-or-collections\">Projects or Collections</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_24ab0f2220.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Based on the selection:</p>\n<p>o A Project or Collection dropdown will appear</p>\n<ol class=\"content-ol\"><li>Select the required Project or Collection</li><li>If Projects is selected:</li></ol>\n<p>Choose the Task Queued Date (archive date)</p>\n<figure class=\"content-figure\"><img src=\"images/img_d0de5e7de0.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-enter-query\">Enter Query</h3>\n<ol class=\"content-ol\"><li>Enter the SQL query in the User Query textbox</li></ol>\n<p>This defines the data to be exported</p>\n\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<p>Click Start to execute the task immediately</p>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<p>To run later:</p>\n<p>o Select a schedule from the available options</p>\n<p>o Click Schedule</p>\n<h3 class=\"content-h3\" id=\"h-accessing-downloaded-data\">Accessing Downloaded Data</h3>\n<p>Once the task is completed successfully, the exported data can be accessed from the</p>\n<h3 class=\"content-h3\" id=\"h-downloads\">Downloads</h3>\n<h3 class=\"content-h3\" id=\"h-key-benefits\">Key Benefits</h3>\n<p>Efficient export of large datasets</p>\n<p>Supports multiple file formats</p>\n<p>Enables advanced data analysis outside the system</p>"}, "effectiveprivileges-task": {"badge": "Tasks", "title": "EffectivePrivileges Task", "section": "Tasks", "topic": "EffectivePrivileges Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The EffectivePrivileges Task is used to evaluate and determine the effective access</p>\n<p>permissions of users on files and folders within a project. It helps organizations understand</p>\n<p>who has access to what data by analyzing permission structures and inheritance. This is</p>\n<p>useful for security audits, compliance checks, and access reviews.</p>\n<h3 class=\"content-h3\" id=\"h-creating-an-effectiveprivileges-task\">Creating an EffectivePrivileges Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n<ol class=\"content-ol\"><li>Select EffectivePrivileges from the Task Type dropdown</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_12b47a63b5.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Worker Pool:</li></ol>\n<p>o Choose the desired worker pool</p>\n<p>o Default option may be None</p>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<p>o Choose a server-worker</p>\n<p>o Or select None</p>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<p>Click Start to execute the task immediately</p>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<p>To run the task later:</p>\n<p>o Select the required schedule options (e.g., day, hour, minute)</p>\n<p>o Click Schedule</p>\n<h3 class=\"content-h3\" id=\"h-key-benefits\">Key Benefits</h3>\n<p>Provides visibility into user access and permissions</p>\n<p>Helps identify unauthorized or excessive access</p>\n<p>Supports compliance and audit requirements</p>\n<p>Improves data security and governance</p>"}, "explore-task": {"badge": "Tasks", "title": "Explore Task", "section": "Tasks", "topic": "Explore Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Explore Task is used to analyze non-archived data in the information store, this task is</p>\n<p>only for unstructured projects. Its primary purpose is to:</p>\n<p>Scan and explore data from a specified path</p>\n<p>Extract metadata and/or content</p>\n<p>Index the data for search and analysis</p>\n<h3 class=\"content-h3\" id=\"h-key-capabilities\">Key Capabilities</h3>\n<p>After running the Explore task, users can search data based on:</p>\n<p>Pattern matching (e.g., SSN, credit card numbers)</p>\n<p>Document owner</p>\n<p>Dates</p>\n<p>File name, MIME type, and size</p>\n\n<p>Content within files</p>\n<h3 class=\"content-h3\" id=\"h-explore-modes\">Explore Modes</h3>\n<h3 class=\"content-h3\" id=\"h-1-basic-explore\">1. Basic Explore</h3>\n<p>Retrieves a list of files from the given path</p>\n<p>Processes files one by one</p>\n<p>Extracts basic metadata (POSIX metadata)</p>\n<p>Faster and suitable for quick discovery</p>\n<h3 class=\"content-h3\" id=\"h-2-advanced-explore\">2. Advanced Explore</h3>\n<p>Extracts full file content along with metadata</p>\n<p>Indexes both metadata and content</p>\n<p>Enables deep search capabilities</p>\n<h3 class=\"content-h3\" id=\"h-note-once-advanced-explore-is-executed-basic-explore-cannot-\">Note: Once Advanced Explore is executed, Basic Explore cannot be run on the same project</h3>\n<p>unless the index is cleaned.</p>\n<h3 class=\"content-h3\" id=\"h-indexing-behavior\">Indexing Behavior</h3>\n<p>Indexing is performed automatically as part of the Explore task</p>\n<p>No separate indexing task is required</p>\n<p>Users can:</p>\n<h3 class=\"content-h3\" id=\"h-o-clean-index-to-remove-indexed-data\">o Clean Index to remove indexed data</h3>\n<p>o Use Re-Index to rebuild indexes</p>\n<p>After performing a Clean Index, users can run Basic Explore again.</p>\n<h3 class=\"content-h3\" id=\"h-creating-an-explore-task\">Creating an Explore Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n<ol class=\"content-ol\"><li>Select Explore from the Task Type dropdown</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_d59c3be5b6.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select the Explore Mode:</li></ol>\n<h3 class=\"content-h3\" id=\"h-basic-explore\">Basic Explore</h3>\n<h3 class=\"content-h3\" id=\"h-advanced-explore\">Advanced Explore</h3>\n\n<figure class=\"content-figure\"><img src=\"images/img_28618d6f42.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<p>Choose a server-worker</p>\n<p>Or select None</p>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n<ol class=\"content-ol\"><li>Select the Project to explore</li><li>(Optional) Select Re-Index:</li></ol>\n<p>Use this option if indexing needs to be rebuilt after a clean index</p>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>The DeNist option is currently not in use and can be ignored</p>\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<p>Click Start to begin the explore task</p>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<p>To run later:</p>\n<p>o Select a schedule</p>\n<p>o Click Schedule</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_b80f99dd09.png\" alt=\"\" loading=\"lazy\"></figure>"}, "extract-task": {"badge": "Tasks", "title": "Extract Task", "section": "Tasks", "topic": "Extract Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Extract Task is used to restore data from the archive back to an extract store. It enables</p>\n<p>users to retrieve archived data either partially or completely for analysis, recovery, or reuse.</p>\n<h3 class=\"content-h3\" id=\"h-note-an-extract-store-must-be-configured-before-running-this\">Note: An Extract Store must be configured before running this task.</h3>\n<h3 class=\"content-h3\" id=\"h-creating-an-extract-task\">Creating an Extract Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n<ol class=\"content-ol\"><li>Select Extract from the Task Type dropdown</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_7c3489d8c2.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<p>Choose a server-worker</p>\n<p>Or select None</p>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n<ol class=\"content-ol\"><li>Select the Project from which data must be extracted</li></ol>\n<h3 class=\"content-h3\" id=\"h-extraction-options\">Extraction Options</h3>\n<h3 class=\"content-h3\" id=\"h-1-extract-using-business-function-selective-extraction\">1. Extract Using Business Function (Selective Extraction)</h3>\n<p>Use this option to extract data related to a specific business function:</p>\n<p>Select the Business Function</p>\n<p>Select the Extract Store</p>\n\n<h3 class=\"content-h3\" id=\"h-2-full-project-database-extraction\">2. Full Project / Database Extraction</h3>\n<p>Use this option to restore complete archived data:</p>\n<p>Select the Extract Store</p>\n<p>Select the Task Queued Date (archive date to restore)</p>\n<h3 class=\"content-h3\" id=\"h-additional-configuration\">Additional Configuration</h3>\n<h3 class=\"content-h3\" id=\"h-workers\">Workers</h3>\n<p>Enter the number of workers in Max Allowed Nodes</p>\n<p>This controls parallel processing for extraction</p>\n<h3 class=\"content-h3\" id=\"h-filter-options\">Filter Options</h3>\n<p>Select a filter to extract specific data:</p>\n<h3 class=\"content-h3\" id=\"h-none-default\">None (default)</h3>\n<h3 class=\"content-h3\" id=\"h-file-extension\">File Extension</h3>\n<h3 class=\"content-h3\" id=\"h-mime-type\">MIME Type</h3>\n<h3 class=\"content-h3\" id=\"h-creation-date\">Creation Date</h3>\n<h3 class=\"content-h3\" id=\"h-path\">Path</h3>\n<p>Filters allow extraction of only relevant data instead of the entire dataset.</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_7c3489d8c2.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-schema-options\">Schema Options</h3>\n<h3 class=\"content-h3\" id=\"h-create-a-new-database-schema\">Create a New Database Schema:</h3>\n<p>Creates new tables in the extract store</p>\n<h3 class=\"content-h3\" id=\"h-alter-database-schema\">Alter Database Schema:</h3>\n<p>Adds index constraints similar to the original information store after extraction</p>\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<p>Click Start to execute the task immediately</p>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<p>To run later:</p>\n<p>o Select a schedule</p>\n<p>o Click Schedule</p>\n\n<h3 class=\"content-h3\" id=\"h-prerequisites\">Prerequisites</h3>\n<p>Ensure an Extract Store is configured</p>\n<p>User must have database owner permissions for extraction</p>"}, "filebrowser-task": {"badge": "Tasks", "title": "FileBrowser Task", "section": "Tasks", "topic": "FileBrowser Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The File Browser Task is used to update metadata details of already archived objects.</p>\n<p>Specifically, it ensures that missing metadata fields such as File Name and Parent Path are</p>\n<p>populated for archived data. This helps improve file visibility, searchability, and navigation</p>\n<p>within the File Browser.</p>\n<h3 class=\"content-h3\" id=\"h-creating-a-filebrowser-task\">Creating a FileBrowser Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n<ol class=\"content-ol\"><li>Select FileBrowser from the Task Type dropdown</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_83b354c93d.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Worker Pool:</li></ol>\n<ul class=\"content-ul\"><li>Choose the applicable worker pool</li><li>Or select None</li></ul>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<ul class=\"content-ul\"><li>Choose a server-worker</li><li>Or select None</li></ul>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n<h3 class=\"content-h3\" id=\"h-select-project-and-data\">Select Project and Data</h3>\n<ol class=\"content-ol\"><li>Select the Project from the dropdown</li><li>Select the Task Queued Date:</li></ol>\n<ul class=\"content-ul\"><li>Choose the required archive or processed data date</li><li>This represents the dataset to be browsed</li></ul>\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<ul class=\"content-ul\"><li>Click Start to execute the task immediately</li></ul>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<ul class=\"content-ul\"><li>To run later:</li></ul>\n<p>o Select a schedule from the available options</p>\n<p>o Click Schedule</p>\n\n<h3 class=\"content-h3\" id=\"h-key-notes\">Key Notes</h3>\n<ul class=\"content-ul\"><li>The Task Queued Date is mandatory to identify the dataset</li><li>FileBrowser works on already processed or archived data</li><li>Worker and node selection can be automated using None</li></ul>"}, "index-task": {"badge": "Tasks", "title": "Index Task", "section": "Tasks", "topic": "Index Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Index Task is used to index semi-structured and unstructured data before archiving.</p>\n<p>Indexing enables:</p>\n<p>Efficient data search</p>\n<p>Easy retrieval of non-archived data</p>\n<p>This ensures that even if certain data is not archived, it can still be searched and accessed.</p>\n<h3 class=\"content-h3\" id=\"h-creating-an-index-task\">Creating an Index Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n\n<ol class=\"content-ol\"><li>Select Index from the Task Type dropdown</li></ol>\n<figure class=\"content-figure\"><img src=\"images/img_9305678423.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<p>Choose a server-worker</p>\n<p>Or select None</p>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n<ol class=\"content-ol\"><li>Select the Project to be indexed</li></ol>\n<h3 class=\"content-h3\" id=\"h-index-configuration\">Index Configuration</h3>\n<h3 class=\"content-h3\" id=\"h-index-files-inside-containers-optional\">Index Files Inside Containers (Optional)</h3>\n<p>Select the Index files inside container (.tar or .zip) checkbox if required</p>\n\n<figure class=\"content-figure\"><img src=\"images/img_4114b11ee7.png\" alt=\"\" loading=\"lazy\"></figure>\n<h3 class=\"content-h3\" id=\"h-note\">Note:</h3>\n<p>This option is disabled by default</p>\n<p>Enable it to index files within compressed containers such as .zip or .tar</p>\n<h3 class=\"content-h3\" id=\"h-running-the-task\">Running the Task</h3>\n<h3 class=\"content-h3\" id=\"h-start-immediately\">Start Immediately</h3>\n<p>Click Start to execute the task immediately</p>\n<h3 class=\"content-h3\" id=\"h-schedule-task\">Schedule Task</h3>\n<p>To run later:</p>\n<p>o Select a schedule</p>\n<p>o Click Schedule</p>\n<h3 class=\"content-h3\" id=\"h-key-benefits\">Key Benefits</h3>\n<p>Enables searchability of semi-structured and unstructured data</p>\n<p>Supports data discovery via Visualizers</p>\n<p>Improves data accessibility even if not archived</p>\n"}, "query-processing-task": {"badge": "Tasks", "title": "Query Processing Task", "section": "Tasks", "topic": "Query Processing Task", "body": "<h3 class=\"content-h3\" id=\"h-overview\">Overview</h3>\n<p>The Query Processing Task is used to prepare structured archived data for querying. It</p>\n<p>retrieves data from the archive store and stores it in a configured query processing</p>\n<h3 class=\"content-h3\" id=\"h-location-enabling-efficient-querying-through-tools-like-the-\">location, enabling efficient querying through tools like the SQL Browser.</h3>\n<h3 class=\"content-h3\" id=\"h-creating-a-query-processing-task\">Creating a Query Processing Task</h3>\n<p>Follow these steps to configure the task:</p>\n<ol class=\"content-ol\"><li>Navigate to Tasks \u2192 Tasks</li><li>Click the + New button</li></ol>\n<h3 class=\"content-h3\" id=\"h-configure-task-details\">Configure Task Details</h3>\n<ol class=\"content-ol\"><li>Select QueryProcessing from the Task Type dropdown</li></ol>\n\n<figure class=\"content-figure\"><img src=\"images/img_9d28e87153.png\" alt=\"\" loading=\"lazy\"></figure>\n<ol class=\"content-ol\"><li>Select a Node:</li></ol>\n<p>Choose a server-worker</p>\n<p>Or select None</p>\n<h3 class=\"content-h3\" id=\"h-note-if-none-is-selected-the-system-automatically-assigns-an\">Note: If None is selected, the system automatically assigns an available server-worker.</h3>\n<h3 class=\"content-h3\" id=\"h-select-processing-object\">Select Processing Object</h3>\n<ol class=\"content-ol\"><li>Select Processing Object Type:</li></ol>\n<h3 class=\"content-h3\" id=\"h-projects\">Projects</h3>\n<h3 class=\"content-h3\" id=\"h-collections\">Collections</h3>\n<figure class=\"content-figure\"><img src=\"images/img_c470cd3ebb.png\" alt=\"\" loading=\"lazy\"></figure>\n<p>Based on the selection:</p>\n\n<p>o A Project or Collection dropdown will appe
