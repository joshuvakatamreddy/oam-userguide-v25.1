archived data</h3>\n<h3 class=\"content-h3\" id=\"h-destroy-delete-data-after-retention-period\">Destroy \u2013 Delete data after retention period</h3>\n<h3 class=\"content-h3\" id=\"h-query-processing-run-queries-on-archived-structured-data\">Query Processing \u2013 Run queries on archived structured data</h3>\n<h3 class=\"content-h3\" id=\"h-2-workflow-and-administration\">2. Workflow and Administration</h3>\n<p>These manage governance and system control:</p>\n<h3 class=\"content-h3\" id=\"h-workflow-approval-process-for-tasks-like-disposition\">Workflow \u2013 Approval process for tasks like disposition</h3>\n<h3 class=\"content-h3\" id=\"h-search-query-find-archived-data\">Search &amp; Query \u2013 Find archived data</h3>\n<h3 class=\"content-h3\" id=\"h-configuration-set-up-projects-policies-and-storage\">Configuration \u2013 Set up projects, policies, and storage</h3>\n<h3 class=\"content-h3\" id=\"h-administration-manage-users-and-roles\">Administration \u2013 Manage users and roles</h3>\n<h3 class=\"content-h3\" id=\"h-automation-cli-run-tasks-using-scripts-or-commands\">Automation / CLI \u2013 Run tasks using scripts or commands</h3>\n<h3 class=\"content-h3\" id=\"h-3-manual-operations\">3. Manual Operations</h3>\n<h3 class=\"content-h3\" id=\"h-reconciliation-validate-source-and-archive-data\">Reconciliation \u2013 Validate source and archive data</h3>\n<h3 class=\"content-h3\" id=\"h-staging-temporary-processing-area\">Staging \u2013 Temporary processing area</h3>\n<h3 class=\"content-h3\" id=\"h-exporting-download-archived-data\">Exporting \u2013 Download archived data</h3>\n<h3 class=\"content-h3\" id=\"h-content-analysis-analyse-archived-content\">Content Analysis \u2013 Analyse archived content</h3>\n<h3 class=\"content-h3\" id=\"h-technical-components-how-the-system-works\">Technical Components (How the System Works)</h3>\n<h3 class=\"content-h3\" id=\"h-1-web-ui\">1. Web UI</h3>\n<p>User interface to manage and monitor the system</p>\n<p>Used for configuration, task execution, and reporting</p>\n<h3 class=\"content-h3\" id=\"h-2-server\">2. Server</h3>\n<p>Controls workflows and task scheduling</p>\n<p>Manages metadata and security</p>\n<p>Stores audit logs</p>\n<h3 class=\"content-h3\" id=\"h-3-workers\">3. Workers</h3>\n\n<p>Perform heavy processing tasks like archive, compress, and verify</p>\n<p>Can be scaled horizontally for better performance</p>\n<h3 class=\"content-h3\" id=\"h-4-omr-database\">4. OMR Database</h3>\n<p>Stores metadata, policies, audit logs, and task status</p>\n<p>Acts as the system\u2019s control database</p>\n<h3 class=\"content-h3\" id=\"h-5-archive-store\">5. Archive Store</h3>\n<p>Physical storage for archived data</p>\n<p>Supports encrypted and WORM storage</p>\n<h3 class=\"content-h3\" id=\"h-in-simple-terms\">In Simple Terms</h3>\n<h3 class=\"content-h3\" id=\"h-web-ui-where-users-interact\">Web UI \u2013 Where users interact</h3>\n<h3 class=\"content-h3\" id=\"h-server-controls-and-manages\">Server \u2013 Controls and manages</h3>\n<h3 class=\"content-h3\" id=\"h-workers-do-the-processing\">Workers \u2013 Do the processing</h3>\n<h3 class=\"content-h3\" id=\"h-omr-database-stores-metadata-and-logs\">OMR Database \u2013 Stores metadata and logs</h3>\n<h3 class=\"content-h3\" id=\"h-archive-store-stores-the-actual-archived-data\">Archive Store \u2013 Stores the actual archived data</h3>\n<p>This structure makes OAM scalable, secure, and compliant.</p>"}, "compatible-systems-retailers": {"badge": "Additional: System Architecture and Functional Components", "title": "Compatible Systems & Retailers", "section": "Additional: System Architecture and Functional Components", "topic": "Compatible Systems & Retailers", "body": "<p>Omni Archive Manager (OAM) processes data in three stages:</p>\n<h3 class=\"content-h3\" id=\"h-information-store-archive-store-extract-store\">Information Store \u2192 Archive Store \u2192 Extract Store</h3>\n<figure class=\"content-figure\"><img src=\"images/img_956531b299.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-information-store-data-source\">Information Store (Data Source)</h3>\n<p>This is where data originates. OAM connects to various structured and unstructured data</p>\n<p>sources.</p>\n<h3 class=\"content-h3\" id=\"h-structured-data-databases-via-jdbc\">Structured Data (Databases via JDBC)</h3>\n<p>OAM connects using JDBC to:</p>\n<p>Oracle Database</p>\n<p>MySQL</p>\n<p>IBM Db2</p>\n<p>Microsoft SQL Server</p>\n<p>SAP Sybase</p>\n<h3 class=\"content-h3\" id=\"h-unstructured-semi-structured-data\">Unstructured / Semi-Structured Data</h3>\n<p>Local File System</p>\n<p>SMB File Server</p>\n<p>Amazon S3</p>\n<p>Google Cloud Storage</p>\n<p>Microsoft Exchange Online</p>\n<p>Salesforce</p>\n<h3 class=\"content-h3\" id=\"h-purpose-oam-reads-and-collects-data-from-these-systems-for-a\">Purpose: OAM reads and collects data from these systems for archiving.</h3>\n<h3 class=\"content-h3\" id=\"h-archive-store-secure-storage\">Archive Store (Secure Storage)</h3>\n<p>After ingestion, data is processed (compressed, encrypted, indexed) and stored in the Archive</p>\n<p>Store.</p>\n<p>Supported archive storage systems:</p>\n<p>Host File System</p>\n<p>Amazon S3</p>\n<p>Hitachi Content Platform</p>\n<p>EMC Cantera</p>\n<p>Apache Hadoop</p>\n<p>Google Cloud Storage</p>\n<h3 class=\"content-h3\" id=\"h-purpose-store-archived-data-securely-for-long-term-retention\">Purpose: Store archived data securely for long-term retention.</h3>\n<p>Supports encryption, compression, indexing, and optional WORM storage.</p>\n<h3 class=\"content-h3\" id=\"h-extract-store-restore-location\">Extract Store (Restore Location)</h3>\n<p>When archived data needs to be accessed (audit, legal, reporting), it can be restored to:</p>\n<p>Host File System</p>\n<p>JDBC-supported Databases</p>\n<h3 class=\"content-h3\" id=\"h-purpose-provide-controlled-access-to-archived-data-without-m\">Purpose: Provide controlled access to archived data without modifying the original archive.</h3>\n\n<h3 class=\"content-h3\" id=\"h-flow-summary\">Flow Summary</h3>\n<ol class=\"content-ol\"><li>Information Store \u2013 Data is collected from databases, file systems, or cloud platforms.</li><li>Archive Store \u2013 Data is securely archived and managed under retention policies.</li><li>Extract Store \u2013 Data is restored or exported when required.</li></ol>\n<p>This architecture allows OAM to support multiple enterprise systems, maintain compliance, and</p>\n<p>provide secure long-term data management.</p>"}, "data-archival-tasks": {"badge": "Additional: System Architecture and Functional Components", "title": "Data Archival Tasks", "section": "Additional: System Architecture and Functional Components", "topic": "Data Archival Tasks", "body": "<p>Omni Archive Manager (OAM) provides a set of configurable data archival tasks that control the</p>\n<p>ingestion, processing, validation, retrieval, and lifecycle management of archived data. These</p>\n<p>tasks are executed within a project and are logged for audit and compliance purposes.</p>\n<figure class=\"content-figure\"><img src=\"images/img_f974cabdc8.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n<figure class=\"content-figure\"><img src=\"images/img_8ff838a563.jpeg\" alt=\"\" loading=\"lazy\"></figure>\n\n<h3 class=\"content-h3\" id=\"h-1-archive\">1. Archive</h3>\n<p>The Archive task extracts data from configured information sources (databases, file systems,</p>\n<p>cloud storage, etc.) and stores it in the archive repository.</p>\n<p>During this process, the system:</p>\n<p>Captures metadata</p>\n<p>Applies compression (if enabled)</p>\n<p>Encrypts data</p>\n<p>Generates hash values for integrity</p>\n<p>Stores artifacts in the archive store</p>\n<p>Updates the metadata repository</p>\n<p>This is the primary data ingestion operation.</p>\n<h3 class=\"content-h3\" id=\"h-2-explore\">2. Explore</h3>\n<p>The Explore task analyses source data without committing it to the archive.</p>\n<p>It is used for:</p>\n<p>Data discovery</p>\n<p>Volume estimation</p>\n<p>Structure validation</p>\n<p>Pre-archive analysis</p>\n<p>This helps Operations plan archival strategy before execution.</p>\n<h3 class=\"content-h3\" id=\"h-3-compress\">3. Compress</h3>\n<p>The Compress task reduces the size of archived artifacts using supported compression</p>\n<p>algorithms.</p>\n<p>This optimizes:</p>\n<p>Storage utilization</p>\n<p>Network bandwidth</p>\n<p>Long-term storage cost</p>\n<p>Compression can occur during or after archiving.</p>\n<h3 class=\"content-h3\" id=\"h-4-verify\">4. Verify</h3>\n<p>The Verify task validates the integrity of archived data.</p>\n<p>It:</p>\n<p>Recalculates hash values</p>\n<p>Compares with stored checksums</p>\n<p>Detects corruption or tampering</p>\n<p>This ensures data authenticity and regulatory defensibility.</p>\n\n<h3 class=\"content-h3\" id=\"h-5-index\">5. Index</h3>\n<p>The Index task generates searchable indexes for archived content and metadata.</p>\n<p>It enables:</p>\n<p>Full-text search</p>\n<p>Metadata-based search</p>\n<p>Faster query execution</p>\n<p>Indexing improves retrieval performance without restoring full archives.</p>\n<h3 class=\"content-h3\" id=\"h-6-extract\">6. Extract</h3>\n<p>The Extract task restores archived data into a designated extract location (file system or</p>\n<p>database).</p>\n<p>It supports:</p>\n<p>Full archive restoration</p>\n<p>Partial data extraction</p>\n<p>Controlled and auditable recovery</p>\n<p>Extraction does not modify the original archive.</p>\n<h3 class=\"content-h3\" id=\"h-7-destroy\">7. Destroy</h3>\n<p>The Destroy task permanently deletes archived records that have reached the end of their</p>\n<p>retention period and have completed required workflow approvals.</p>\n<p>It:</p>\n<p>Enforces retention policies</p>\n<p>Maintains audit logs</p>\n<p>Ensures secure and irreversible deletion</p>\n<h3 class=\"content-h3\" id=\"h-8-query-processing\">8. Query Processing</h3>\n<p>The Query Processing task allows execution of structured queries directly against archived</p>\n<p>structured data.</p>\n<p>It:</p>\n<p>Supports SQL-based queries</p>\n<p>Retrieves selected records</p>\n<p>Exports query results</p>\n<p>Avoids restoring full datasets</p>\n<p>This improves efficiency for reporting and audit use cases.</p>\n\n<h3 class=\"content-h3\" id=\"h-9-trigger\">9. Trigger</h3>\n<p>The Trigger task initiates predefined automated actions based on events or conditions.</p>\n<p>Examples include:</p>\n<p>Database triggers</p>\n<p>Policy-based execution</p>\n<p>Scheduled automation</p>\n<p>Triggers support integration with external systems and automated workflows.</p>\n<h3 class=\"content-h3\" id=\"h-10-download\">10. Download</h3>\n<p>The Download task allows authorized users to securely retrieve archived artifacts, reports, or</p>\n<p>extracted data.</p>\n<p>Access is:</p>\n<p>Role-based</p>\n<p>Logged for audit</p>\n<p>Controlled by policy</p>\n<h3 class=\"content-h3\" id=\"h-summary\">Summary</h3>\n<p>These data archival tasks collectively manage the full data lifecycle:</p>\n<h3 class=\"content-h3\" id=\"h-ingest-process-secure-index-retrieve-retain-dispose\">Ingest \u2192 Process \u2192 Secure \u2192 Index \u2192 Retrieve \u2192 Retain \u2192 Dispose</h3>\n<p>This task-based architecture ensures scalability, compliance, and controlled data governance</p>\n<p>within Omni Archive Manager.</p>\n"}}, "home": "about-this-document-2"};</script>
